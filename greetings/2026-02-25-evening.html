<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evening Check-in</title>
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff; font-family: 'Inter', system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden; text-align: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px;
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 1s ease forwards 0.5s;
        }
        @keyframes fadeUp {
            to { transform: translateY(0); opacity: 1; }
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 300; letter-spacing: 2px; }
        p { font-size: 1.1rem; line-height: 1.6; color: #ccc; margin-bottom: 20px; }
        .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .tag {
            background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 50px;
            font-size: 0.9rem; transition: all 0.3s ease; cursor: default;
        }
        .tag:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }
        .interactive-btn {
            background: transparent; border: 1px solid #fff; color: #fff;
            padding: 10px 25px; border-radius: 25px; font-size: 1rem;
            cursor: pointer; transition: all 0.3s; margin-top: 30px;
        }
        .interactive-btn:hover { background: #fff; color: #0f2027; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Good Evening, Christopher.</h1>
        <p>"The obstacle in the path becomes the path. Never forget, within every system lies the potential for flow. Vibe, code, and practice Wu-Wei."</p>
        <div class="tags">
            <span class="tag">Stoicism</span>
            <span class="tag">AI</span>
            <span class="tag">Systems</span>
            <span class="tag">Wu-Wei</span>
            <span class="tag">Vibe Coding</span>
        </div>
        <button class="interactive-btn" onclick="alert('System optimized. Flow state initiated.')">Initialize Evening Sequence</button>
    </div>
</body>
</html>
