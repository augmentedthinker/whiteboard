<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Goodnight Message — 2026-02-27</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <style>
    :root {
      --bg-1: #070b1a;
      --bg-2: #131b3a;
      --bg-3: #2b2450;
      --card: rgba(14, 19, 45, 0.62);
      --card-border: rgba(166, 188, 255, 0.22);
      --text: #e8ecff;
      --muted: #bcc6f3;
      --accent: #b3c9ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: max(16px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 70% -10%, #5160a8 0%, transparent 40%),
                  radial-gradient(800px 500px at -10% 90%, #3b2f78 0%, transparent 45%),
                  linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      overflow: hidden;
    }

    .moon {
      position: fixed;
      top: clamp(36px, 7vh, 78px);
      right: clamp(28px, 8vw, 88px);
      width: clamp(74px, 15vw, 120px);
      aspect-ratio: 1;
      border-radius: 999px;
      background: radial-gradient(circle at 32% 28%, #fffdf5 0%, #f3f1e2 48%, #dddac5 100%);
      box-shadow: 0 0 42px rgba(232, 225, 187, 0.35), 0 0 110px rgba(185, 198, 255, 0.22);
      opacity: 0.92;
    }

    .moon::after {
      content: "";
      position: absolute;
      inset: 10% 18% auto auto;
      width: 30%;
      aspect-ratio: 1;
      border-radius: 999px;
      background: rgba(180, 178, 163, 0.16);
      filter: blur(0.5px);
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.85;
      background-image:
        radial-gradient(2px 2px at 12% 16%, rgba(255,255,255,.85), transparent),
        radial-gradient(1.6px 1.6px at 28% 32%, rgba(212,227,255,.8), transparent),
        radial-gradient(2px 2px at 43% 18%, rgba(255,255,255,.9), transparent),
        radial-gradient(1.4px 1.4px at 55% 42%, rgba(217,225,255,.75), transparent),
        radial-gradient(2px 2px at 73% 25%, rgba(255,255,255,.88), transparent),
        radial-gradient(1.8px 1.8px at 88% 38%, rgba(202,220,255,.8), transparent),
        radial-gradient(2px 2px at 20% 74%, rgba(255,255,255,.86), transparent),
        radial-gradient(1.4px 1.4px at 38% 84%, rgba(220,228,255,.72), transparent),
        radial-gradient(2px 2px at 67% 76%, rgba(255,255,255,.9), transparent),
        radial-gradient(1.5px 1.5px at 82% 68%, rgba(210,223,255,.78), transparent);
      animation: shimmer 8s ease-in-out infinite alternate;
    }

    @keyframes shimmer {
      from { opacity: 0.62; }
      to { opacity: 0.95; }
    }

    .card {
      position: relative;
      width: min(680px, 100%);
      background: linear-gradient(160deg, rgba(22, 30, 66, 0.78), var(--card));
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: clamp(20px, 5.6vw, 38px);
      backdrop-filter: blur(9px) saturate(130%);
      box-shadow: 0 18px 44px rgba(1, 4, 20, 0.45);
      text-align: center;
      animation: breathe 6.2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-2px) scale(1.007); }
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 7.4vw, 2.7rem);
      letter-spacing: 0.02em;
      text-wrap: balance;
      font-weight: 700;
    }

    .message {
      margin: 14px auto 0;
      max-width: 36ch;
      font-size: clamp(1rem, 4.2vw, 1.18rem);
      line-height: 1.7;
      color: var(--muted);
    }

    .tag {
      margin-top: 22px;
      display: inline-block;
      border: 1px solid rgba(179, 201, 255, 0.34);
      background: rgba(122, 144, 214, 0.14);
      color: var(--accent);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.88rem;
      letter-spacing: 0.01em;
    }

    .back {
      position: fixed;
      left: 14px;
      top: max(12px, env(safe-area-inset-top));
      color: #d5ddff;
      text-decoration: none;
      font-size: 0.93rem;
      border: 1px solid rgba(173, 188, 238, 0.28);
      background: rgba(13, 19, 42, 0.55);
      border-radius: 10px;
      padding: 8px 12px;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <a class="back" href="todays-artifacts.html">← Today’s Artifacts</a>
  <div class="moon" aria-hidden="true"></div>
  <div class="stars" aria-hidden="true"></div>

  <main class="card">
    <h1>Goodnight, Christopher 🌙</h1>
    <p class="message">
      You showed up today, and that matters more than perfect.
      Let the mind exhale, let the body soften, and let sleep do its quiet repair.
      Tomorrow gets a steadier, stronger version of you.
    </p>
    <div class="tag">02 • 27 • 2026</div>
  </main>
</body>
</html>
