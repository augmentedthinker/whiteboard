<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SignalScroll Portal — Rose Document</title>
  <style>
    :root {
      --bg:#0b1020;
      --text:#eef2ff;
      --muted:#b8c4f0;
      --accent:#9ab0ff;
      --accent2:#ff9ec7;
      --line:#24335f;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#0b1020;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
    body{font-size:18px;line-height:1.72}

    .topbar{
      position:sticky;top:0;z-index:10;
      background:rgba(11,16,32,.92);
      backdrop-filter: blur(8px);
      border-bottom:1px solid var(--line);
      padding:10px 12px;
    }
    .topbar-inner{max-width:1200px;margin:0 auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .btn,.link{
      text-decoration:none;border:1px solid var(--line);background:#141d3a;color:#dbe4ff;
      border-radius:10px;padding:9px 12px;font-weight:650;font-size:.95rem;display:inline-block
    }
    .btn.primary{border:0;color:#0d1430;background:linear-gradient(135deg,var(--accent),var(--accent2))}
    #status{color:var(--muted);font-size:.92rem}

    .hero{
      max-width:1200px;margin:0 auto;padding:12px 12px 8px;
    }
    .hero h1{margin:0 0 4px;font-size:clamp(1.18rem,4.8vw,1.6rem)}
    .hero p{margin:0;color:var(--muted)}

    /* Full-bleed reading surface */
    .doc-wrap{
      max-width:1200px;
      margin:0 auto;
      padding:0 6px max(20px, env(safe-area-inset-bottom));
    }
    #viewer{
      display:none;
      width:100%;
      margin-top:8px;
      padding:0;
      column-gap:24px;
      text-align:justify;
      text-justify:inter-word;
      overflow-wrap:anywhere;
    }

    #viewer h1,#viewer h2,#viewer h3,#viewer h4{line-height:1.28;margin:1.1em 0 .45em;text-wrap:balance}
    #viewer h1:first-child{margin-top:.2em}
    #viewer p,#viewer li{font-size:1.03rem;max-width:none}
    #viewer ul,#viewer ol{padding-left:1.35em}
    #viewer pre{
      background:#0d1630;border:1px solid #304072;border-radius:8px;
      padding:10px;overflow:auto;text-align:left
    }
    #viewer code{background:rgba(255,255,255,.1);padding:2px 5px;border-radius:6px}
    #viewer blockquote{border-left:3px solid #3a4f8d;margin:0;padding:.2em 0 .2em .8em;color:#d9e2ff}
    #viewer table{display:block;overflow:auto;width:100%;border-collapse:collapse}
    #viewer th,#viewer td{border:1px solid #33406e;padding:8px;vertical-align:top;text-align:left}

    
    @media print {
      .topbar,.hero{display:none !important;}
      body{background:#fff;color:#000;font-size:12pt;line-height:1.45;}
      .doc-wrap{max-width:none;padding:0;}
      #viewer{display:block !important;column-count:1 !important;color:#000;}
      #viewer a{color:#000;text-decoration:underline;}
    }

    @media (min-width: 900px){
      .doc-wrap{padding:0 10px 24px}
      #viewer{column-count:1;column-fill:auto}
    }
  </style>

<style id="rv-home-fab-style">.rv-combo-fab{position:fixed;left:max(10px, env(safe-area-inset-left));top:max(10px, env(safe-area-inset-top));z-index:9999;width:48px;height:94px;border-radius:999px;border:1px solid rgba(126,186,255,.95);background:#2f8cff;color:#eaf5ff;box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(8px);touch-action:none;user-select:none;overflow:hidden;display:flex;flex-direction:column}.rv-combo-fab.dragging{cursor:grabbing}.rv-combo-half{flex:1;display:grid;place-items:center;font-size:18px;font-weight:800;text-decoration:none;color:#eaf5ff;background:transparent;border:0;padding:0;margin:0;cursor:pointer}.rv-combo-half + .rv-combo-half{border-top:1px solid rgba(255,255,255,.22)}html.rv-app-fullscreen,body.rv-app-fullscreen{width:100%;max-width:100%;min-height:100%;margin:0 !important}body.rv-app-fullscreen{padding-top:max(6px, env(safe-area-inset-top)) !important;padding-bottom:max(6px, env(safe-area-inset-bottom)) !important;padding-left:max(6px, env(safe-area-inset-left)) !important;padding-right:max(6px, env(safe-area-inset-right)) !important}.rv-app-fullscreen .topbar{display:none !important}</style>

<style id="rv-mobile-opt-style">
  html{-webkit-text-size-adjust:100%}
  body{overflow-x:hidden}
  img,video,canvas,iframe{max-width:100%;height:auto}
  *{word-wrap:break-word}
  @media (max-width: 768px){
    .container,.wrap,.doc-wrap,.hero,.topbar-inner,main{max-width:100% !important}
    body{padding-left:max(10px, env(safe-area-inset-left));padding-right:max(10px, env(safe-area-inset-right))}
  }
</style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="link" href="../friend-viewer/index.html">← Friend Viewer</a>
      <button id="openBtn" class="btn primary">Open / Refresh Document</button>
      <button id="pdfBtn" class="btn">Download as PDF</button>
      <span id="status"></span>
    </div>
  </div>

  <header class="hero">
    <h1>💌 Rose Bluebook App Plan</h1>
    <p>I prepared this page so you can easily read the full project plan for the legal citation app, formatted for phone and desktop.</p>
  </header>

  <main class="doc-wrap">
    <article id="viewer"></article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const btn=document.getElementById('openBtn');
    const status=document.getElementById('status');
    const viewer=document.getElementById('viewer');
    const pdfBtn=document.getElementById('pdfBtn');

    async function openDoc(){
      btn.disabled=true;
      status.textContent='Loading...';
      try{
        const res=await fetch('./prd.md',{cache:'no-store'});
        if(!res.ok) throw new Error('Could not load markdown file.');
        const md=await res.text();
        viewer.innerHTML=marked.parse(md);
        viewer.style.display='block';
        status.textContent='Ready';
      }catch(err){
        status.textContent='Error loading document';
        alert(err.message);
      }finally{
        btn.disabled=false;
      }
    }

    btn.addEventListener('click',openDoc);
    pdfBtn.addEventListener('click',()=>window.print());
    openDoc();
  </script>

<div id="rvComboFab" class="rv-combo-fab"><a id="rvHomeFab" class="rv-combo-half" href="#" aria-label="Back to menu page" title="Back to menu page">⌂</a><button id="rvFullscreenFab" class="rv-combo-half" type="button" aria-label="Toggle fullscreen" title="Toggle fullscreen">⛶</button></div>
  <script id="rv-home-fab-script">(function(){const fab=document.getElementById('rvComboFab');const home=document.getElementById('rvHomeFab');const fs=document.getElementById('rvFullscreenFab');if(!fab||!home||!fs)return;const path=location.pathname;const marker='/remote-viewer/';const idx=path.indexOf(marker);const href=idx>=0?path.slice(0,idx+marker.length):'/';const WANT_KEY='rvWantFullscreen';home.setAttribute('href',href);const root=document.documentElement;const body=document.body;const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const place=()=>{try{const raw=localStorage.getItem('rvComboFabPos');if(!raw)return;const pos=JSON.parse(raw);const maxLeft=window.innerWidth-fab.offsetWidth-6;const maxTop=window.innerHeight-fab.offsetHeight-6;fab.style.left=clamp(pos.left??10,6,maxLeft)+'px';fab.style.top=clamp(pos.top??10,6,maxTop)+'px';fab.style.right='auto';fab.style.bottom='auto';}catch(_){}};const save=()=>{try{localStorage.setItem('rvComboFabPos',JSON.stringify({left:fab.offsetLeft,top:fab.offsetTop}))}catch(_){}};const isNativeFs=()=>!!(document.fullscreenElement||document.webkitFullscreenElement);const applyAppFs=(on)=>{root.classList.toggle('rv-app-fullscreen',on);body.classList.toggle('rv-app-fullscreen',on);};const wanted=()=>localStorage.getItem(WANT_KEY)==='1';const sync=()=>{fs.textContent=(wanted()||isNativeFs())?'🡼':'⛶';applyAppFs(wanted());};const enterNativeFs=async()=>{const t=document.documentElement;if(t.requestFullscreen) return t.requestFullscreen();if(t.webkitRequestFullscreen) return t.webkitRequestFullscreen();};const exitNativeFs=async()=>{if(document.exitFullscreen) return document.exitFullscreen();if(document.webkitExitFullscreen) return document.webkitExitFullscreen();};const toggleFs=async()=>{try{if(!wanted()&&!isNativeFs()){localStorage.setItem(WANT_KEY,'1');applyAppFs(true);try{await enterNativeFs();}catch(_){}}else{localStorage.setItem(WANT_KEY,'0');applyAppFs(false);if(isNativeFs()) try{await exitNativeFs();}catch(_){}}}catch(_){}sync();};let d=null,m=false;fab.addEventListener('pointerdown',e=>{d={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:fab.offsetLeft,top:fab.offsetTop};m=false;fab.classList.add('dragging');fab.setPointerCapture(e.pointerId);e.preventDefault();});fab.addEventListener('pointermove',e=>{if(!d||e.pointerId!==d.id)return;const dx=e.clientX-d.startX,dy=e.clientY-d.startY;if(Math.abs(dx)>3||Math.abs(dy)>3)m=true;const maxLeft=window.innerWidth-fab.offsetWidth-6,maxTop=window.innerHeight-fab.offsetHeight-6;fab.style.left=clamp(d.left+dx,6,maxLeft)+'px';fab.style.top=clamp(d.top+dy,6,maxTop)+'px';fab.style.right='auto';fab.style.bottom='auto';});fab.addEventListener('pointerup',e=>{if(!d||e.pointerId!==d.id)return;fab.classList.remove('dragging');try{fab.releasePointerCapture(e.pointerId)}catch(_){}d=null;save();setTimeout(()=>{m=false;},0);});fab.addEventListener('click',e=>{if(m){e.preventDefault();e.stopPropagation();m=false;}});home.addEventListener('click',()=>{sync();});fs.addEventListener('click',async e=>{e.preventDefault();e.stopPropagation();if(m)return;await toggleFs();});document.addEventListener('fullscreenchange',()=>{if(!isNativeFs() && !wanted()) applyAppFs(false);sync();});window.addEventListener('pageshow',()=>{applyAppFs(wanted());sync();if(wanted()&&!isNativeFs()){Promise.resolve().then(()=>{sync();});}});place();applyAppFs(wanted());sync();})();</script>
</body>
</html>
