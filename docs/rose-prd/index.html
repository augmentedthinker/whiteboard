<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SignalScroll Portal — Rose PRD</title>
  <style>
    :root {
      --bg:#0b1020;
      --panel:#131a31;
      --panel2:#10172b;
      --text:#eef2ff;
      --muted:#b8c4f0;
      --accent:#9ab0ff;
      --accent2:#ff9ec7;
      --border:#2a3768;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top right,#1f2b5a,var(--bg) 50%);
      line-height:1.65;
      font-size:17px;
    }
    .wrap{
      width:min(100%, 980px);
      margin:0 auto;
      padding: max(10px, env(safe-area-inset-top)) 10px max(12px, env(safe-area-inset-bottom));
    }
    .hero{
      background:linear-gradient(145deg,var(--panel),var(--panel2));
      border:1px solid var(--border);
      border-radius:16px;
      padding:16px;
      box-shadow:0 10px 34px rgba(0,0,0,.35);
    }
    h1{margin:0 0 4px;font-size:clamp(1.25rem,4.8vw,1.9rem)}
    .sub{margin:0 0 10px;color:var(--muted)}
    .note{margin:0 0 12px;padding:10px 12px;border:1px solid rgba(255,158,199,.35);border-radius:12px;background:rgba(255,158,199,.09);color:#ffd9ea}

    .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    button,.back{
      cursor:pointer;border:0;border-radius:12px;padding:10px 14px;font-size:.98rem;font-weight:700;
      color:#0c1230;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 8px 24px rgba(141,162,255,.35);text-decoration:none;display:inline-block
    }
    .back{background:#1b2445;color:#d8e2ff;border:1px solid var(--border);box-shadow:none}
    #status{color:var(--muted);font-size:.95rem}

    #viewer{
      margin-top:12px;
      display:none;
      background:#111a33;
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      overflow-x:auto;
      width:100%;
    }
    #viewer h1,#viewer h2,#viewer h3{line-height:1.25;margin-top:1.2em}
    #viewer h1:first-child{margin-top:0}
    #viewer p,#viewer li{font-size:1.03rem}
    #viewer pre{background:#0a1226;border:1px solid #2b396e;border-radius:10px;padding:12px;overflow:auto}
    #viewer code{background:rgba(255,255,255,.1);padding:2px 5px;border-radius:6px}
    #viewer table{display:block;overflow:auto;width:100%;border-collapse:collapse}
    #viewer th,#viewer td{border:1px solid #33406e;padding:8px;vertical-align:top}

    @media (min-width:720px){
      .hero{padding:24px}
      #viewer{padding:22px}
      body{font-size:18px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>For Rose 💙</h1>
      <p class="sub">This portal lets you read the project document with clean, mobile-first formatting.</p>
      <p class="note">You inspire this build. Thank you for letting me create something meaningful for you.</p>
      <div class="controls">
        <a class="back" href="../index.html">← Docs Hub</a>
        <button id="openBtn">Open Document</button>
        <span id="status"></span>
      </div>
      <article id="viewer"></article>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const btn=document.getElementById('openBtn');
    const status=document.getElementById('status');
    const viewer=document.getElementById('viewer');

    async function openDoc(){
      btn.disabled=true;
      status.textContent='Loading...';
      try{
        const res=await fetch('./prd.md',{cache:'no-store'});
        if(!res.ok) throw new Error('Could not load markdown file.');
        const md=await res.text();
        viewer.innerHTML=marked.parse(md);
        viewer.style.display='block';
        status.textContent='Ready';
        btn.textContent='Refresh Document';
      }catch(err){
        status.textContent='Error loading document';
        alert(err.message);
      }finally{
        btn.disabled=false;
      }
    }

    btn.addEventListener('click', openDoc);
    openDoc();
  </script>
</body>
</html>
