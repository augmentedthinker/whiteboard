<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Citation App Demo | Friend Viewer</title>
  <style>
    :root { --bg:#0c1224; --panel:#131c36; --border:#2b396b; --text:#eaf0ff; --muted:#b4c0ea; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; color:var(--text); background:radial-gradient(circle at top right,#202f63,var(--bg) 48%); min-height:100vh; padding:16px; }
    .wrap { max-width:980px; margin:0 auto; }
    .card { background:linear-gradient(145deg,var(--panel),#10172d); border:1px solid var(--border); border-radius:16px; padding:16px; box-shadow:0 14px 34px rgba(0,0,0,.35); }
    h1 { margin:0 0 8px; font-size:clamp(1.2rem,4vw,2rem); }
    p { margin:0 0 12px; color:var(--muted); }
    video { width:100%; border-radius:12px; border:1px solid rgba(153,181,255,.45); background:#000; }
    .actions { margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; justify-content:center; padding:10px 14px; border-radius:10px; border:1px solid rgba(153,181,255,.6); color:#eaf0ff; text-decoration:none; background:rgba(28,40,74,.92); font-weight:600; }
    .btn:hover { transform:translateY(-1px); }
    .note { margin-top:10px; font-size:.9rem; color:#c7d6ff; }
  </style>

<style id="rv-home-fab-style">
  .rv-home-fab{position:fixed;left:max(10px, env(safe-area-inset-left));top:max(10px, env(safe-area-inset-top));z-index:9999;width:46px;height:46px;border-radius:999px;border:1px solid rgba(126,186,255,.95);background:#2f8cff;color:#eaf5ff;display:grid;place-items:center;font-size:18px;font-weight:800;box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(8px);cursor:grab;touch-action:none;user-select:none;text-decoration:none}
  .rv-home-fab.dragging{cursor:grabbing}
  .rv-hidden-back-nav{display:none !important}
</style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>📹 Citation App Demo</h1>
      <p>Quick walkthrough before testing the live app.</p>
      <video controls preload="metadata" playsinline>
        <source src="citation-demo.webm" type="video/webm" />
        Your browser does not support this video format.
      </video>
      <div class="actions">
        <a class="btn" href="https://augmentedthinker.github.io/citation/" target="_blank" rel="noopener noreferrer">Open Citation App ↗</a>
        <a class="btn" href="./index.html">← Back to Friend Viewer</a>
      </div>
      <div class="note">Demo only — verify all citation outputs against official sources.</div>
    </section>
  </main>

<a id="rvHomeFab" class="rv-home-fab" href="#" aria-label="Back to menu page" title="Back to menu page">⌂</a>
<script id="rv-home-fab-script">
(function(){
  const fab=document.getElementById('rvHomeFab');
  if(!fab) return;
  const path=location.pathname;
  const marker='/remote-viewer/';
  const idx=path.indexOf(marker);
  const href=idx>=0 ? path.slice(0, idx + marker.length) : '/';
  fab.setAttribute('href', href);
  let drag=null, moved=false;
  fab.addEventListener('pointerdown', (e)=>{ drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:fab.offsetLeft,top:fab.offsetTop}; moved=false; fab.classList.add('dragging'); fab.setPointerCapture(e.pointerId); e.preventDefault(); });
  fab.addEventListener('pointermove', (e)=>{ if(!drag||e.pointerId!==drag.id) return; const dx=e.clientX-drag.startX, dy=e.clientY-drag.startY; if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true; const maxLeft=window.innerWidth-fab.offsetWidth-6, maxTop=window.innerHeight-fab.offsetHeight-6; const nextLeft=Math.max(6, Math.min(maxLeft, drag.left+dx)); const nextTop=Math.max(6, Math.min(maxTop, drag.top+dy)); fab.style.left=nextLeft+'px'; fab.style.top=nextTop+'px'; fab.style.right='auto'; });
  fab.addEventListener('pointerup', (e)=>{ if(!drag||e.pointerId!==drag.id) return; fab.classList.remove('dragging'); try{fab.releasePointerCapture(e.pointerId);}catch(_){} const wasMoved=moved; drag=null; if(wasMoved) e.preventDefault(); });
  fab.addEventListener('pointercancel', ()=>{ fab.classList.remove('dragging'); drag=null; });
  fab.addEventListener('click', (e)=>{ if(moved){ e.preventDefault(); moved=false; } });

  const tryApplyFullscreenPreference = async () => {
    let preferred = false;
    try { preferred = localStorage.getItem('rvFullscreenPreferred') === '1'; } catch(_) {}
    if (!preferred) return;
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (isFs) return;
    try {
      const target = document.documentElement;
      if (target.requestFullscreen) await target.requestFullscreen();
      else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
    } catch(_) {}
  };

  const armFullscreenCarry = () => {
    let preferred = false;
    try { preferred = localStorage.getItem('rvFullscreenPreferred') === '1'; } catch(_) {}
    if (!preferred) return;
    const handler = () => {
      tryApplyFullscreenPreference();
      window.removeEventListener('pointerdown', handler, true);
      window.removeEventListener('keydown', handler, true);
      window.removeEventListener('touchstart', handler, true);
    };
    window.addEventListener('pointerdown', handler, true);
    window.addEventListener('keydown', handler, true);
    window.addEventListener('touchstart', handler, true);
  };

  const hideBackNav = () => {
    const selectors = 'a,button,.btn,.link,.back';
    document.querySelectorAll(selectors).forEach(el => {
      if (el.id === 'rvHomeFab' || el.id === 'fsBtn') return;
      const text = (el.textContent || '').replace(/\s+/g,' ').trim().toLowerCase();
      const hrefAttr = (el.getAttribute && (el.getAttribute('href') || '') || '').toLowerCase();
      const title = (el.getAttribute && (el.getAttribute('title') || '') || '').toLowerCase();
      const looksBack = text.startsWith('←') || text.startsWith('back to') || text === 'back' || text === 'today’s artifacts' || text === "today's artifacts" || title.includes('back to');
      const navHref = hrefAttr.includes('../index.html') || hrefAttr.endsWith('/index.html') || hrefAttr === 'index.html';
      if (looksBack || (navHref && text.includes('back'))) {
        el.classList.add('rv-hidden-back-nav');
      }
    });
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', () => { hideBackNav(); armFullscreenCarry(); }, {once:true});
  else { hideBackNav(); armFullscreenCarry(); }
})();
</script>
</body>
</html>
