<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" /><title>Generalist | User</title><style>:root{--bg:#07101d;--panel:#0d1728;--panel2:#101d33;--line:#243a66;--text:#edf5ff;--muted:#a9bfdc;--accent:#8dd8ff;--accent2:#7a92ff}*{box-sizing:border-box}html,body{margin:0}body{font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:radial-gradient(circle at top right, rgba(141,216,255,.12), transparent 28%),linear-gradient(180deg,#0a1323,#050a14);color:var(--text);min-height:100vh}.topbar{position:sticky;top:0;z-index:10;background:rgba(5,10,20,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.topbar-inner{max-width:1100px;margin:0 auto;padding:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn,.link{text-decoration:none;border:1px solid var(--line);background:linear-gradient(135deg,var(--panel2),var(--panel));color:var(--text);border-radius:999px;padding:10px 14px;font-weight:700;font-size:.95rem;display:inline-block}.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#08111f;border:0}#status{color:var(--muted);font-size:.92rem}.hero{max-width:1100px;margin:0 auto;padding:20px 14px 8px}.eyebrow{margin:0 0 8px;color:var(--accent);font-size:.78rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase}h1{margin:0 0 6px;font-size:clamp(1.4rem,5vw,2.2rem)}.sub{margin:0;color:var(--muted);max-width:70ch;line-height:1.6}.path-card{margin-top:14px;padding:14px 16px;border:1px solid var(--line);border-radius:18px;background:linear-gradient(160deg, rgba(14,24,42,.9), rgba(10,18,32,.88));box-shadow:0 14px 34px rgba(0,0,0,.24)}.path-label{display:block;margin-bottom:8px;color:var(--muted);font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase}.path-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.path-value{flex:1 1 560px;min-width:0;padding:12px 14px;border-radius:14px;background:rgba(6,12,22,.88);border:1px solid rgba(141,216,255,.16);color:#dbeaff;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.92rem;overflow-wrap:anywhere}.doc-wrap{max-width:1100px;margin:0 auto;padding:0 14px 28px}#viewer{display:none;margin-top:10px;padding:22px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(160deg, rgba(15,25,42,.94), rgba(9,15,28,.92));box-shadow:0 20px 60px rgba(0,0,0,.35)}#viewer h1,#viewer h2,#viewer h3,#viewer h4{line-height:1.28;margin:1.05em 0 .45em}#viewer h1:first-child{margin-top:0}#viewer p,#viewer li{font-size:1.02rem;line-height:1.72}#viewer ul,#viewer ol{padding-left:1.35em}#viewer code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:7px}#viewer pre{background:#091221;border:1px solid #26395f;border-radius:12px;padding:12px;overflow:auto}#viewer blockquote{border-left:3px solid #42649a;margin:0;padding:.2em 0 .2em .9em;color:#dce8ff}@media print {.topbar,.hero{display:none!important} body{background:#fff;color:#000} #viewer{display:block!important;border:0;box-shadow:none;padding:0}}</style>
<style id="rv-home-fab-style">
  .rv-home-fab{position:fixed;left:max(10px, env(safe-area-inset-left));top:max(10px, env(safe-area-inset-top));z-index:9999;width:46px;height:46px;border-radius:999px;border:1px solid rgba(126,186,255,.95);background:#2f8cff;color:#eaf5ff;display:grid;place-items:center;font-size:18px;font-weight:800;box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(8px);cursor:grab;touch-action:none;user-select:none;text-decoration:none}
  .rv-home-fab.dragging{cursor:grabbing}
  .rv-hidden-back-nav{display:none !important}
</style>
</head><body><div class="topbar"><div class="topbar-inner"><a class="link" href="../../agents/generalist.html">← Generalist</a><button id="openBtn" class="btn primary">Open / Refresh</button><button id="pdfBtn" class="btn">Download as PDF</button><span id="status"></span></div></div><header class="hero"><p class="eyebrow">Generalist · User</p><h1>User File</h1><p class="sub">A clean reading surface for the human context Generalist is meant to serve.</p><div class="path-card"><span class="path-label">Workspace file path</span><div class="path-row"><div class="path-value" id="pathValue">/home/augmentedthinker/.openclaw/workspace-generalist/USER.md</div><button id="copyPathBtn" class="btn">Copy Local Path</button></div></div></header><main class="doc-wrap"><article id="viewer"></article></main><script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><script>const btn=document.getElementById('openBtn'); const pdfBtn=document.getElementById('pdfBtn'); const copyPathBtn=document.getElementById('copyPathBtn'); const pathValue=document.getElementById('pathValue'); const status=document.getElementById('status'); const viewer=document.getElementById('viewer'); async function openDoc(){ btn.disabled=true; status.textContent='Loading...'; try{ const res=await fetch('./user.md',{cache:'no-store'}); if(!res.ok) throw new Error('Could not load markdown file.'); const md=await res.text(); viewer.innerHTML=marked.parse(md); viewer.style.display='block'; status.textContent='Ready'; }catch(err){ status.textContent='Error loading document'; alert(err.message);}finally{ btn.disabled=false; } } async function copyPath(){ try{ await navigator.clipboard.writeText(pathValue.textContent.trim()); const old=copyPathBtn.textContent; copyPathBtn.textContent='Copied'; status.textContent='Local path copied'; setTimeout(()=>copyPathBtn.textContent=old,1400);}catch(err){ status.textContent='Could not copy path'; alert('Copy failed on this browser. Path: ' + pathValue.textContent.trim()); } } btn.addEventListener('click',openDoc); pdfBtn.addEventListener('click',()=>window.print()); copyPathBtn.addEventListener('click',copyPath); openDoc();</script>
<a id="rvHomeFab" class="rv-home-fab" href="#" aria-label="Back to menu page" title="Back to menu page">⌂</a>
<script id="rv-home-fab-script">
(function(){
  const fab=document.getElementById('rvHomeFab');
  if(!fab) return;
  const path=location.pathname;
  const marker='/remote-viewer/';
  const idx=path.indexOf(marker);
  const href=idx>=0 ? path.slice(0, idx + marker.length) : '/';
  fab.setAttribute('href', href);
  let drag=null, moved=false;
  fab.addEventListener('pointerdown', (e)=>{ drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:fab.offsetLeft,top:fab.offsetTop}; moved=false; fab.classList.add('dragging'); fab.setPointerCapture(e.pointerId); e.preventDefault(); });
  fab.addEventListener('pointermove', (e)=>{ if(!drag||e.pointerId!==drag.id) return; const dx=e.clientX-drag.startX, dy=e.clientY-drag.startY; if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true; const maxLeft=window.innerWidth-fab.offsetWidth-6, maxTop=window.innerHeight-fab.offsetHeight-6; const nextLeft=Math.max(6, Math.min(maxLeft, drag.left+dx)); const nextTop=Math.max(6, Math.min(maxTop, drag.top+dy)); fab.style.left=nextLeft+'px'; fab.style.top=nextTop+'px'; fab.style.right='auto'; });
  fab.addEventListener('pointerup', (e)=>{ if(!drag||e.pointerId!==drag.id) return; fab.classList.remove('dragging'); try{fab.releasePointerCapture(e.pointerId);}catch(_){} const wasMoved=moved; drag=null; if(wasMoved) e.preventDefault(); });
  fab.addEventListener('pointercancel', ()=>{ fab.classList.remove('dragging'); drag=null; });
  fab.addEventListener('click', (e)=>{ if(moved){ e.preventDefault(); moved=false; } });

  const hideBackNav = () => {
    const selectors = 'a,button,.btn,.link,.back';
    document.querySelectorAll(selectors).forEach(el => {
      if (el.id === 'rvHomeFab' || el.id === 'fsBtn') return;
      const text = (el.textContent || '').replace(/\s+/g,' ').trim().toLowerCase();
      const hrefAttr = (el.getAttribute && (el.getAttribute('href') || '') || '').toLowerCase();
      const title = (el.getAttribute && (el.getAttribute('title') || '') || '').toLowerCase();
      const looksBack = text.startsWith('←') || text.startsWith('back to') || text === 'back' || text === 'today’s artifacts' || text === "today's artifacts" || title.includes('back to');
      const navHref = hrefAttr.includes('../index.html') || hrefAttr.endsWith('/index.html') || hrefAttr === 'index.html';
      if (looksBack || (navHref && text.includes('back'))) {
        el.classList.add('rv-hidden-back-nav');
      }
    });
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', hideBackNav, {once:true});
  else hideBackNav();
})();
</script>
</body></html>
