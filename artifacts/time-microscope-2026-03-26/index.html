<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Time Microscope · 2026-03-26</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0b1220;
      --bg2:#111b2d;
      --panel:rgba(14,24,43,.88);
      --line:rgba(157,201,255,.18);
      --text:#edf4ff;
      --muted:#b3c5df;
      --sleep:#5aa2ff;
      --work:#ff8aa1;
      --prep:#c6a27a;
      --empty:rgba(255,255,255,.08);
      --shadow:0 20px 50px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{
      min-height:100vh;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 18%, rgba(90,162,255,.16), transparent 24%),
        radial-gradient(circle at 82% 20%, rgba(255,138,161,.10), transparent 20%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      padding:14px 12px 18px;
      overflow-x:hidden;
      overflow-y:auto;
    }
    .wrap{max-width:620px;margin:0 auto}
    .topbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;text-decoration:none;color:var(--text);border:1px solid var(--line);background:rgba(255,255,255,.06);font-weight:700}
    .card{border:1px solid var(--line);border-radius:26px;background:var(--panel);box-shadow:var(--shadow);padding:16px 14px 18px}
    .eyebrow{margin:0 0 6px;color:#9fcaff;font-size:.74rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
    h1{margin:0 0 8px;font-family:Fraunces,serif;font-size:clamp(1.9rem,7vw,2.8rem);line-height:.95;letter-spacing:-.04em}
    .sub{margin:0 0 14px;color:var(--muted);line-height:1.55;font-size:.95rem}
    .day-tabs{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px}
    .tab{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--muted);border-radius:12px;padding:10px 0;font-size:.8rem;font-weight:700}
    .tab.active{background:rgba(90,162,255,.18);color:#eef6ff;border-color:rgba(90,162,255,.32)}
    .chart-wrap{display:grid;place-items:center}
    .schedule{margin-top:16px;display:grid;gap:6px}
    .slot{display:grid;grid-template-columns:64px 1fr;gap:10px;align-items:center;padding:8px 10px;border:1px solid rgba(255,255,255,.06);border-radius:12px;background:rgba(255,255,255,.03)}
    .slot-time{font-size:.84rem;font-weight:800;color:#cfe0f7;letter-spacing:.04em}
    .slot-label{font-size:.9rem;color:var(--muted)}
    .slot-label.active{font-weight:700}
    .slot-label.sleep{color:var(--sleep)}
    .slot-label.work{color:var(--work)}
    .slot-label.prep{color:var(--prep)}
    .clock{
      width:min(320px,78vw);
      height:min(320px,78vw);
      border-radius:50%;
      position:relative;
      background:var(--clock-bg);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04), 0 18px 40px rgba(0,0,0,.24);
    }
    .clock::after{content:"";position:absolute;inset:24%;border-radius:50%;background:linear-gradient(180deg, rgba(10,16,28,.97), rgba(17,27,45,.99));box-shadow:inset 0 0 0 1px rgba(157,201,255,.10)}
    .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;z-index:2;pointer-events:none}
    .center strong{display:block;font-size:1.45rem;line-height:1;color:#f6fbff}
    .center span{display:block;margin-top:6px;font-size:.85rem;color:var(--muted);font-weight:600}
    .marker{position:absolute;left:50%;top:50%;width:2px;height:50%;transform-origin:center top;background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0));opacity:.6}
    .m0{transform:translate(-50%,-100%) rotate(0deg)} .m6{transform:translate(-50%,-100%) rotate(90deg)} .m12{transform:translate(-50%,-100%) rotate(180deg)} .m18{transform:translate(-50%,-100%) rotate(270deg)}
    .label-hour{position:absolute;z-index:2;font-size:.74rem;font-weight:800;color:#c9d7eb;background:rgba(8,12,20,.55);padding:4px 7px;border-radius:999px;border:1px solid rgba(255,255,255,.06)}
    .h0{top:10px;left:50%;transform:translateX(-50%)} .h6{right:10px;top:50%;transform:translateY(-50%)} .h12{bottom:10px;left:50%;transform:translateX(-50%)} .h18{left:10px;top:50%;transform:translateY(-50%)}
    @media (max-width:640px){
      body{padding:10px 10px 16px}
      .card{border-radius:20px;padding:14px 12px 16px}
      .day-tabs{gap:5px}
      .tab{font-size:.76rem;padding:9px 0}
      .clock{width:min(300px,80vw);height:min(300px,80vw)}
    }
  </style>
  <style id="rv-home-fab-style">.rv-combo-fab{position:fixed;left:max(10px, env(safe-area-inset-left));top:max(10px, env(safe-area-inset-top));z-index:9999;width:48px;height:94px;border-radius:999px;border:1px solid rgba(126,186,255,.95);background:#2f8cff;color:#eaf5ff;box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(8px);touch-action:none;user-select:none;overflow:hidden;display:flex;flex-direction:column}.rv-combo-fab.dragging{cursor:grabbing}.rv-combo-half{flex:1;display:grid;place-items:center;font-size:18px;font-weight:800;text-decoration:none;color:#eaf5ff;background:transparent;border:0;padding:0;margin:0;cursor:pointer}.rv-combo-half + .rv-combo-half{border-top:1px solid rgba(255,255,255,.22)}</style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="pill" href="../../today/index.html">← Today’s Artifacts</a>
    </div>

    <section class="card">
      <p class="eyebrow">Time Reality Check</p>
      <h1>Time Microscope</h1>
      <p class="sub">Tap a day. Blue = sleep. Pink = work. Light brown = preparation.</p>

      <div class="day-tabs" id="tabs"></div>

      <div class="chart-wrap">
        <div class="clock" id="clock" aria-label="24-hour ring view">
          <div class="marker m0"></div><div class="marker m6"></div><div class="marker m12"></div><div class="marker m18"></div>
          <div class="label-hour h0">1200</div><div class="label-hour h6">1800</div><div class="label-hour h12">0000</div><div class="label-hour h18">0600</div>
          <div class="center"><div><strong id="centerDay">Mon</strong><span>24-hour view</span></div></div>
        </div>
      </div>

      <div class="schedule" id="schedule"></div>
    </section>
  </div>

  <div id="rvComboFab" class="rv-combo-fab"><a id="rvHomeFab" class="rv-combo-half" href="#" aria-label="Back to menu page" title="Back to menu page">⌂</a><button id="rvFullscreenFab" class="rv-combo-half" type="button" aria-label="Toggle fullscreen" title="Toggle fullscreen">⛶</button></div>
  <script id="rv-home-fab-script">(function(){const fab=document.getElementById('rvComboFab');const home=document.getElementById('rvHomeFab');const fs=document.getElementById('rvFullscreenFab');if(!fab||!home||!fs)return;const path=location.pathname;const marker='/remote-viewer/';const idx=path.indexOf(marker);const href=idx>=0?path.slice(0,idx+marker.length):'/';home.setAttribute('href',href);const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const place=()=>{try{const raw=localStorage.getItem('rvComboFabPos');if(!raw)return;const pos=JSON.parse(raw);const maxLeft=window.innerWidth-fab.offsetWidth-6;const maxTop=window.innerHeight-fab.offsetHeight-6;fab.style.left=clamp(pos.left??10,6,maxLeft)+'px';fab.style.top=clamp(pos.top??10,6,maxTop)+'px';fab.style.right='auto';fab.style.bottom='auto';}catch(_){}};const save=()=>{try{localStorage.setItem('rvComboFabPos',JSON.stringify({left:fab.offsetLeft,top:fab.offsetTop}))}catch(_){}};let d=null,m=false;fab.addEventListener('pointerdown',e=>{d={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:fab.offsetLeft,top:fab.offsetTop};m=false;fab.classList.add('dragging');fab.setPointerCapture(e.pointerId);e.preventDefault();});fab.addEventListener('pointermove',e=>{if(!d||e.pointerId!==d.id)return;const dx=e.clientX-d.startX,dy=e.clientY-d.startY;if(Math.abs(dx)>3||Math.abs(dy)>3)m=true;const maxLeft=window.innerWidth-fab.offsetWidth-6,maxTop=window.innerHeight-fab.offsetHeight-6;fab.style.left=clamp(d.left+dx,6,maxLeft)+'px';fab.style.top=clamp(d.top+dy,6,maxTop)+'px';fab.style.right='auto';fab.style.bottom='auto';});fab.addEventListener('pointerup',async e=>{if(!d||e.pointerId!==d.id)return;fab.classList.remove('dragging');try{fab.releasePointerCapture(e.pointerId)}catch(_){}const moved=m;const target=e.target.closest('.rv-combo-half');d=null;save();if(moved||!target)return;if(target===fs){try{const t=document.documentElement;const isFs=()=>!!(document.fullscreenElement||document.webkitFullscreenElement);if(!isFs()){if(t.requestFullscreen)await t.requestFullscreen();else if(t.webkitRequestFullscreen)t.webkitRequestFullscreen();}else{if(document.exitFullscreen)await document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}}catch(_){}fs.textContent=(document.fullscreenElement||document.webkitFullscreenElement)?'🡼':'⛶';}else if(target===home){location.href=href;}});fab.addEventListener('click',e=>{if(m){e.preventDefault();m=false;}});document.addEventListener('fullscreenchange',()=>{fs.textContent=(document.fullscreenElement||document.webkitFullscreenElement)?'🡼':'⛶';});place();fs.textContent=(document.fullscreenElement||document.webkitFullscreenElement)?'🡼':'⛶';})();</script>

  </body>
</html>
