<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Kinetic Silk — 2026-03-01</title>
  <style>
    :root{--bg:#040508;--txt:#e1eaff;--accent:#7eb6ff}
    html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,-apple-system,sans-serif}
    canvas{position:fixed;inset:0;width:100%;height:100%}
    .hud{position:fixed;left:50%;transform:translateX(-50%);bottom:max(14px,env(safe-area-inset-bottom));text-align:center;padding:10px 14px;border:1px solid rgba(126,182,255,.25);border-radius:12px;background:rgba(8,12,24,.6);backdrop-filter:blur(10px);max-width:min(92vw,760px);pointer-events:none}
    h1{margin:0;font-size:clamp(1rem,3.6vw,1.25rem);letter-spacing:0.02em}
    p{margin:.2rem 0 0;opacity:0.7;font-size:clamp(.75rem,2.8vw,.9rem)}
    .sig{position:fixed;top:max(10px,env(safe-area-inset-top));right:max(10px,env(safe-area-inset-right));text-decoration:none;color:#d9e8ff;background:rgba(12,20,40,.7);border:1px solid rgba(126,182,255,.4);padding:8px 11px;border-radius:10px;font-size:.84rem}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <a class="sig" href="kinetic-silk-2026-03-01-signature.html">🧠</a>
  <div class="hud">
    <h1>Kinetic Silk</h1>
    <p>Trace the flow to weave the field.</p>
  </div>
<script>
const canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
let w, h, dpr, points=[], t=0;
const pointer={x:0, y:0, active:false};

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  w=window.innerWidth; h=window.innerHeight;
  canvas.width=w*dpr; canvas.height=h*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

class Ribbon {
  constructor(yOffset){
    this.yOffset = yOffset;
    this.history = [];
    this.color = `hsla(${210 + Math.random()*40}, 80%, 70%, 0.15)`;
  }
  update(time){
    const targetX = pointer.active ? pointer.x : w/2 + Math.cos(time*0.5)*w*0.3;
    const targetY = pointer.active ? pointer.y : h/2 + Math.sin(time*0.7)*h*0.2 + this.yOffset;
    
    this.history.unshift({x:targetX, y:targetY});
    if(this.history.length > 50) this.history.pop();
  }
  draw(){
    if(this.history.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(this.history[0].x, this.history[0].y);
    for(let i=1; i<this.history.length; i++){
      const p = this.history[i];
      const prev = this.history[i-1];
      const xc = (p.x + prev.x)/2;
      const yc = (p.y + prev.y)/2;
      ctx.quadraticCurveTo(prev.x, prev.y, xc, yc);
    }
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

const ribbons = Array.from({length:12}, (_,i) => new Ribbon((i-6)*15));

function onMove(e){
  const pt = e.touches ? e.touches[0] : e;
  pointer.x = pt.clientX; pointer.y = pt.clientY;
  pointer.active = true;
}

window.addEventListener('resize', resize);
window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('touchstart', onMove, {passive:false});
window.addEventListener('touchend', () => pointer.active = false);

function frame(ms){
  t = ms * 0.001;
  ctx.fillStyle = 'rgba(4, 5, 8, 0.1)';
  ctx.fillRect(0,0,w,h);
  
  ribbons.forEach(r => {
    r.update(t);
    r.draw();
  });
  
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
