<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Cosmic Bloom — 2026-03-01</title>
  <style>
    :root{--txt:#e6f1ff;--muted:#9fb2d6}
    html,body{margin:0;height:100%;overflow:hidden;background:#02030a;color:var(--txt);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    canvas{position:fixed;inset:0;width:100%;height:100%}
    .vignette{position:fixed;inset:0;pointer-events:none;background:
      radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,.35) 100%),
      radial-gradient(circle at 50% 10%, rgba(120,180,255,.12), transparent 45%)}
    .hud{position:fixed;left:50%;transform:translateX(-50%);bottom:max(14px,env(safe-area-inset-bottom));text-align:center;padding:10px 14px;border:1px solid rgba(153,184,255,.35);border-radius:12px;background:rgba(8,12,30,.42);backdrop-filter: blur(8px);max-width:min(92vw,760px)}
    h1{margin:0;font-size:clamp(1rem,3.6vw,1.35rem);letter-spacing:.02em}
    p{margin:.25rem 0 0;color:var(--muted);font-size:clamp(.78rem,2.9vw,.93rem)}
    .top{position:fixed;top:max(10px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);font-size:.78rem;color:#b5c8ef;background:rgba(8,12,30,.35);border:1px solid rgba(153,184,255,.22);padding:6px 10px;border-radius:999px;backdrop-filter: blur(6px)}
    .analysis-btn{position:fixed;right:max(10px,env(safe-area-inset-right));top:max(10px,env(safe-area-inset-top));text-decoration:none;color:#dbe8ff;background:rgba(12,19,44,.75);border:1px solid rgba(153,184,255,.45);padding:9px 12px;border-radius:10px;font-size:.82rem;backdrop-filter: blur(6px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
    .analysis-btn:hover{background:rgba(22,33,74,.88)}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="vignette"></div>
  <div class="top">Saber Artifact · Cosmic Bloom</div>
  <a class="analysis-btn" href="cosmic-bloom-2026-03-01-signature.html">🧠</a>
  <div class="hud">
    <h1>Christopher, your focus bends the field.</h1>
    <p>Move your finger/mouse to sculpt gravity. Tap/click to trigger a bloom wave.</p>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w,h,dpr,stars=[],t=0;
    const pointer={x:0.5,y:0.5,down:false,pulse:0};

    function resize(){
      dpr=Math.min(window.devicePixelRatio||1,2);
      w=window.innerWidth; h=window.innerHeight;
      canvas.width=w*dpr; canvas.height=h*dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
      initStars();
    }

    function initStars(){
      const count=Math.floor((w*h)/4200);
      stars=Array.from({length:count},()=>({
        x:Math.random()*w,
        y:Math.random()*h,
        z:Math.random()*1,
        s:Math.random()*1.8+0.4,
        p:Math.random()*Math.PI*2,
      }));
    }

    function onMove(e){
      const pt=e.touches?e.touches[0]:e;
      pointer.x=pt.clientX/w;
      pointer.y=pt.clientY/h;
    }
    function onDown(){pointer.down=true; pointer.pulse=1;}
    function onUp(){pointer.down=false;}

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', onMove, {passive:true});
    window.addEventListener('touchmove', onMove, {passive:true});
    window.addEventListener('mousedown', onDown);
    window.addEventListener('touchstart', onDown, {passive:true});
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchend', onUp, {passive:true});

    function drawNebula(){
      const gx=pointer.x*w, gy=pointer.y*h;
      const pulse=pointer.pulse;
      pointer.pulse*=0.965;

      const g1=ctx.createRadialGradient(gx,gy,10,gx,gy,Math.max(w,h)*0.62);
      g1.addColorStop(0, `rgba(120,180,255,${0.20+0.35*pulse})`);
      g1.addColorStop(0.35, 'rgba(112,96,255,0.18)');
      g1.addColorStop(0.65, 'rgba(255,80,190,0.10)');
      g1.addColorStop(1, 'rgba(1,3,12,0)');
      ctx.fillStyle=g1; ctx.fillRect(0,0,w,h);

      const g2=ctx.createRadialGradient(w*0.2,h*0.85,0,w*0.2,h*0.85,w*0.7);
      g2.addColorStop(0,'rgba(40,170,255,0.06)');
      g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g2; ctx.fillRect(0,0,w,h);

      if(pulse>0.02){
        ctx.strokeStyle=`rgba(180,220,255,${0.30*pulse})`;
        ctx.lineWidth=1.2;
        for(let i=0;i<3;i++){
          ctx.beginPath();
          ctx.arc(gx,gy,(1-pulse)*(120+i*70)+40,0,Math.PI*2);
          ctx.stroke();
        }
      }
    }

    function drawStars(){
      const gx=(pointer.x-0.5)*32;
      const gy=(pointer.y-0.5)*32;
      for(const s of stars){
        s.p += 0.003 + s.z*0.008;
        const swayX = Math.cos(s.p+t*0.0007)*(6+18*s.z) + gx*(0.25+s.z*0.55);
        const swayY = Math.sin(s.p*1.13+t*0.0009)*(6+18*s.z) + gy*(0.25+s.z*0.55);
        const x=s.x+swayX, y=s.y+swayY;

        const hue=200 + Math.sin(s.p*2+t*0.001)*40;
        const alpha=0.35 + 0.45*s.z + (pointer.down?0.15:0);
        ctx.fillStyle=`hsla(${hue},100%,80%,${alpha})`;
        ctx.beginPath();
        ctx.arc(x,y,s.s*(0.7+s.z*0.8),0,Math.PI*2);
        ctx.fill();
      }
    }

    function frame(ms){
      t=ms;
      ctx.fillStyle='rgba(2,3,10,0.28)';
      ctx.fillRect(0,0,w,h);
      drawNebula();
      drawStars();
      requestAnimationFrame(frame);
    }

    resize();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
