<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Luminous Pause · 2026-03-13</title>
  <style>
    :root{--bg:#050814;--a:#6ee7ff;--b:#7c3aed;--c:#fb7185;--text:#dbeafe}
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 30% 20%, #0b1733, var(--bg) 55%);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text)}
    canvas{position:fixed;inset:0}
    .hud{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);background:rgba(8,12,24,.5);border:1px solid rgba(148,163,184,.35);border-radius:999px;padding:10px 16px;font-size:.88rem;backdrop-filter:blur(8px);text-align:center}
    .title{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-size:clamp(1rem,2.6vw,1.2rem);letter-spacing:.06em;text-transform:uppercase;color:#c4b5fd}
    .back{position:fixed;top:16px;left:16px;color:#93c5fd;text-decoration:none;font-weight:600;background:rgba(9,16,30,.6);border:1px solid rgba(147,197,253,.35);padding:8px 10px;border-radius:10px}
  </style>
</head>
<body>
  <a class="back" href="../../today/index.html">← Today</a>
  <div class="title">Luminous Pause · 2026-03-13</div>
  <canvas id="c"></canvas>
  <div class="hud">Breathe in for 4 · hold 2 · out for 6</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w=0,h=0,t=0;
    const blobs = Array.from({length:34}, (_,i)=>(
      {a:Math.random()*Math.PI*2,r:80+Math.random()*220,s:.0015+Math.random()*.0035,x:.5,y:.5,sz:40+Math.random()*120,hue:[190,260,335][i%3]}
    ));

    function resize(){w=canvas.width=innerWidth;h=canvas.height=innerHeight}
    addEventListener('resize', resize); resize();

    function draw(){
      t += 1;
      ctx.clearRect(0,0,w,h);
      ctx.globalCompositeOperation='lighter';

      for(const b of blobs){
        b.a += b.s;
        const cx = w*.5 + Math.cos(b.a*1.2 + t*.002)*b.r + Math.cos(t*.0012+b.a)*40;
        const cy = h*.5 + Math.sin(b.a + t*.0018)*b.r*0.55;
        const pulse = 0.72 + Math.sin(t*0.015 + b.a)*0.28;
        const rad = b.sz*pulse;
        const g = ctx.createRadialGradient(cx,cy,0,cx,cy,rad);
        g.addColorStop(0, `hsla(${b.hue},95%,72%,0.23)`);
        g.addColorStop(.5, `hsla(${b.hue},90%,62%,0.10)`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx,cy,rad,0,Math.PI*2);
        ctx.fill();
      }

      ctx.globalCompositeOperation='source-over';
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
