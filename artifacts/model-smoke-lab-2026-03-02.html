<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gemini API Key + Model ID Test</title>
  <style>
    :root{--bg:#0b1020;--panel:rgba(18,26,49,.72);--line:#3b4c70;--txt:#e8f1ff;--muted:#bdd0ee;--accent:#7dd3fc}
    *{box-sizing:border-box}
    body{margin:0;color:var(--txt);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0b1020;min-height:100svh}
    .bg{position:fixed;inset:0;background:url('./generated/2026-03-02/smoke-lab-bg.png') center/cover no-repeat;filter:brightness(.55) saturate(1.15)}
    .veil{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(9,14,28,.72),rgba(10,15,30,.84))}
    .wrap{position:relative;z-index:2;max-width:980px;margin:0 auto;padding:14px}
    .card{background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 12px 34px rgba(0,0,0,.28)}
    .title{font-size:clamp(1.2rem,3.2vw,2rem);text-align:center;font-weight:800;letter-spacing:.02em}
    .row{display:grid;gap:10px;grid-template-columns:1fr}
    @media(min-width:920px){.row{grid-template-columns:1fr 1fr}}
    h2{margin:.2rem 0 8px;font-size:1.03rem;color:#d8ebff}
    input,textarea,select{width:100%;background:#0b1630;color:#e8f1ff;border:1px solid #3e5179;border-radius:12px;padding:10px;margin-top:6px}
    textarea{min-height:76px}
    .actions{display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap;align-items:center}
    button,a.btn{background:linear-gradient(90deg,#2d6bff,#8358ff);color:#fff;border:none;padding:10px 12px;border-radius:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
    a.btn.ghost,button.ghost{background:#1b2a49;border:1px solid #4a6392}
    .muted{color:var(--muted);font-size:.92rem}
    .out{white-space:pre-wrap;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.84rem;background:#081021;border:1px solid #2c3f63;border-radius:12px;padding:10px;max-height:260px;overflow:auto}
    .ok{color:#86efac}.bad{color:#fca5a5}
    img.preview{max-width:100%;border-radius:12px;border:1px solid #3d5583;margin-top:8px}
  </style>
</head>
<body>
<div class="bg"></div><div class="veil"></div>
<div class="wrap">
  <div class="card">
    <div class="title">Gemini API Key + Model ID Test</div>
    <div class="row" style="margin-top:10px">
      <label>Gemini API key <input id="apiKey" type="password" placeholder="AIza..." /></label>
      <label>Chat model (for Ping Tester)
        <select id="chatModel"></select>
      </label>
    </div>
    <div class="actions" style="margin-top:10px">
      <div>
        <button onclick="listModels()">Fetch Available Models</button>
        <div class="muted">Pulls your live model list from the API and refreshes all test dropdowns.</div>
      </div>
      <div style="text-align:right">
        <a class="btn ghost" href="https://ai.google.dev/gemini-api/docs/models" target="_blank" rel="noopener">Open Google Model Docs</a>
        <div class="muted">Opens official model docs in a new tab for current capabilities.</div>
      </div>
    </div>
    <div id="modelsStatus" class="muted" style="margin-top:8px"></div>
    <div id="modelsOut" class="out" style="margin-top:8px;display:none"></div>
  </div>

  <div class="card">
    <h2>💬 Chat / Ping Tester</h2>
    <div class="row">
      <label>Manual override chat model ID <input id="chatCustom" placeholder="optional: paste any model id" /></label>
      <label>Chat prompt <textarea id="chatPrompt">Give me a short heartbeat check and one practical suggestion for testing this model.</textarea></label>
    </div>
    <button onclick="runChat()">Run Chat Test</button>
    <button class="ghost" onclick="quickPing()">Quick Ping</button>
    <div id="chatStatus" class="muted" style="margin-top:8px"></div>
    <div id="chatOut" class="out" style="margin-top:8px"></div>
  </div>

  <div class="card">
    <h2>🖼️ Image Test</h2>
    <div class="row">
      <label>Model ID <select id="imgModel"></select></label>
      <label>Manual override model ID <input id="imgCustom" placeholder="paste any model id"></label>
    </div>
    <label>Prompt <input id="imgPrompt" value="Futuristic neon observatory above clouds, cinematic lighting"></label>
    <button onclick="runImage()">Run Image Test</button>
    <div id="imgStatus" class="muted" style="margin-top:8px"></div>
    <img id="imgPreview" class="preview" style="display:none"/>
    <div id="imgOut" class="out" style="margin-top:8px"></div>
  </div>

  <div class="card">
    <h2>🗣️ Speech Test</h2>
    <div class="row">
      <label>Model ID <select id="ttsModel"></select></label>
      <label>Manual override model ID <input id="ttsCustom" placeholder="paste any model id"></label>
    </div>
    <div class="row">
      <label>Voice <input id="ttsVoice" value="Kore"></label>
      <label>Text <textarea id="ttsText">Build with courage. Ship with taste. Let consistency turn ambition into proof.</textarea></label>
    </div>
    <button onclick="runSpeech()">Run Speech Test</button>
    <div id="ttsStatus" class="muted" style="margin-top:8px"></div>
    <audio id="ttsAudio" controls style="margin-top:8px;display:none"></audio>
    <div id="ttsOut" class="out" style="margin-top:8px"></div>
  </div>

  <div class="row">
    <div class="card">
      <h2>🎵 Music Test</h2>
      <label>Model ID <select id="musicModel"></select></label>
      <label>Manual override model ID <input id="musicCustom" placeholder="paste any model id"></label>
      <label>Prompt <textarea id="musicPrompt">Ambient synthwave with warm pads and subtle arpeggio, 12 seconds.</textarea></label>
      <button onclick="runGeneric('music')">Run Music Smoke Test</button>
      <div id="musicStatus" class="muted" style="margin-top:8px"></div>
      <div id="musicOut" class="out" style="margin-top:8px"></div>
    </div>
    <div class="card">
      <h2>🎬 Video Test</h2>
      <label>Model ID <select id="videoModel"></select></label>
      <label>Manual override model ID <input id="videoCustom" placeholder="paste any model id"></label>
      <label>Prompt <textarea id="videoPrompt">Slow cinematic flythrough of a luminous crystal canyon at dusk.</textarea></label>
      <button onclick="runGeneric('video')">Run Video Smoke Test</button>
      <div id="videoStatus" class="muted" style="margin-top:8px"></div>
      <div id="videoOut" class="out" style="margin-top:8px"></div>
    </div>
  </div>
</div>

<script>
let modelCache=[];
const BASE='https://generativelanguage.googleapis.com/v1beta';
const FALLBACK={image:['gemini-3.1-flash-image-preview','gemini-2.5-flash-image'],speech:['gemini-2.5-flash-preview-tts','gemini-2.0-flash'],music:['lyria-002','lyria-real-time-exp'],video:['veo-2.0-generate-001','veo-3.0-generate-preview'],chat:['gemini-2.5-flash','gemini-2.0-flash']};
const el=id=>document.getElementById(id);
const setStatus=(id,msg,ok)=>el(id).innerHTML=`<span class="${ok?'ok':'bad'}">${ok?'✅':'❌'} ${msg}</span>`;
const key=()=>el('apiKey').value.trim();
const laneOf=n=>{n=n.toLowerCase(); if(n.includes('image'))return'image'; if(n.includes('tts')||n.includes('speech'))return'speech'; if(n.includes('lyria')||n.includes('music'))return'music'; if(n.includes('veo')||n.includes('video'))return'video'; return'chat';};
function render(id,list){const s=el(id); s.innerHTML=''; [...new Set(list)].filter(Boolean).forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;s.appendChild(o);});}
function seed(){render('imgModel',FALLBACK.image);render('ttsModel',FALLBACK.speech);render('musicModel',FALLBACK.music);render('videoModel',FALLBACK.video);render('chatModel',FALLBACK.chat);}
function filterAll(){const all=modelCache.length?modelCache:Object.values(FALLBACK).flat(); render('imgModel',all.filter(m=>laneOf(m)==='image').concat(FALLBACK.image)); render('ttsModel',all.filter(m=>laneOf(m)==='speech').concat(FALLBACK.speech)); render('musicModel',all.filter(m=>laneOf(m)==='music').concat(FALLBACK.music)); render('videoModel',all.filter(m=>laneOf(m)==='video').concat(FALLBACK.video)); render('chatModel',all.filter(m=>laneOf(m)==='chat').concat(FALLBACK.chat));}
async function call(model,payload){ if(!key()) throw new Error('Missing API key'); const url=`${BASE}/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(key())}`; const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(payload)}); const j=await r.json().catch(()=>({})); return {ok:r.ok,status:r.status,json:j};}
async function listModels(){ if(!key()){setStatus('modelsStatus','Missing API key',false); return;} const r=await fetch(`${BASE}/models?key=${encodeURIComponent(key())}`); const j=await r.json().catch(()=>({})); el('modelsOut').style.display='block'; el('modelsOut').textContent=JSON.stringify(j,null,2); if(!r.ok){setStatus('modelsStatus',`Fetch failed (${r.status})`,false); return;} modelCache=(j.models||[]).map(m=>m.name?.replace('models/','')).filter(Boolean); filterAll(); setStatus('modelsStatus',`Loaded ${modelCache.length} models into lane-specific dropdowns.`,true);}
const modelFor=k=>(el(k+'Custom')?.value||'').trim()||(el(k+'Model')?.value||'').trim();
function b64ToBytes(b64){const bin=atob(b64),arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr;}
function wavWrap(pcm,sr=24000,ch=1,b=16){const n=pcm.length,buf=new ArrayBuffer(44+n),v=new DataView(buf),w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};w(0,'RIFF');v.setUint32(4,36+n,true);w(8,'WAVE');w(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,ch,true);v.setUint32(24,sr,true);v.setUint32(28,sr*ch*(b/8),true);v.setUint16(32,ch*(b/8),true);v.setUint16(34,b,true);w(36,'data');v.setUint32(40,n,true);new Uint8Array(buf,44).set(pcm);return new Blob([buf],{type:'audio/wav'});}
async function runChat(){const m=modelFor('chat'),p=el('chatPrompt').value.trim();const out=el('chatOut');out.textContent='Running...'; if(!m){setStatus('chatStatus','Model required',false);return;} const res=await call(m,{contents:[{parts:[{text:p}]}]}); const txt=(res.json?.candidates?.[0]?.content?.parts||[]).map(x=>x.text||'').join('\n').trim(); out.textContent=(txt||'')+'\n\n--- RAW ---\n'+JSON.stringify(res.json,null,2); setStatus('chatStatus',res.ok?`Chat ok (${m})`:`Chat failed (${res.status})`,res.ok);} 
async function quickPing(){el('chatPrompt').value='Reply with exactly: PONG'; await runChat();}
async function runImage(){const m=modelFor('img'),p=el('imgPrompt').value.trim();const out=el('imgOut'); out.textContent='Running...';el('imgPreview').style.display='none'; if(!m){setStatus('imgStatus','Model required',false);return;} const res=await call(m,{contents:[{parts:[{text:p}]}],generationConfig:{responseModalities:['TEXT','IMAGE']}}); out.textContent=JSON.stringify(res.json,null,2); const parts=res.json?.candidates?.[0]?.content?.parts||[];const pp=parts.find(x=>x.inlineData?.data||x.inline_data?.data); const b64=pp?.inlineData?.data||pp?.inline_data?.data; const mime=pp?.inlineData?.mimeType||pp?.inline_data?.mime_type||'image/png'; if(res.ok&&b64){el('imgPreview').src=`data:${mime};base64,${b64}`;el('imgPreview').style.display='block';setStatus('imgStatus',`Image ok (${m})`,true);} else setStatus('imgStatus',`Image failed (${res.status})`,false);} 
async function runSpeech(){const m=modelFor('tts'),v=el('ttsVoice').value.trim()||'Kore',t=el('ttsText').value.trim();const out=el('ttsOut');out.textContent='Running...';el('ttsAudio').style.display='none'; if(!m){setStatus('ttsStatus','Model required',false);return;} const res=await call(m,{contents:[{parts:[{text:t}]}],generationConfig:{responseModalities:['AUDIO'],speechConfig:{voiceConfig:{prebuiltVoiceConfig:{voiceName:v}}}}}); out.textContent=JSON.stringify(res.json,null,2); const parts=res.json?.candidates?.[0]?.content?.parts||[];const pp=parts.find(x=>x.inlineData?.data||x.inline_data?.data); const b64=pp?.inlineData?.data||pp?.inline_data?.data; const mime=pp?.inlineData?.mimeType||pp?.inline_data?.mime_type||''; if(res.ok&&b64){const bytes=b64ToBytes(b64); const blob=(mime.includes('audio/L16')||mime.includes('audio/pcm')||!mime)?wavWrap(bytes):new Blob([bytes],{type:mime||'audio/wav'}); const a=el('ttsAudio'); a.src=URL.createObjectURL(blob); a.style.display='block'; a.play().catch(()=>{}); setStatus('ttsStatus',`Speech ok (${m})`,true);} else setStatus('ttsStatus',`Speech failed (${res.status})`,false);} 
async function runGeneric(k){const m=modelFor(k),p=el(k+'Prompt').value.trim();const out=el(k+'Out');out.textContent='Running...'; if(!m){setStatus(k+'Status','Model required',false);return;} const res=await call(m,{contents:[{parts:[{text:p}]}],generationConfig:{responseModalities:[k==='video'?'VIDEO':'AUDIO']}}); out.textContent=JSON.stringify(res.json,null,2); setStatus(k+'Status',res.ok?`${k} call ok (${m})`:`${k} call failed (${res.status})`,res.ok);} 
seed(); filterAll();
</script>
</body>
</html>
