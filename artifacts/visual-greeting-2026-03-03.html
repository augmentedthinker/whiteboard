<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saber's Visual Greeting</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e; /* Dark, calm background */
            color: #e0e0e0; /* Light text */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            flex-direction: column;
        }
        .container {
            background-color: #2a2a4a; /* Slightly lighter, calm container */
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            border: 1px solid #4a4a7a;
        }
        h1 {
            color: #9c4eff; /* A subtle accent color, like a calm purple/blue */
            margin-bottom: 20px;
            font-size: 2.5em;
            font-weight: 600;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #00d4ff; /* Another subtle accent, cool cyan */
            margin-top: 20px;
        }
        .subtle-element {
            width: 80px;
            height: 4px;
            background-color: #6b3eff; /* Accent line */
            margin: 20px auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Greetings.</h1>
        <div class="subtle-element"></div>
        <p>
            Saber is online and ready.<br>
            Let's build something meaningful today.
        </p>
        <div class="logo">⚔️</div>
    </div>
</body>
</html>
