<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Identity Redraft Studio · 2026-03-10</title>
  <style>
    :root{--bg:#07101d;--panel:#0d1728;--line:#243a66;--text:#edf5ff;--muted:#a9bfdc;--accent:#8dd8ff}
    *{box-sizing:border-box} html,body{margin:0}
    body{font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#0a1323,#050a14);color:var(--text);min-height:100vh}
    .top{position:sticky;top:0;z-index:10;background:rgba(5,10,20,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    .topin{max-width:1400px;margin:0 auto;padding:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    a.btn,button.btn{border:1px solid var(--line);background:linear-gradient(135deg,#101d33,#0d1728);color:var(--text);padding:10px 14px;border-radius:999px;text-decoration:none;font-weight:700}
    button.primary{background:linear-gradient(135deg,#8dd8ff,#7a92ff);color:#07101d;border:0}
    .wrap{max-width:1400px;margin:0 auto;padding:16px}
    h1{margin:0 0 6px;font-size:clamp(1.3rem,4vw,2rem)}
    .sub{margin:0 0 14px;color:var(--muted);line-height:1.6}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .pane{border:1px solid var(--line);border-radius:16px;background:linear-gradient(160deg, rgba(15,25,42,.94), rgba(9,15,28,.92));min-height:70vh;display:flex;flex-direction:column;overflow:hidden}
    .head{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:rgba(9,15,28,.75)}
    .head strong{font-size:.95rem}
    .head span{color:var(--muted);font-size:.8rem}
    .doc{padding:16px;overflow:auto}
    .doc h1,.doc h2,.doc h3{line-height:1.25}
    .doc p,.doc li{line-height:1.72}
    .doc code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:6px}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.pane{min-height:48vh}}
  </style>

<style id="rv-mobile-opt-style">
  html{-webkit-text-size-adjust:100%}
  body{overflow-x:hidden}
  img,video,canvas,iframe{max-width:100%;height:auto}
  *{word-wrap:break-word}
  @media (max-width: 768px){
    .container,.wrap,.doc-wrap,.hero,.topbar-inner,main{max-width:100% !important}
    body{padding-left:max(10px, env(safe-area-inset-left));padding-right:max(10px, env(safe-area-inset-right))}
  }
</style>

<style id="rv-home-fab-style">
  .rv-home-fab,.rv-fullscreen-fab,.rv-back-fab{position:fixed;z-index:9999;width:46px;height:46px;border-radius:999px;border:1px solid rgba(126,186,255,.95);background:#2f8cff;color:#eaf5ff;display:grid;place-items:center;font-size:18px;font-weight:800;box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(8px);touch-action:none;user-select:none;text-decoration:none}
  .rv-home-fab{left:max(10px, env(safe-area-inset-left));top:max(10px, env(safe-area-inset-top));cursor:grab}
  .rv-fullscreen-fab{right:max(10px, env(safe-area-inset-right));top:max(10px, env(safe-area-inset-top));cursor:grab}
  .rv-back-fab{left:max(10px, env(safe-area-inset-left));bottom:max(10px, env(safe-area-inset-bottom));cursor:grab}
  .rv-home-fab.dragging,.rv-fullscreen-fab.dragging,.rv-back-fab.dragging{cursor:grabbing}
  .rv-hidden-back-nav{display:none !important}
</style>
</head>
<body>
  <div class="top"><div class="topin"><a class="btn" href="../../today/index.html">← Today’s Artifacts</a><a class="btn" href="./signature.html">🧠 Signature</a><button class="btn primary" id="reloadBtn">Reload</button><span id="status" style="color:#a9bfdc"></span></div></div>
  <main class="wrap">
    <h1>Identity Redraft Studio · 2026-03-10</h1>
    <p class="sub">Left: current <code>IDENTITY.md</code>. Right: draft v2 proposal. We can iterate quickly and then promote the draft when ready.</p>
    <div class="grid">
      <section class="pane"><div class="head"><strong>Current Identity (Original)</strong><span>source of truth</span></div><article id="left" class="doc"></article></section>
      <section class="pane"><div class="head"><strong>Proposed Identity (Draft v2)</strong><span>editable candidate</span></div><article id="right" class="doc"></article></section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const status=document.getElementById('status');
    async function loadOne(path,id){const r=await fetch(path,{cache:'no-store'}); if(!r.ok) throw new Error('Failed '+path); const t=await r.text(); document.getElementById(id).innerHTML=marked.parse(t);} 
    async function load(){status.textContent='Loading...'; try{await Promise.all([loadOne('./original.md','left'),loadOne('./draft.md','right')]); status.textContent='Ready';}catch(e){status.textContent='Error'; alert(e.message)}}
    document.getElementById('reloadBtn').addEventListener('click',load); load();
  </script>

<a id="rvHomeFab" class="rv-home-fab" href="#" aria-label="Back to menu page" title="Back to menu page">⌂</a>
<button id="rvFullscreenFab" class="rv-fullscreen-fab" type="button" aria-label="Toggle fullscreen" title="Toggle fullscreen">⛶</button>
<button id="rvBackFab" class="rv-back-fab" type="button" aria-label="Go back" title="Go back">←</button>
<script id="rv-home-fab-script">
(function(){
  const fab=document.getElementById('rvHomeFab');
  const fsFab=document.getElementById('rvFullscreenFab');
  const backFab=document.getElementById('rvBackFab');
  if(!fab || !fsFab || !backFab) return;
  const path=location.pathname;
  const marker='/remote-viewer/';
  const idx=path.indexOf(marker);
  const href=idx>=0 ? path.slice(0, idx + marker.length) : '/';
  fab.setAttribute('href', href);

  const clamp=(v,min,max)=>Math.max(min, Math.min(max, v));
  const placeFromStorage=(el,key,side='left')=>{
    try {
      const raw=localStorage.getItem(key); if(!raw) return;
      const pos=JSON.parse(raw);
      const maxLeft=window.innerWidth-el.offsetWidth-6;
      const maxTop=window.innerHeight-el.offsetHeight-6;
      const left=clamp(pos.left ?? (side==='left'?10:maxLeft), 6, maxLeft);
      const top=clamp(pos.top ?? 10, 6, maxTop);
      el.style.left=left+'px'; el.style.top=top+'px'; el.style.right='auto'; el.style.bottom='auto';
    } catch(_) {}
  };
  const savePos=(el,key)=>{ try{ localStorage.setItem(key, JSON.stringify({left:el.offsetLeft, top:el.offsetTop})); }catch(_){} };

  function wireDraggable(el,key,onClick){
    let drag=null,moved=false;
    el.addEventListener('pointerdown',(e)=>{ drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:el.offsetLeft,top:el.offsetTop}; moved=false; el.classList.add('dragging'); el.setPointerCapture(e.pointerId); e.preventDefault();});
    el.addEventListener('pointermove',(e)=>{ if(!drag||e.pointerId!==drag.id) return; const dx=e.clientX-drag.startX, dy=e.clientY-drag.startY; if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true; const maxLeft=window.innerWidth-el.offsetWidth-6, maxTop=window.innerHeight-el.offsetHeight-6; const nextLeft=clamp(drag.left+dx,6,maxLeft), nextTop=clamp(drag.top+dy,6,maxTop); el.style.left=nextLeft+'px'; el.style.top=nextTop+'px'; el.style.right='auto'; el.style.bottom='auto'; });
    el.addEventListener('pointerup', async (e)=>{ if(!drag||e.pointerId!==drag.id) return; el.classList.remove('dragging'); try{el.releasePointerCapture(e.pointerId);}catch(_){} const wasMoved=moved; drag=null; savePos(el,key); if(!wasMoved && onClick) await onClick(e); });
    el.addEventListener('pointercancel',()=>{ el.classList.remove('dragging'); drag=null; savePos(el,key);});
    el.addEventListener('click',(e)=>{ if(moved){e.preventDefault(); moved=false;} });
  }

  const isFullscreen=()=>!!(document.fullscreenElement || document.webkitFullscreenElement);
  const syncFsIcon=()=>{ fsFab.textContent=isFullscreen() ? '🡼' : '⛶'; };
  const toggleFullscreen=async()=>{
    try{
      const target=document.documentElement;
      if(!isFullscreen()){
        if(target.requestFullscreen) await target.requestFullscreen();
        else if(target.webkitRequestFullscreen) target.webkitRequestFullscreen();
        try{localStorage.setItem('rvFullscreenPreferred','1')}catch(_){}
      } else {
        if(document.exitFullscreen) await document.exitFullscreen();
        else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
        try{localStorage.setItem('rvFullscreenPreferred','0')}catch(_){}
      }
    }catch(_){}
    syncFsIcon();
  };

  const goBack=()=>{
    if(window.history.length>1){ window.history.back(); }
    else { window.location.href=href; }
  };

  placeFromStorage(fab,'rvHomeFabPos','left');
  placeFromStorage(fsFab,'rvFullscreenFabPos','right');
  placeFromStorage(backFab,'rvBackFabPos','left');
  wireDraggable(fab,'rvHomeFabPos');
  wireDraggable(fsFab,'rvFullscreenFabPos',toggleFullscreen);
  wireDraggable(backFab,'rvBackFabPos',goBack);
  document.addEventListener('fullscreenchange',syncFsIcon);
  document.addEventListener('webkitfullscreenchange',syncFsIcon);
  syncFsIcon();
})();
</script>

</body>
</html>
