<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Identity Redraft Studio · 2026-03-10</title>
  <style>
    :root{--bg:#07101d;--panel:#0d1728;--line:#243a66;--text:#edf5ff;--muted:#a9bfdc;--accent:#8dd8ff}
    *{box-sizing:border-box} html,body{margin:0}
    body{font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#0a1323,#050a14);color:var(--text);min-height:100vh}
    .top{position:sticky;top:0;z-index:10;background:rgba(5,10,20,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
    .topin{max-width:1400px;margin:0 auto;padding:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    a.btn,button.btn{border:1px solid var(--line);background:linear-gradient(135deg,#101d33,#0d1728);color:var(--text);padding:10px 14px;border-radius:999px;text-decoration:none;font-weight:700}
    button.primary{background:linear-gradient(135deg,#8dd8ff,#7a92ff);color:#07101d;border:0}
    .wrap{max-width:1400px;margin:0 auto;padding:16px}
    h1{margin:0 0 6px;font-size:clamp(1.3rem,4vw,2rem)}
    .sub{margin:0 0 14px;color:var(--muted);line-height:1.6}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .pane{border:1px solid var(--line);border-radius:16px;background:linear-gradient(160deg, rgba(15,25,42,.94), rgba(9,15,28,.92));min-height:70vh;display:flex;flex-direction:column;overflow:hidden}
    .head{padding:10px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;background:rgba(9,15,28,.75)}
    .head strong{font-size:.95rem}
    .head span{color:var(--muted);font-size:.8rem}
    .doc{padding:16px;overflow:auto}
    .doc h1,.doc h2,.doc h3{line-height:1.25}
    .doc p,.doc li{line-height:1.72}
    .doc code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:6px}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.pane{min-height:48vh}}
  </style>
</head>
<body>
  <div class="top"><div class="topin"><a class="btn" href="../../today/index.html">← Today’s Artifacts</a><a class="btn" href="./signature.html">🧠 Signature</a><button class="btn primary" id="reloadBtn">Reload</button><span id="status" style="color:#a9bfdc"></span></div></div>
  <main class="wrap">
    <h1>Identity Redraft Studio · 2026-03-10</h1>
    <p class="sub">Left: current <code>IDENTITY.md</code>. Right: draft v2 proposal. We can iterate quickly and then promote the draft when ready.</p>
    <div class="grid">
      <section class="pane"><div class="head"><strong>Current Identity (Original)</strong><span>source of truth</span></div><article id="left" class="doc"></article></section>
      <section class="pane"><div class="head"><strong>Proposed Identity (Draft v2)</strong><span>editable candidate</span></div><article id="right" class="doc"></article></section>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const status=document.getElementById('status');
    async function loadOne(path,id){const r=await fetch(path,{cache:'no-store'}); if(!r.ok) throw new Error('Failed '+path); const t=await r.text(); document.getElementById(id).innerHTML=marked.parse(t);} 
    async function load(){status.textContent='Loading...'; try{await Promise.all([loadOne('./original.md','left'),loadOne('./draft.md','right')]); status.textContent='Ready';}catch(e){status.textContent='Error'; alert(e.message)}}
    document.getElementById('reloadBtn').addEventListener('click',load); load();
  </script>
</body>
</html>
