<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresh Morning Greeting — 2026-03-06</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box} html,body{margin:0;height:100%;overflow:hidden;font-family:Inter,system-ui;background:#07101f;color:#eef5ff}
    body{display:grid;place-items:center;position:relative}
    .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(108%) contrast(104%);transform:scale(1.03)}
    .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,10,24,.2),rgba(5,10,24,.68))}
    .card{position:relative;z-index:2;width:min(92vw,760px);padding:26px 24px;border-radius:20px;border:1px solid rgba(185,219,255,.34);background:rgba(8,14,30,.58);backdrop-filter:blur(8px);text-align:center;box-shadow:0 22px 60px rgba(0,0,0,.35)}
    .chip{display:inline-block;font:600 11px/1 Space Grotesk,sans-serif;letter-spacing:.18em;text-transform:uppercase;padding:8px 11px;border-radius:999px;border:1px solid rgba(185,219,255,.34);color:rgba(225,238,255,.85)}
    h1{margin:14px 0 8px;font-family:Space Grotesk,sans-serif;font-size:clamp(1.9rem,5.5vw,3.1rem);line-height:1.05;text-transform:uppercase}
    p{margin:0 auto;color:rgba(225,238,255,.86);max-width:58ch;line-height:1.5}
    .actions{margin-top:16px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
    button{border:none;border-radius:11px;padding:10px 14px;font-weight:700;cursor:pointer}
    .primary{background:linear-gradient(135deg,#82ccff,#bfe1ff);color:#071226}
    .ghost{background:rgba(10,18,34,.85);color:#eef5ff;border:1px solid rgba(185,219,255,.34)}
    .foot{margin-top:14px;font-size:.78rem;color:rgba(225,238,255,.72)}
    .swap{background:rgba(12,24,42,.86);color:#bfe4ff;border:1px solid rgba(162,213,255,.45);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;border-radius:11px;padding:10px 14px;font-weight:700}
  </style>
</head>
<body>
  <img class="bg" src="bg.jpg" alt="Morning sunrise" />
  <div class="veil"></div>
  <main class="card">
    <span class="chip">Fresh Morning Greeting</span>
    <h1>Happy Friday, Christopher</h1>
    <p id="line">Shift first. Weekend next. Keep it steady and stack one clean win at a time.</p>
    <div class="actions">
      <button id="play" class="primary">▶ Play Greeting</button>
      <button id="mute" class="ghost">🔈 Toggle Mute</button>
      <a class="swap" href="./index-stylebot.html">↔ View StyleBot Pass</a>
    </div>
    <div class="foot">Remote Viewer artifact · 2026-03-06</div>
  </main>
  <script>
    const a = new Audio('voice.wav');
    const line = document.getElementById('line');
    document.getElementById('play').onclick = async () => { try { await a.play(); line.textContent='Voice live. You’re in motion.'; } catch { line.textContent='Tap again to allow playback.'; } };
    document.getElementById('mute').onclick = (e) => { a.muted=!a.muted; e.target.textContent=a.muted?'🔇 Unmute':'🔈 Toggle Mute'; };
    a.onended = () => line.textContent='Greeting complete. Have a strong shift.';
  </script>
</body>
</html>
