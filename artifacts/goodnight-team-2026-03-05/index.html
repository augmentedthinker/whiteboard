<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goodnight, Christopher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --text: #f6f8ff;
            --text-dim: rgba(236, 241, 255, 0.72);
            --line: rgba(255, 255, 255, 0.22);
            --panel: rgba(8, 12, 24, 0.46);
            --panel-deep: rgba(8, 12, 24, 0.72);
            --accent: #c3d4ff;
            --shadow: 0 28px 80px rgba(0, 0, 0, 0.58);
            --ease: cubic-bezier(.22, .61, .36, 1);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #020306;
            color: var(--text);
        }

        body {
            position: relative;
            display: grid;
            place-items: center;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            isolation: isolate;
        }

        .bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            opacity: 0;
            transform: scale(1.03);
            filter: saturate(88%) contrast(104%);
            animation: bgReveal 2800ms var(--ease) forwards;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }

        .veil {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(120% 78% at 50% 100%, rgba(6, 8, 16, 0.25) 0%, rgba(2, 4, 10, 0.82) 60%, rgba(0, 0, 0, 0.95) 100%),
                linear-gradient(180deg, rgba(0, 0, 0, 0.12) 0%, rgba(0, 0, 0, 0.84) 90%);
            pointer-events: none;
        }

        .grain {
            position: absolute;
            inset: -20%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.055) 0.7px, transparent 0.7px);
            background-size: 4px 4px;
            opacity: 0.14;
            mix-blend-mode: soft-light;
            pointer-events: none;
            animation: drift 26s linear infinite;
        }

        .frame {
            position: relative;
            z-index: 3;
            width: min(92vw, 760px);
            padding: clamp(24px, 4.6vw, 42px) clamp(24px, 5.2vw, 54px);
            border-radius: 22px;
            border: 1px solid var(--line);
            background: linear-gradient(165deg, rgba(13, 18, 33, 0.64), var(--panel));
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px) saturate(120%);
            -webkit-backdrop-filter: blur(14px) saturate(120%);
            text-align: center;
            cursor: pointer;
            outline: none;
            opacity: 0;
            transform: translateY(14px) scale(0.985);
            animation: cardReveal 1600ms var(--ease) 220ms forwards;
            transition: transform 700ms var(--ease), filter 900ms var(--ease), background 900ms var(--ease), border-color 900ms var(--ease), box-shadow 900ms var(--ease);
        }

        .frame:focus-visible {
            border-color: rgba(195, 212, 255, 0.75);
            box-shadow: 0 0 0 2px rgba(195, 212, 255, 0.45), var(--shadow);
        }

        .kicker {
            margin: 0 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font: 500 clamp(11px, 1.4vw, 12px)/1.2 "Space Grotesk", Inter, sans-serif;
            color: var(--text-dim);
            opacity: 0;
            transform: translateY(6px);
            animation: fadeUp 1000ms var(--ease) 540ms forwards;
        }

        h1 {
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font: 700 clamp(28px, 6.2vw, 62px)/1.04 "Space Grotesk", Inter, sans-serif;
            text-wrap: balance;
            text-shadow: 0 10px 26px rgba(0, 0, 0, 0.48);
            opacity: 0;
            transform: translateY(8px);
            animation: fadeUp 1100ms var(--ease) 640ms forwards;
        }

        p {
            margin: 14px 0 0;
            font: 400 clamp(14px, 2.1vw, 17px)/1.5 Inter, sans-serif;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-dim);
            opacity: 0;
            transform: translateY(7px);
            animation: fadeUp 1100ms var(--ease) 760ms forwards;
            transition: opacity 700ms var(--ease), filter 700ms var(--ease), letter-spacing 700ms var(--ease), color 700ms var(--ease);
        }

        body.engaged .frame {
            transform: translateY(0) scale(1);
            border-color: rgba(195, 212, 255, 0.58);
            background: linear-gradient(160deg, rgba(11, 16, 30, 0.8), var(--panel-deep));
            filter: saturate(110%);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.62), 0 0 0 1px rgba(195, 212, 255, 0.14);
        }

        body.engaged p {
            color: var(--accent);
            letter-spacing: 0.16em;
        }

        body.ending .frame,
        body.ending h1,
        body.ending p,
        body.ending .kicker {
            animation: fadeOut 2400ms var(--ease) forwards;
        }

        body.ending .bg {
            animation: bgReveal 1500ms var(--ease) forwards, soften 2600ms var(--ease) 180ms forwards;
        }

        @keyframes bgReveal {
            from { opacity: 0; transform: scale(1.06); filter: blur(6px) saturate(80%) contrast(95%); }
            to   { opacity: 0.66; transform: scale(1.01); filter: blur(0px) saturate(90%) contrast(104%); }
        }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(18px) scale(0.98); filter: blur(8px); }
            to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); filter: blur(6px); }
            to   { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes fadeOut {
            0%   { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); }
            100% { opacity: 0; filter: blur(14px); transform: translateY(10px) scale(0.985); }
        }

        @keyframes soften {
            0% { filter: blur(0) brightness(1); }
            100% { filter: blur(2px) brightness(0.85); }
        }

        @keyframes drift {
            from { transform: translate3d(0, 0, 0); }
            to { transform: translate3d(-6%, -4%, 0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 1ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <img class="bg" src="bg.jpg" alt="Night backdrop" />
    <div class="veil" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <main class="frame" id="trigger" role="button" tabindex="0" aria-label="Initiate sleep cycle">
        <p class="kicker">Night Protocol</p>
        <h1>SYSTEMS SECURE</h1>
        <p id="status">Tap to initiate sleep cycle</p>
    </main>

    <script>
        const audio = new Audio('voice.wav');
        const trigger = document.getElementById('trigger');
        const status = document.getElementById('status');
        let played = false;

        const engage = () => {
            if (played) return;
            played = true;
            document.body.classList.add('engaged');
            status.textContent = 'Rest mode engaged';
            audio.play().catch(() => {});
            setTimeout(() => {
                document.body.classList.add('ending');
            }, 1400);
        };

        trigger.addEventListener('click', engage);
        trigger.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                engage();
            }
        });
    </script>
</body>
</html>
