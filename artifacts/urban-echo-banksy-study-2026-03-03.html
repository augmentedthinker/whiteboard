<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Urban Echo — Banksy Study — 2026-03-03</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;700&display=swap');
    html,body{margin:0;height:100%;background:#05070b;color:#e9eef8;font-family:Inter,system-ui,sans-serif;overflow:hidden}
    .scene{position:fixed;inset:0}
    .bg{position:absolute;inset:-3%;background:url('./generated/2026-03-03/banksy-layer-bg.png') center/cover no-repeat;filter:contrast(1.06) saturate(0.88)}
    .grain{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.05) 0.6px, transparent 0.6px);background-size:2px 2px;mix-blend-mode:soft-light;opacity:.32}
    .vignette{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 45%, transparent 35%, rgba(0,0,0,.7) 100%)}

    canvas{position:absolute;inset:0;width:100%;height:100%}

    .hud{position:fixed;left:50%;transform:translateX(-50%);bottom:max(14px,env(safe-area-inset-bottom));width:min(980px,92vw);border:1px solid rgba(170,192,220,.28);border-radius:14px;background:rgba(9,13,20,.64);backdrop-filter:blur(8px);padding:12px 14px}
    .title{font-family:'Space Grotesk',Inter,sans-serif;font-size:clamp(1rem,2.8vw,1.6rem);letter-spacing:.03em;margin:0 0 4px}
    .copy{margin:0;color:#b8c8de;font-size:clamp(.78rem,1.7vw,.95rem);line-height:1.4}
    .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
    .chip{font-size:.7rem;padding:4px 8px;border-radius:999px;border:1px solid rgba(151,189,234,.3);background:rgba(13,20,31,.56);color:#cde2ff}
    .back{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;text-decoration:none;color:#d8e9ff;border:1px solid rgba(151,189,234,.38);background:rgba(10,16,26,.6);padding:8px 11px;border-radius:999px;font-size:.82rem}
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="bg" id="bg"></div>
    <canvas id="paint"></canvas>
    <div class="grain"></div>
    <div class="vignette"></div>
  </div>

  <a class="back" href="../today/index.html">← Today</a>

  <section class="hud">
    <h1 class="title">Urban Echo · Banksy-Inspired Study</h1>
    <p class="copy">A layered protest-wall experience: stencil atmosphere, drifting particulate paint, parallax motion, and interaction-triggered spray bursts.</p>
    <div class="chips">
      <span class="chip">Move pointer / tilt device</span>
      <span class="chip">Tap to spray pulse</span>
      <span class="chip">Static-only runtime</span>
    </div>
  </section>

  <script>
    const bg = document.getElementById('bg');
    const canvas = document.getElementById('paint');
    const ctx = canvas.getContext('2d');
    let w=0,h=0,dpr=Math.min(devicePixelRatio||1,2);
    let mx=0,my=0,tx=0,ty=0;
    const dots=[];

    function resize(){
      w=innerWidth;h=innerHeight;
      canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);
      canvas.style.width=w+'px';canvas.style.height=h+'px';
      ctx.setTransform(dpr,0,0,dpr,0,0);
      if(!dots.length){ for(let i=0;i<170;i++) dots.push(seed(false)); }
    }

    function seed(burst,x=w*0.5,y=h*0.5){
      const a=Math.random()*Math.PI*2;
      return {
        x: burst?x+Math.cos(a)*(Math.random()*40):Math.random()*w,
        y: burst?y+Math.sin(a)*(Math.random()*40):Math.random()*h,
        vx: Math.cos(a)*(burst?(Math.random()*2.8+0.6):(Math.random()*.18+.05)),
        vy: Math.sin(a)*(burst?(Math.random()*2.8+0.6):(Math.random()*.18+.05)),
        r: burst?(Math.random()*2.8+1):(Math.random()*1.6+.3),
        life: burst?(90+Math.random()*70):999999,
        burst
      }
    }

    function spray(x,y){ for(let i=0;i<48;i++) dots.push(seed(true,x,y)); }

    function tick(){
      requestAnimationFrame(tick);
      tx += (mx-tx)*0.05; ty += (my-ty)*0.05;
      bg.style.transform = `translate(${tx*0.015}px, ${ty*0.015}px) scale(1.03)`;
      ctx.clearRect(0,0,w,h);

      for(let i=dots.length-1;i>=0;i--){
        const d=dots[i];
        d.x += d.vx + tx*0.0002;
        d.y += d.vy + ty*0.0002;
        if(d.burst){d.vx*=0.985;d.vy*=0.985;d.life--;}
        if(d.x<-80||d.x>w+80||d.y<-80||d.y>h+80||d.life<=0){
          dots.splice(i,1);
          if(!d.burst) dots.push(seed(false));
          continue;
        }
        const red = d.burst ? 210+Math.random()*45 : 180+Math.random()*30;
        const alpha = d.burst ? Math.max(0,d.life/140)*0.55 : 0.15;
        ctx.beginPath();
        ctx.fillStyle = `hsla(${red}, 85%, ${d.burst?58:70}%, ${alpha})`;
        ctx.shadowBlur = d.burst?16:4;
        ctx.shadowColor = `hsla(${red}, 80%, 58%, ${alpha})`;
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fill();
      }
      ctx.shadowBlur=0;
    }

    addEventListener('mousemove',e=>{mx=e.clientX-w/2;my=e.clientY-h/2});
    addEventListener('touchmove',e=>{const t=e.touches[0]; if(!t) return; mx=t.clientX-w/2; my=t.clientY-h/2;},{passive:true});
    addEventListener('deviceorientation',e=>{mx=(e.gamma||0)*8;my=(e.beta||0)*5});
    addEventListener('click',e=>spray(e.clientX,e.clientY));
    addEventListener('touchstart',e=>{const t=e.touches[0]; if(t) spray(t.clientX,t.clientY)},{passive:true});
    addEventListener('resize',resize);

    resize();
    tick();
  </script>
</body>
</html>
