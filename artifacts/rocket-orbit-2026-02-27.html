<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rocket Orbit — 2026-02-27</title>
  <style>
    :root { --text:#eaf2ff; --panel:rgba(8,14,27,.58); --border:rgba(155,201,255,.35); }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: url('../assets/today-artifacts/2026-02-27/rocket-nebula-bg.png') center/cover no-repeat fixed;
      overflow: hidden;
    }
    .overlay {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, rgba(3,7,14,.35), rgba(3,7,14,.72));
    }
    .hud {
      position: relative;
      z-index: 2;
      margin: 16px;
      max-width: 760px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      backdrop-filter: blur(4px);
    }
    .hud h1 { margin: 0 0 8px; font-size: clamp(1.3rem, 4vw, 2rem); }
    .hud p { margin: 0; opacity: .92; }
    .rocket {
      position: fixed;
      left: 50%; top: 50%;
      width: 56px; height: 56px;
      margin-left: -28px; margin-top: -28px;
      z-index: 3;
      transform-origin: 50% 50%;
      animation: orbit 16s linear infinite;
      filter: drop-shadow(0 0 10px rgba(110,205,255,.85));
      font-size: 42px;
      display: grid; place-items: center;
    }
    .rocket::after {
      content: '';
      position: absolute;
      width: 10px; height: 24px;
      background: radial-gradient(circle at 50% 0%, #fff3a0, #ff7b39 60%, transparent 75%);
      bottom: -14px; left: 23px;
      filter: blur(0.4px);
      animation: flame .14s ease-in-out infinite alternate;
    }
    @keyframes orbit {
      0%   { transform: rotate(0deg) translateX(min(38vw, 220px)) rotate(90deg); }
      25%  { transform: rotate(90deg) translateX(min(30vw, 180px)) rotate(180deg); }
      50%  { transform: rotate(180deg) translateX(min(40vw, 240px)) rotate(270deg); }
      75%  { transform: rotate(270deg) translateX(min(32vw, 190px)) rotate(360deg); }
      100% { transform: rotate(360deg) translateX(min(38vw, 220px)) rotate(450deg); }
    }
    @keyframes flame { from { transform: scaleY(.8);} to { transform: scaleY(1.15);} }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="hud">
    <h1>🚀 Rocket Orbit Demo — 2026-02-27</h1>
    <p>New daily artifact: generated nebula background + rocket animation flying around the screen.</p>
  </div>
  <div class="rocket" aria-label="Animated rocket">🚀</div>
</body>
</html>
