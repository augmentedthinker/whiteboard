<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Today Greeting — 2026-02-27</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#c9d1d9; --accent:#58a6ff; }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);background:radial-gradient(900px 500px at 15% -10%,#2b4f8f66,transparent),radial-gradient(900px 500px at 100% 0,#6a3a9f66,transparent),var(--bg);padding:16px}
    .card{width:min(760px,100%);background:rgba(22,27,34,.88);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 20px 40px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;color:var(--accent);font-size:clamp(1.4rem,4vw,2rem)}
    p{margin:0 0 10px;color:#b8c1ca}
    .date{display:inline-block;margin-top:6px;padding:6px 10px;border-radius:999px;border:1px solid #3a4b60;background:#162232;color:#a8d0ff;font-size:.9rem}
  </style>
</head>
<body>
  <section class="card">
    <h1>Good afternoon, Christopher ⚔️</h1>
    <p>Welcome to today’s artifact lane. Keep it small, visible, and shippable.</p>
    <p>As new builds land, they should be added to the top of the Today's Artifacts page.</p>
    <span class="date">Date: 2026-02-27</span>
  </section>
</body>
</html>
