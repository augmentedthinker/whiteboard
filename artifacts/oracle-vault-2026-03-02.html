<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Oracle Vault — 2026-03-02</title>
  <style>
    :root{--bg:#070b14;--ink:#d9ebff;--accent:#7dd3fc;--hot:#c084fc}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
    .hero{position:relative;min-height:100svh;display:grid;place-items:center;padding:24px}
    .bg{position:absolute;inset:0;background:url('./generated/2026-03-02/observatory.png') center/cover no-repeat;filter:saturate(1.15) contrast(1.06) brightness(.7)}
    .veil{position:absolute;inset:0;background:radial-gradient(circle at 20% 20%,rgba(125,211,252,.22),transparent 45%),radial-gradient(circle at 80% 70%,rgba(192,132,252,.25),transparent 50%),linear-gradient(to top,rgba(4,6,12,.92),rgba(8,11,18,.36));}
    canvas{position:absolute;inset:0;width:100%;height:100%}
    .panel{position:relative;z-index:2;max-width:840px;background:rgba(8,12,20,.55);border:1px solid rgba(125,211,252,.35);backdrop-filter: blur(8px);border-radius:18px;padding:22px;box-shadow:0 20px 70px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;font-size:clamp(1.7rem,5vw,3rem);letter-spacing:.02em}
    .sub{opacity:.9;margin:0 0 16px}
    .quote{font-size:clamp(1rem,2.5vw,1.25rem);line-height:1.5;border-left:3px solid rgba(125,211,252,.6);padding-left:12px;margin:10px 0 18px}
    .row{display:flex;flex-wrap:wrap;gap:10px}
    button,a.btn{appearance:none;border:none;background:linear-gradient(90deg,#2563eb,#7c3aed);color:white;padding:11px 14px;border-radius:11px;font-weight:600;cursor:pointer;text-decoration:none}
    .ghost{background:rgba(20,28,45,.7);border:1px solid rgba(125,211,252,.35)}
    .pulse{display:inline-block;width:10px;height:10px;border-radius:999px;background:#22c55e;box-shadow:0 0 0 0 rgba(34,197,94,.7);animation:pulse 1.8s infinite}
    @keyframes pulse{70%{box-shadow:0 0 0 12px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
    .tiny{font-size:.85rem;opacity:.8;margin-top:12px}
    .scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(to bottom, rgba(160,210,255,.045) 0 1px, transparent 1px 3px);mix-blend-mode:screen;animation:flick 6s linear infinite}
    @keyframes flick{50%{opacity:.75}51%{opacity:.3}52%{opacity:.78}}
  </style>
</head>
<body>
  <section class="hero">
    <div class="bg"></div>
    <canvas id="fx"></canvas>
    <div class="veil"></div>
    <div class="scan"></div>

    <div class="panel">
      <h1>ORACLE VAULT</h1>
      <p class="sub">A one-page cinematic artifact built from generated assets.</p>
      <p class="quote">“Build with courage. Ship with taste. Let consistency turn ambition into proof.”</p>

      <div class="row">
        <button id="playBtn">▶ Play Voice Snippet</button>
        <button id="muteBtn" class="ghost">🔇 Stop Audio</button>
        <a class="btn ghost" href="../today/index.html">← Back to Today</a>
      </div>

      <p class="tiny"><span class="pulse"></span> Generated image + generated voice asset + animated particle/nebula scene.</p>
    </div>
  </section>

  <audio id="voice" preload="auto" src="./generated/2026-03-02/quote.wav"></audio>
  <script>
    const c=document.getElementById('fx'),x=c.getContext('2d'); let w,h,dpr;
    const stars=[...Array(140)].map(()=>({x:Math.random(),y:Math.random(),z:Math.random()}));
    function rs(){dpr=Math.min(devicePixelRatio||1,2);w=innerWidth;h=innerHeight;c.width=w*dpr;c.height=h*dpr;x.setTransform(dpr,0,0,dpr,0,0)}
    addEventListener('resize',rs);rs();
    let t=0; function draw(){t+=0.008;x.clearRect(0,0,w,h);
      for(const s of stars){s.y+=0.0008+s.z*0.0015;if(s.y>1)s.y=0;const px=s.x*w,py=s.y*h;const r=(0.5+s.z*1.8);x.fillStyle=`rgba(${160+Math.floor(s.z*80)},${190+Math.floor(s.z*50)},255,${0.18+s.z*0.7})`;x.beginPath();x.arc(px,py,r,0,7);x.fill();}
      const g=x.createLinearGradient(0,0,w,h);g.addColorStop(0,`rgba(125,211,252,${0.08+Math.sin(t)*0.04})`);g.addColorStop(1,`rgba(192,132,252,${0.08+Math.cos(t*1.2)*0.04})`);x.fillStyle=g;x.fillRect(0,0,w,h);
      requestAnimationFrame(draw);
    } draw();

    const voice=document.getElementById('voice');
    document.getElementById('playBtn').onclick=()=>{voice.currentTime=0;voice.play().catch(()=>{});};
    document.getElementById('muteBtn').onclick=()=>{voice.pause();voice.currentTime=0;};
  </script>
</body>
</html>
