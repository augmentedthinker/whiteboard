<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Prism Gate — 2026-03-02</title>
  <style>
    :root{--bg:#060914;--ink:#dbeafe;--a:#60a5fa;--b:#a78bfa;--c:#22d3ee}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at 20% 15%,rgba(96,165,250,.18),transparent 35%),radial-gradient(circle at 80% 75%,rgba(167,139,250,.15),transparent 40%),var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;min-height:100svh;overflow:hidden}
    canvas{position:fixed;inset:0;width:100%;height:100%}
    .hud{position:fixed;left:12px;right:12px;bottom:12px;display:flex;gap:8px;flex-wrap:wrap;z-index:4}
    button,a{border:1px solid rgba(173,216,255,.4);background:rgba(8,14,28,.65);color:#d9ecff;border-radius:10px;padding:9px 12px;text-decoration:none;font-weight:600;backdrop-filter:blur(6px)}
    .title{position:fixed;top:18px;left:18px;z-index:4;background:rgba(8,14,28,.58);padding:12px 14px;border-radius:12px;border:1px solid rgba(173,216,255,.35)}
    .title h1{margin:0;font-size:clamp(1.1rem,4vw,1.8rem)}
    .title p{margin:2px 0 0;opacity:.85;font-size:.92rem}
  </style>
</head>
<body>
  <canvas id="cv"></canvas>
  <div class="title"><h1>PRISM GATE</h1><p>Tap/click to bend the field</p></div>
  <div class="hud">
    <button id="mode">Mode: Nova</button>
    <button id="pulse">Pulse</button>
    <a href="../today/index.html">← Back to Today</a>
  </div>
  <script>
    const c=document.getElementById('cv'),x=c.getContext('2d');
    let w,h,dpr,t=0,mode=0;
    const pointer={x:.5,y:.5,p:0};
    addEventListener('pointermove',e=>{pointer.x=e.clientX/w;pointer.y=e.clientY/h;pointer.p=1;});
    addEventListener('pointerdown',()=>{pointer.p=1.5;});
    document.getElementById('pulse').onclick=()=>pointer.p=2.2;
    document.getElementById('mode').onclick=(e)=>{mode=(mode+1)%3;e.target.textContent='Mode: '+['Nova','Aurora','Violet'][mode];};
    function rs(){dpr=Math.min(devicePixelRatio||1,2);w=innerWidth;h=innerHeight;c.width=w*dpr;c.height=h*dpr;x.setTransform(dpr,0,0,dpr,0,0)}
    addEventListener('resize',rs);rs();
    function ring(cx,cy,r,a,col){x.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},${a})`;x.lineWidth=1.2;x.beginPath();x.arc(cx,cy,r,0,7);x.stroke();}
    function frame(){t+=0.008;pointer.p*=0.968;x.clearRect(0,0,w,h);
      const sets=[[[96,165,250],[34,211,238]],[[34,197,94],[56,189,248]],[[167,139,250],[244,114,182]]][mode];
      for(let i=0;i<42;i++){
        const k=i/41,ang=t*0.7+i*0.34;
        const cx=w*(.5+Math.cos(ang)*(.08+.26*k)+(pointer.x-.5)*.45*pointer.p*(1-k));
        const cy=h*(.5+Math.sin(ang*1.1)*(.06+.24*k)+(pointer.y-.5)*.45*pointer.p*(1-k));
        const r=(30+i*17)*(1+pointer.p*0.07*Math.sin(t*2+i));
        const col=i%2?sets[0]:sets[1];
        ring(cx,cy,r,0.04+0.08*(1-k),col);
      }
      const g=x.createRadialGradient(w*pointer.x,h*pointer.y,0,w*pointer.x,h*pointer.y,Math.max(w,h)*.55);
      g.addColorStop(0,'rgba(255,255,255,0.09)');g.addColorStop(1,'rgba(255,255,255,0)');
      x.fillStyle=g;x.fillRect(0,0,w,h);
      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
