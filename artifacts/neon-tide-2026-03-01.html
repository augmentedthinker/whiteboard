<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Neon Tide — 2026-03-01</title>
  <style>
    :root{--bg:#070b16;--txt:#d9ecff;--accent:#66e3ff}
    html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,-apple-system,sans-serif}
    canvas{position:fixed;inset:0;width:100%;height:100%}
    .hud{position:fixed;left:50%;transform:translateX(-50%);bottom:max(12px,env(safe-area-inset-bottom));text-align:center;padding:12px 18px;border:1px solid rgba(102,227,255,.25);border-radius:12px;background:rgba(7,11,22,.58);backdrop-filter:blur(10px);max-width:min(92vw,760px);pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,0.45)}
    h1{margin:0;font-size:clamp(1.1rem,3.8vw,1.4rem);letter-spacing:.04em;color:#89eeff;text-transform:uppercase}
    p{margin:.28rem 0 0;opacity:.84;font-size:clamp(.8rem,3vw,.95rem)}
    .sig{position:fixed;top:max(10px,env(safe-area-inset-top));right:max(10px,env(safe-area-inset-right));text-decoration:none;color:#9df2ff;background:rgba(9,16,30,.72);border:1px solid rgba(102,227,255,.45);padding:8px 11px;border-radius:10px;font-size:.84rem;pointer-events:auto}
    .sig:hover{background:rgba(15,24,40,.82)}
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <a class="sig" href="neon-tide-2026-03-01-signature.html">🧠</a>
  <div class="hud">
    <h1>Neon Tide</h1>
    <p>Drag to bend the tide. Tap to release pulse rings.</p>
  </div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let w=0,h=0,dpr=1,t=0;
const pointer = {x:0,y:0,down:false,energy:0};
const ripples = [];

function resize(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  w = window.innerWidth; h = window.innerHeight;
  c.width = w * dpr; c.height = h * dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function setPointer(e,down=true){
  const p = e.touches ? e.touches[0] : e;
  pointer.x = p.clientX; pointer.y = p.clientY;
  pointer.down = down;
  pointer.energy = 1;
}

function addRipple(x,y,strength=1){
  ripples.push({x,y,r:10,a:.55*strength,s:2+Math.random()*2.2});
}

window.addEventListener('resize', resize);
window.addEventListener('mousemove', e=>setPointer(e,pointer.down));
window.addEventListener('mousedown', e=>{ setPointer(e,true); addRipple(pointer.x,pointer.y,1); });
window.addEventListener('mouseup', ()=> pointer.down=false);
window.addEventListener('touchstart', e=>{ setPointer(e,true); addRipple(pointer.x,pointer.y,1); }, {passive:true});
window.addEventListener('touchmove', e=>setPointer(e,true), {passive:true});
window.addEventListener('touchend', ()=> pointer.down=false);

function bg(){
  const g = ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0,'#050914');
  g.addColorStop(.45,'#0a1630');
  g.addColorStop(1,'#090611');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,w,h);
}

function drawField(time){
  const bands = 8;
  for(let b=0;b<bands;b++){
    const yBase = (h/(bands+1))*(b+1);
    ctx.beginPath();
    for(let x=0;x<=w;x+=8){
      const dist = Math.hypot(x-pointer.x,yBase-pointer.y);
      const pull = pointer.energy * 22 * Math.exp(-dist/260);
      const y = yBase + Math.sin((x*0.012)+(time*0.8)+(b*0.9))*18 + pull;
      if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle = `hsla(${185+b*11}, 95%, ${58+b*2}%, ${0.15 + b*0.03})`;
    ctx.lineWidth = 1.2 + b*0.3;
    ctx.stroke();
  }
}

function drawRipples(){
  for(let i=ripples.length-1;i>=0;i--){
    const r = ripples[i];
    r.r += r.s;
    r.a -= 0.007;
    ctx.beginPath();
    ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
    ctx.lineWidth = 2;
    ctx.strokeStyle = `rgba(133, 235, 255, ${Math.max(r.a,0)})`;
    ctx.stroke();
    if(r.a<=0) ripples.splice(i,1);
  }
}

function drawGlow(){
  if(pointer.energy < 0.02) return;
  const rad = 180 * pointer.energy;
  const g = ctx.createRadialGradient(pointer.x,pointer.y,0,pointer.x,pointer.y,rad);
  g.addColorStop(0,`rgba(120, 245, 255, ${0.34*pointer.energy})`);
  g.addColorStop(1,'rgba(120, 245, 255, 0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(pointer.x,pointer.y,rad,0,Math.PI*2);
  ctx.fill();
}

function frame(ms){
  t = ms * 0.001;
  pointer.energy *= pointer.down ? 0.985 : 0.955;
  if(pointer.down && Math.random() > 0.88) addRipple(pointer.x,pointer.y,0.7);

  bg();
  drawField(t);
  drawRipples();
  drawGlow();

  requestAnimationFrame(frame);
}

resize();
pointer.x = window.innerWidth*0.5;
pointer.y = window.innerHeight*0.52;
requestAnimationFrame(frame);
</script>
</body>
</html>
