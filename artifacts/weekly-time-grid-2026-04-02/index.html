<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Weekly Time Grid · 2026-04-02</title>
  <style>
    :root{
      --bg:#fbfaf7;
      --paper:#ffffff;
      --line:#dfd8cc;
      --muted:#6d6458;
      --border:1px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden}
    body{background:var(--bg);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
    .frame{width:100vw;height:100dvh;padding:1px}
    .wrap{width:100%;height:100%;background:var(--paper);overflow:hidden}
    table{width:100%;height:100%;border-collapse:collapse;table-layout:fixed}
    th,td{border:var(--border) solid var(--line);padding:0}
    thead th{height:16px;font-size:8px;letter-spacing:0;text-transform:uppercase;font-weight:700;color:var(--muted);text-align:center;background:#f7f3ec;line-height:1}
    tbody th{font-size:7px;font-weight:700;color:var(--muted);text-align:center;background:#faf7f1;white-space:nowrap;width:20px;line-height:1}
    td{background:#fff}
    tbody tr{height:calc((100dvh - 18px - 2px) / 16)}
    @media (min-width:700px){
      .frame{padding:4px}
      thead th{height:22px;font-size:10px}
      tbody th{font-size:9px;width:34px}
      tbody tr{height:calc((100dvh - 30px - 8px) / 16)}
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="wrap">
      <table aria-label="Weekly time grid from 6 AM to 9 PM">
        <thead>
          <tr>
            <th></th>
            <th>S</th>
            <th>M</th>
            <th>T</th>
            <th>W</th>
            <th>R</th>
            <th>F</th>
            <th>S</th>
          </tr>
        </thead>
        <tbody>
          <tr><th>6A</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>7A</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>8A</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>9A</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>10A</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>11A</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>12P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>1P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>2P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>3P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>4P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>5P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>6P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>7P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>8P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>9P</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
