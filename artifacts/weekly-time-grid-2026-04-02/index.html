<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Weekly Time Grid · 2026-04-02</title>
  <style>
    :root{
      --bg:#fbfaf7;
      --paper:#ffffff;
      --line:#dfd8cc;
      --text:#2b2620;
      --muted:#6d6458;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{background:var(--bg);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--text)}
    .frame{width:100vw;height:100vh;padding:8px}
    .wrap{width:100%;height:100%;border:1px solid var(--line);background:var(--paper);overflow:auto}
    table{width:100%;height:100%;border-collapse:collapse;table-layout:fixed}
    th,td{border:1px solid var(--line);padding:4px 5px}
    thead th{font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--muted);text-align:center;background:#f7f3ec}
    tbody th{font-size:10px;font-weight:700;color:var(--muted);text-align:right;background:#faf7f1;white-space:nowrap;width:62px}
    td{background:#fff}
    tbody tr{height:calc((100vh - 34px) / 17)}
    @media (max-width:700px){
      .frame{padding:4px}
      th,td{padding:2px 3px}
      thead th{font-size:8px}
      tbody th{font-size:8px;width:48px}
      tbody tr{height:calc((100vh - 22px) / 17)}
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="wrap">
      <table aria-label="Weekly time grid from 6 AM to 10 PM">
        <thead>
          <tr>
            <th>Time</th>
            <th>Saturday</th>
            <th>Sunday</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
          </tr>
        </thead>
        <tbody>
          <tr><th>6 AM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>7 AM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>8 AM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>9 AM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>10 AM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>11 AM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>12 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>1 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>2 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>3 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>4 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>5 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>6 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>7 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>8 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>9 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
          <tr><th>10 PM</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
