<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Builder's Canvas | Advanced Scroll Clone</title>
    <style>
        :root {
            --bg-base: #f4f4f0;
            --text-base: #111111;
        }

        @font-face {
            font-family: 'Melange';
            src: local('Georgia'), serif; /* Fallback for their serif/display */
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-base);
            color: var(--text-base);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Spacer to allow scrolling */
        .intro-space {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Parallax Container */
        .scroll-container {
            position: relative;
            min-height: 400vh; /* 4 sections */
        }

        /* The Sticky Stage */
        .sticky-stage {
            position: sticky;
            top: 0;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        /* Massive Typography Mask */
        .title-mask {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%);
            font-family: 'Melange', serif;
            font-size: clamp(6rem, 15vw, 15rem);
            font-weight: normal;
            color: #ffffff;
            mix-blend-mode: difference;
            z-index: 10;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* Image Stack */
        .image-stack {
            position: absolute;
            right: 0;
            top: 0;
            width: 60%;
            height: 100%;
            background: #000;
        }

        .image-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            clip-path: inset(100% 0 0 0); /* Hidden by default via clip-path from bottom */
            will-change: clip-path, transform;
        }

        .image-panel:first-child {
            clip-path: inset(0 0 0 0); /* First image visible */
        }

        /* Custom Indicator / Sidebar */
        .sidebar {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 20;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }
        
        .dot.active {
            background: #ffffff;
            transform: scale(1.5);
        }

        .outro-space {
            height: 100vh;
            background: #111;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="intro-space">
        <div>Scroll Down</div>
    </div>

    <div class="scroll-container" id="scroll-track">
        <div class="sticky-stage">
            <h1 class="title-mask" id="dynamic-title">PROJECT 01</h1>
            
            <div class="image-stack" id="image-stack">
                <img src="https://images.unsplash.com/photo-1600607686527-6fb886090705?q=80&w=2600&auto=format&fit=crop" class="image-panel" alt="Img 1" data-title="HILTON">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop" class="image-panel" alt="Img 2" data-title="RAPPI">
                <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2670&auto=format&fit=crop" class="image-panel" alt="Img 3" data-title="HEY BANCO">
                <img src="https://images.unsplash.com/photo-1558442074-3c19857bc1dc?q=80&w=2574&auto=format&fit=crop" class="image-panel" alt="Img 4" data-title="WALDORF">
            </div>

            <div class="sidebar" id="sidebar">
                <div class="dot active"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <div class="outro-space">
        <div>End of Sequence</div>
    </div>

    <script>
        const track = document.getElementById('scroll-track');
        const panels = document.querySelectorAll('.image-panel');
        const titleMask = document.getElementById('dynamic-title');
        const dots = document.querySelectorAll('.dot');
        
        // Track the scroll progress over the scroll-container
        window.addEventListener('scroll', () => {
            const trackRect = track.getBoundingClientRect();
            const trackTop = trackRect.top;
            const trackHeight = trackRect.height - window.innerHeight;
            
            // Calculate progress from 0 to 1
            let progress = -trackTop / trackHeight;
            if (progress < 0) progress = 0;
            if (progress > 1) progress = 1;

            const totalPanels = panels.length;
            const panelIndexProgress = progress * (totalPanels - 1);
            const activeIndex = Math.floor(panelIndexProgress);
            const fractionalProgress = panelIndexProgress - activeIndex;

            // Update title and dots based on active index
            if(activeIndex >= 0 && activeIndex < totalPanels) {
                const currentTitle = panels[activeIndex].getAttribute('data-title');
                if (titleMask.innerText !== currentTitle) {
                    titleMask.innerText = currentTitle;
                }
                
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === activeIndex);
                });
            }

            // Animate clip-paths to reveal the NEXT image over the CURRENT image
            panels.forEach((panel, index) => {
                if (index < activeIndex) {
                    // Past images are fully revealed
                    panel.style.clipPath = `inset(0 0 0 0)`;
                    panel.style.zIndex = index;
                } else if (index === activeIndex) {
                    // Current active image is fully revealed
                    panel.style.clipPath = `inset(0 0 0 0)`;
                    panel.style.zIndex = index;
                } else if (index === activeIndex + 1) {
                    // Next image slides up (clip-path decreases from 100% to 0%)
                    const insetBottom = (1 - fractionalProgress) * 100;
                    panel.style.clipPath = `inset(${insetBottom}% 0 0 0)`;
                    panel.style.zIndex = index;
                } else {
                    // Future images are hidden
                    panel.style.clipPath = `inset(100% 0 0 0)`;
                    panel.style.zIndex = index;
                }
            });
        });

        // Initialize first render
        window.dispatchEvent(new Event('scroll'));
    </script>
</body>
</html>
