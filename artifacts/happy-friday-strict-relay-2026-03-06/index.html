<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Friday — Strict Team Relay (2026-03-06)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#060d1d;
      --ink:#eef5ff;
      --muted:rgba(225,236,255,.78);
      --panel:rgba(8,14,30,.62);
      --line:rgba(163,203,255,.32);
      --accent:#95d1ff;
      --ease:cubic-bezier(.22,.61,.36,1);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    body{position:relative;display:grid;place-items:center}

    .hero{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.92;transform:scale(1.02);filter:saturate(106%) contrast(103%)}
    .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,10,24,.30),rgba(5,10,24,.68));}

    .shell{position:relative;z-index:2;width:min(94vw,980px);height:min(92vh,760px);display:grid;grid-template-rows:auto auto 1fr auto;gap:14px;padding:18px;border:1px solid var(--line);border-radius:22px;background:linear-gradient(160deg,rgba(11,18,37,.68),var(--panel));backdrop-filter:blur(8px)}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .chip{font:600 11px/1 Space Grotesk,Inter,sans-serif;letter-spacing:.18em;text-transform:uppercase;padding:8px 11px;border-radius:999px;border:1px solid var(--line);background:rgba(9,15,33,.7);color:var(--muted)}
    .status{font-size:.85rem;color:var(--muted)}

    h1{margin:0;font-family:Space Grotesk,Inter,sans-serif;font-size:clamp(1.7rem,5.3vw,3.4rem);line-height:1.05;text-transform:uppercase;letter-spacing:.02em}
    .sub{margin:6px 0 0;color:var(--muted);font-size:clamp(.92rem,2vw,1.03rem)}

    .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;min-height:0}
    .card{position:relative;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:rgba(9,15,31,.65);min-height:120px}
    .card img{width:100%;height:100%;object-fit:cover;display:block}
    .label{position:absolute;left:8px;bottom:8px;background:rgba(6,11,24,.76);border:1px solid rgba(193,222,255,.25);padding:5px 8px;border-radius:999px;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase}

    .voice{padding:14px;display:grid;align-content:center;gap:10px}
    .voice p{margin:0;color:var(--muted)}
    .actions{display:flex;gap:9px;flex-wrap:wrap}
    button{appearance:none;border:none;border-radius:11px;padding:10px 13px;font-weight:600;cursor:pointer}
    .primary{background:linear-gradient(135deg,#7ec9ff,#b8ddff);color:#081226}
    .ghost{background:rgba(11,20,37,.82);color:var(--ink);border:1px solid var(--line)}

    .footer{display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:.77rem;color:var(--muted)}

    /* STYLEBOT_PASS_START */
    .shell{box-shadow:0 24px 64px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,255,255,.05)}
    h1{text-shadow:0 10px 24px rgba(0,0,0,.34)}
    .card{transition:transform .22s var(--ease), border-color .22s var(--ease), box-shadow .22s var(--ease)}
    .card:hover{transform:translateY(-2px);border-color:rgba(184,220,255,.6);box-shadow:0 10px 26px rgba(0,0,0,.28)}
    button{transition:transform .2s var(--ease), filter .2s var(--ease), box-shadow .2s var(--ease)}
    button:hover{transform:translateY(-1px);filter:brightness(1.03);box-shadow:0 8px 20px rgba(0,0,0,.24)}
    .primary{box-shadow:0 8px 22px rgba(126,201,255,.28)}
    .veil{background:radial-gradient(120% 90% at 50% 110%,rgba(3,7,18,.14),rgba(4,10,24,.52) 62%,rgba(2,6,16,.72) 100%),linear-gradient(180deg,rgba(6,12,26,.2),rgba(6,12,26,.6));}
    /* STYLEBOT_PASS_END */

    @media (max-width:800px){
      .shell{padding:14px;height:min(95vh,900px)}
      .grid{grid-template-columns:1fr;grid-template-rows:1fr 1fr 1fr}
      .card{min-height:95px}
    }
  </style>
</head>
<body>
  <img class="hero" src="hero.jpg" alt="Happy Friday sunrise" />
  <div class="veil" aria-hidden="true"></div>

  <main class="shell">
    <div class="top">
      <div class="chip">Strict Team Relay · Friday</div>
      <div class="status">Connection: Green ●</div>
    </div>

    <section>
      <h1>Good Morning, Christopher.</h1>
      <p class="sub">Shift focus now. Weekend earned later. Team lanes executed in order.</p>
    </section>

    <section class="grid">
      <article class="card">
        <img src="panel1.jpg" alt="Focus setup" />
        <span class="label">ImageBot · Focus</span>
      </article>
      <article class="card">
        <img src="panel2.jpg" alt="Weekend horizon" />
        <span class="label">ImageBot · Weekend Arc</span>
      </article>
      <article class="card voice">
        <p id="line">Tap voice to start Friday cadence.</p>
        <div class="actions">
          <button id="play" class="primary">▶ Play Voice</button>
          <button id="mute" class="ghost">🔈 Toggle Mute</button>
        </div>
      </article>
    </section>

    <div class="footer">
      <span>Artifact: happy-friday-strict-relay-2026-03-06</span>
      <a href="../../today/index.html" style="color:var(--accent)">← Back to Today</a>
    </div>
  </main>

  <script>
    const audio = new Audio('voice.wav');
    const playBtn = document.getElementById('play');
    const muteBtn = document.getElementById('mute');
    const line = document.getElementById('line');

    playBtn.addEventListener('click', async () => {
      try { await audio.play(); line.textContent = 'VoiceBot live. Friday momentum active.'; }
      catch { line.textContent = 'Tap again to allow audio playback.'; }
    });
    muteBtn.addEventListener('click', () => {
      audio.muted = !audio.muted;
      muteBtn.textContent = audio.muted ? '🔇 Unmute' : '🔈 Toggle Mute';
    });
    audio.addEventListener('ended', () => { line.textContent = 'Briefing complete. Have a strong shift.'; });
  </script>
</body>
</html>
