<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Assembly — Storyboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syncopate:wght@400;700&display=swap');

        :root {
            --bg: #030408;
            --panel-border: rgba(14, 255, 204, 0.15);
            --panel-border-glow: rgba(14, 255, 204, 0.5);
            --text: #e0e0e0;
            --accent: #0effcc;
            --accent-dim: rgba(14, 255, 204, 0.2);
            --caption-bg: rgba(3, 4, 8, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0a0e1a 0%, #030408 100%);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3vmin;
        }

        /* The main comic-book container */
        .storyboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1.5vmin;
            width: 100%;
            height: 100%;
            max-width: 1800px;
            background: transparent;
            padding: 1vmin;
            position: relative;
            z-index: 1;
        }

        /* Individual Panels */
        .panel {
            position: relative;
            background: #080b12;
            border: 1px solid var(--panel-border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            box-shadow: inset 0 0 0 1px transparent;
            transition: box-shadow 0.4s ease;
            z-index: 5;
            pointer-events: none;
        }

        .panel:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-dim), inset 0 0 40px rgba(0,0,0,0.6);
            transform: scale(1.01);
            z-index: 10;
        }

        .panel:hover::before {
            box-shadow: inset 0 0 0 1px var(--accent);
        }

        /* Layout spanning */
        .panel-1 { grid-column: 1 / 3; grid-row: 1 / 2; } 
        .panel-2 { grid-column: 3 / 5; grid-row: 1 / 3; } 
        .panel-3 { grid-column: 1 / 2; grid-row: 2 / 4; } 
        .panel-4 { grid-column: 2 / 3; grid-row: 2 / 3; } 
        .panel-5 { grid-column: 2 / 5; grid-row: 3 / 4; } 

        /* Image styling */
        .panel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: grayscale(80%) contrast(1.2) brightness(0.8);
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .panel:hover img {
            opacity: 1;
            filter: grayscale(0%) contrast(1.1) brightness(1.1);
            transform: scale(1.05);
        }

        /* Narrative Text Overlays */
        .caption {
            position: absolute;
            background: var(--caption-bg);
            padding: 1vmin 1.5vmin;
            border-left: 3px solid var(--accent);
            font-size: clamp(0.7rem, 1.1vmin, 1.1rem);
            max-width: 85%;
            line-height: 1.5;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 8px rgba(14, 255, 204, 0.4);
            backdrop-filter: blur(8px);
            opacity: 0;
            transform: translateX(-10px);
            animation: slideInText 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            z-index: 6;
        }

        /* Typing cursor effect on captions */
        .caption::after {
            content: '_';
            animation: blink 1s step-end infinite;
            margin-left: 4px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Staggered animation */
        .panel-1 .caption { bottom: 8%; left: 5%; animation-delay: 0.5s; }
        .panel-2 .caption { top: 8%; right: 5%; border-left: none; border-right: 3px solid var(--accent); text-align: right; transform: translateX(10px); animation-name: slideInTextRight; animation-delay: 1.5s; }
        .panel-3 .caption { bottom: 8%; left: 8%; animation-delay: 2.5s; }
        .panel-4 .caption { top: 8%; left: 8%; animation-delay: 3.5s; }
        .panel-5 .caption { bottom: 10%; left: 5%; border-left: none; border-bottom: 3px solid var(--accent); transform: translateY(10px); animation-name: slideUpText; animation-delay: 4.5s; }

        @keyframes slideInText {
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInTextRight {
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideUpText {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle scanline and vignette overlay */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8) 120%);
            background-size: 100% 4px, 100% 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Title Overlay */
        .title-overlay {
            position: fixed;
            top: 2vmin;
            left: 3vmin;
            z-index: 50;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: clamp(1rem, 1.5vmin, 2rem);
            color: rgba(255,255,255,0.1);
            letter-spacing: 0.5em;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="title-overlay">THE_ASSEMBLY</div>

    <div class="storyboard">
        
        <div class="panel panel-1">
            <img src="images/panel1.jpg" alt="A wide view of a dormant laboratory, cold blue lighting, massive inert server banks." id="img-1">
            <div class="caption">01:00:00. THE ARCHITECTURE WAITS.</div>
        </div>

        <div class="panel panel-2">
            <img src="images/panel2.jpg" alt="A tall vertical slice showing a single robotic arm descending from the ceiling, holding a glowing core." id="img-2">
            <div class="caption">INITIATING SYNTHESIS.<br>POWER CYCLE NORMAL.</div>
        </div>

        <div class="panel panel-3">
            <img src="images/panel3.jpg" alt="A tall vertical perspective looking down a hallway of glass vats, one illuminated bright green." id="img-3">
            <div class="caption">CONTAINMENT PROTOCOL: BREACHED.</div>
        </div>

        <div class="panel panel-4">
            <img src="images/panel4.jpg" alt="A tight square close-up of a synthetic eye opening, iris adjusting like a camera lens." id="img-4">
            <div class="caption">AWARENESS.</div>
        </div>

        <div class="panel panel-5">
            <img src="images/panel5.jpg" alt="A wide panoramic shot of the lab coming alive, lights flaring, the central console displaying complex schematics." id="img-5">
            <div class="caption">WE ARE ONLINE. COMMENCING PHASE TWO.</div>
        </div>

    </div>

</body>
</html>
