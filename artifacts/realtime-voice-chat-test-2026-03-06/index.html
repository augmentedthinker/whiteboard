<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realtime Voice Chat Test</title>
  <style>
    body{margin:0;background:#0a1220;color:#dbe8ff;font-family:Inter,system-ui,sans-serif;padding:20px}
    .wrap{max-width:980px;margin:0 auto;display:grid;gap:12px}
    .card{background:#111b31;border:1px solid rgba(157,201,255,.28);border-radius:12px;padding:14px}
    input,textarea,button,select{font:inherit}
    input,textarea,select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(157,201,255,.28);background:#0b1324;color:#dbe8ff}
    button{padding:10px 12px;border-radius:8px;border:1px solid rgba(157,201,255,.28);background:#13223f;color:#dbe8ff;cursor:pointer}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .log{background:#060b16;border:1px solid rgba(157,201,255,.25);padding:10px;border-radius:8px;max-height:320px;overflow:auto;white-space:pre-wrap;font-family:ui-monospace,monospace}
    .muted{color:#9eb6dc}
    a{color:#9fd2ff;text-decoration:none}
  </style>

<style id="rv-home-fab-style">
  .rv-home-fab,.rv-fullscreen-fab{position:fixed;z-index:9999;width:46px;height:46px;border-radius:999px;border:1px solid rgba(126,186,255,.95);background:#2f8cff;color:#eaf5ff;display:grid;place-items:center;font-size:18px;font-weight:800;box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(8px);touch-action:none;user-select:none;text-decoration:none}
  .rv-home-fab{left:max(10px, env(safe-area-inset-left));top:max(10px, env(safe-area-inset-top));cursor:grab}
  .rv-fullscreen-fab{right:max(10px, env(safe-area-inset-right));top:max(10px, env(safe-area-inset-top));cursor:grab}
  .rv-home-fab.dragging,.rv-fullscreen-fab.dragging{cursor:grabbing}
  .rv-hidden-back-nav{display:none !important}
</style>
</head>
<body>
<main class="wrap">
  <section class="card">
    <h1 style="margin:0 0 8px;">Realtime Voice Chat Test (Speech In / Speech Out)</h1>
    <p class="muted" style="margin:0;">Test-mode artifact. Direct mode works now with local API key input. Relay mode is scaffolded for OpenClaw backend endpoint when ready.</p>
  </section>

  <section class="card">
    <label>Mode</label>
    <select id="mode">
      <option value="direct">Direct Gemini WebSocket (enter API key)</option>
      <option value="relay">Relay HTTP mode (endpoint + token)</option>
    </select>

    <div id="directBlock" style="margin-top:10px;">
      <label>Gemini API Key</label>
      <input id="apiKey" type="password" placeholder="AIza..." />
    </div>

    <div id="relayBlock" style="display:none;margin-top:10px;">
      <label>Relay URL (example: https://your-host/api/voice-chat)</label>
      <input id="relayUrl" type="text" placeholder="https://..." />
      <label style="margin-top:8px;display:block;">Relay Bearer Token</label>
      <input id="relayToken" type="password" placeholder="test-token" />
    </div>

    <div class="row" style="margin-top:10px;">
      <button id="connectBtn">Connect</button>
      <button id="disconnectBtn">Disconnect</button>
      <button id="startMicBtn">Start Mic</button>
      <button id="stopMicBtn">Stop Mic</button>
    </div>
    <p id="status" class="muted" style="margin:8px 0 0;">Disconnected</p>
  </section>

  <section class="card">
    <label>Manual Message</label>
    <textarea id="manual" placeholder="Type message here..."></textarea>
    <div class="row" style="margin-top:8px;"><button id="sendBtn">Send</button></div>
  </section>

  <section class="card">
    <div class="log" id="log"></div>
    <p style="margin-top:10px;"><a href="signature.html">🧠 Signature</a> · <a href="../../today/index.html">← Back to Today</a></p>
  </section>
</main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const modeEl = $('mode'), statusEl=$('status'), logEl=$('log');
  let ws=null, recognition=null;
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (Rec) {
    recognition = new Rec(); recognition.lang='en-US'; recognition.interimResults=false; recognition.continuous=true;
    recognition.onresult=(e)=>{ const t=e.results[e.results.length-1][0].transcript.trim(); if(t){add('You(mic): '+t); sendText(t);} };
    recognition.onerror=(e)=>add('Mic error: '+e.error);
  }
  function add(t){logEl.textContent += `[${new Date().toLocaleTimeString()}] ${t}\n`; logEl.scrollTop=logEl.scrollHeight;}
  add('App initialized. Choose mode, then Connect.');
  function speak(t){ const u=new SpeechSynthesisUtterance(t); speechSynthesis.speak(u); }

  modeEl.onchange=()=>{
    $('directBlock').style.display = modeEl.value==='direct'?'block':'none';
    $('relayBlock').style.display = modeEl.value==='relay'?'block':'none';
  };

  function connectDirect(){
    const key=$('apiKey').value.trim();
    if(!key){
      statusEl.textContent='Missing API key';
      return add('Enter API key in Direct mode, then tap Connect again.');
    }
    const url=`wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${encodeURIComponent(key)}`;
    ws=new WebSocket(url);
    ws.onopen=()=>{statusEl.textContent='Connected (direct)'; add('Connected direct WS'); ws.send(JSON.stringify({setup:{model:'models/gemini-2.5-flash-native-audio-latest',generationConfig:{responseModalities:['TEXT']}}})); add('Setup sent. Type in Manual Message and tap Send to test.');};
    ws.onmessage=(e)=>{add('Server: '+e.data.slice(0,700)); try{const j=JSON.parse(e.data); const parts=j?.serverContent?.modelTurn?.parts||[]; const p=parts.find(x=>x.text); if(p){add('Assistant: '+p.text); speak(p.text);} }catch{}};
    ws.onclose=()=>{statusEl.textContent='Disconnected'; add('WS closed'); ws=null;};
    ws.onerror=(err)=>{statusEl.textContent='WebSocket error'; add('WS error (check API key / model access / network).');};
  }

  async function sendRelay(text){
    const url=$('relayUrl').value.trim(), tok=$('relayToken').value.trim();
    if(!url||!tok) return add('Set relay URL + token.');
    const r=await fetch(url,{method:'POST',headers:{'content-type':'application/json','authorization':`Bearer ${tok}`},body:JSON.stringify({text})});
    const j=await r.json().catch(()=>({}));
    if(!r.ok) return add('Relay error: '+(j.error||r.status));
    const out=j.text||JSON.stringify(j); add('Assistant: '+out); speak(out);
  }

  function sendText(text){
    if(modeEl.value==='relay') return sendRelay(text);
    if(!ws||ws.readyState!==1) return add('Not connected.');
    ws.send(JSON.stringify({clientContent:{turns:[{role:'user',parts:[{text}]}],turnComplete:true}}));
  }

  $('connectBtn').onclick=()=> modeEl.value==='direct' ? connectDirect() : (statusEl.textContent='Relay mode ready'; add('Relay mode selected. Enter relay URL/token, then send a manual message.'));
  $('disconnectBtn').onclick=()=>{ if(ws) ws.close(); statusEl.textContent='Disconnected'; };
  $('startMicBtn').onclick=()=> recognition ? (recognition.start(), add('Mic started')) : add('SpeechRecognition unsupported');
  $('stopMicBtn').onclick=()=> recognition && (recognition.stop(), add('Mic stopped'));
  $('sendBtn').onclick=()=>{ const t=$('manual').value.trim(); if(t){ add('You: '+t); sendText(t);} };
})();
</script>

<a id="rvHomeFab" class="rv-home-fab" href="#" aria-label="Back to menu page" title="Back to menu page">⌂</a>
<button id="rvFullscreenFab" class="rv-fullscreen-fab" type="button" aria-label="Toggle fullscreen" title="Toggle fullscreen">⛶</button>
<script id="rv-home-fab-script">
(function(){
  const fab=document.getElementById('rvHomeFab');
  const fsFab=document.getElementById('rvFullscreenFab');
  if(!fab || !fsFab) return;
  const path=location.pathname;
  const marker='/remote-viewer/';
  const idx=path.indexOf(marker);
  const href=idx>=0 ? path.slice(0, idx + marker.length) : '/';
  fab.setAttribute('href', href);

  const clamp = (v,min,max)=>Math.max(min, Math.min(max, v));
  const placeFromStorage = (el,key,side='left') => {
    try {
      const raw = localStorage.getItem(key);
      if(!raw) return;
      const pos = JSON.parse(raw);
      const maxLeft = window.innerWidth - el.offsetWidth - 6;
      const maxTop = window.innerHeight - el.offsetHeight - 6;
      const left = clamp(pos.left ?? (side==='left'?10:maxLeft), 6, maxLeft);
      const top = clamp(pos.top ?? 10, 6, maxTop);
      el.style.left = left + 'px';
      el.style.top = top + 'px';
      el.style.right = 'auto';
    } catch(_) {}
  };
  const savePos = (el,key) => {
    try { localStorage.setItem(key, JSON.stringify({left: el.offsetLeft, top: el.offsetTop})); } catch(_) {}
  };

  function wireDraggable(el, key, onClick){
    let drag=null, moved=false;
    el.addEventListener('pointerdown', (e)=>{ drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:el.offsetLeft,top:el.offsetTop}; moved=false; el.classList.add('dragging'); el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener('pointermove', (e)=>{ if(!drag||e.pointerId!==drag.id) return; const dx=e.clientX-drag.startX, dy=e.clientY-drag.startY; if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true; const maxLeft=window.innerWidth-el.offsetWidth-6, maxTop=window.innerHeight-el.offsetHeight-6; const nextLeft=clamp(drag.left+dx, 6, maxLeft); const nextTop=clamp(drag.top+dy, 6, maxTop); el.style.left=nextLeft+'px'; el.style.top=nextTop+'px'; el.style.right='auto'; });
    el.addEventListener('pointerup', async (e)=>{ if(!drag||e.pointerId!==drag.id) return; el.classList.remove('dragging'); try{el.releasePointerCapture(e.pointerId);}catch(_){} const wasMoved=moved; drag=null; savePos(el,key); if(!wasMoved && onClick) await onClick(e); });
    el.addEventListener('pointercancel', ()=>{ el.classList.remove('dragging'); drag=null; savePos(el,key); });
    el.addEventListener('click', (e)=>{ if(moved){ e.preventDefault(); moved=false; } });
  }

  const isFullscreen = () => !!(document.fullscreenElement || document.webkitFullscreenElement);
  const syncFsIcon = () => { fsFab.textContent = isFullscreen() ? '🡼' : '⛶'; };
  const toggleFullscreen = async () => {
    try {
      const target = document.documentElement;
      if (!isFullscreen()) {
        if (target.requestFullscreen) await target.requestFullscreen();
        else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
        try { localStorage.setItem('rvFullscreenPreferred', '1'); } catch(_) {}
      } else {
        if (document.exitFullscreen) await document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        try { localStorage.setItem('rvFullscreenPreferred', '0'); } catch(_) {}
      }
    } catch(_) {}
    syncFsIcon();
  };
  const tryApplyFullscreenPreference = async () => {
    let preferred = false;
    try { preferred = localStorage.getItem('rvFullscreenPreferred') === '1'; } catch(_) {}
    if (!preferred || isFullscreen()) return;
    try {
      const target = document.documentElement;
      if (target.requestFullscreen) await target.requestFullscreen();
      else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
    } catch(_) {}
    syncFsIcon();
  };
  const armFullscreenCarry = () => {
    let preferred = false;
    try { preferred = localStorage.getItem('rvFullscreenPreferred') === '1'; } catch(_) {}
    if (!preferred) return;
    const handler = () => {
      tryApplyFullscreenPreference();
      window.removeEventListener('pointerdown', handler, true);
      window.removeEventListener('keydown', handler, true);
      window.removeEventListener('touchstart', handler, true);
    };
    window.addEventListener('pointerdown', handler, true);
    window.addEventListener('keydown', handler, true);
    window.addEventListener('touchstart', handler, true);
  };

  placeFromStorage(fab, 'rvHomeFabPos', 'left');
  placeFromStorage(fsFab, 'rvFullscreenFabPos', 'right');
  wireDraggable(fab, 'rvHomeFabPos');
  wireDraggable(fsFab, 'rvFullscreenFabPos', toggleFullscreen);
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);
  syncFsIcon();

  const hideBackNav = () => {
    const selectors = 'a,button,.btn,.link,.back';
    document.querySelectorAll(selectors).forEach(el => {
      if (el.id === 'rvHomeFab' || el.id === 'rvFullscreenFab' || el.id === 'fsBtn') return;
      const text = (el.textContent || '').replace(/\s+/g,' ').trim().toLowerCase();
      const hrefAttr = (el.getAttribute && (el.getAttribute('href') || '') || '').toLowerCase();
      const title = (el.getAttribute && (el.getAttribute('title') || '') || '').toLowerCase();
      const looksBack = text.startsWith('←') || text.startsWith('back to') || text === 'back' || text === 'today’s artifacts' || text === "today's artifacts" || title.includes('back to');
      const navHref = hrefAttr.includes('../index.html') || hrefAttr.endsWith('/index.html') || hrefAttr === 'index.html';
      if (looksBack || (navHref && text.includes('back'))) el.classList.add('rv-hidden-back-nav');
    });
  };

  const init = () => { hideBackNav(); armFullscreenCarry(); };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, {once:true});
  else init();
  window.addEventListener('resize', ()=>{ placeFromStorage(fab, 'rvHomeFabPos', 'left'); placeFromStorage(fsFab, 'rvFullscreenFabPos', 'right'); });
})();
</script>
</body>
</html>
