<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D&D Dice Widget — v5</title>
  <style>
    :root{--bg:#0f0c16;--panel:#181224f2;--line:#7c5a22;--gold:#e6c178;--txt:#efe7d2;--muted:#b9ac8d}
    html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 50%,#2a1e3b 0%,#0f0c16 85%);color:var(--txt);font-family:Inter,system-ui,sans-serif}
    #app{position:fixed;inset:0}
    
    /* Top Bar Layout */
    .hud {
      position:fixed; top:0; left:0; right:0; z-index:12;
      background: linear-gradient(180deg, var(--panel) 0%, #181224aa 100%);
      border-bottom:1px solid #8f6b2acc;
      backdrop-filter: blur(8px);
      box-shadow:0 4px 20px #000a;
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 24px;
    }
    
    .brand { display:flex; align-items:center; gap:12px; }
    .title { font-size:18px; font-weight:800; letter-spacing:.5px; color:var(--gold); text-transform: uppercase; text-shadow: 0 2px 4px #000; }
    
    .controls { display:flex; gap:12px; align-items:center; }
    select, input, button { 
      background:#241a34cc; color:var(--txt); border:1px solid #75551f; 
      border-radius:6px; padding:8px 12px; font-family:inherit; font-size:14px;
      transition: all 0.2s ease;
    }
    button { 
      cursor:pointer; font-weight:700; text-transform:uppercase; letter-spacing:0.5px;
      background: linear-gradient(180deg, #3a2b4f 0%, #241a34 100%);
      box-shadow: 0 2px 0 #150f1f;
    }
    button:active { transform: translateY(2px); box-shadow:none; }
    button:hover { border-color:var(--gold); filter:brightness(1.2); }
    select:hover, input:hover { border-color:var(--gold); }

    .readout { 
      position:fixed; bottom:30px; left:50%; transform:translateX(-50%); z-index:10;
      font-size:24px; font-weight:700; color:var(--gold);
      text-shadow:0 2px 10px #000; pointer-events:none;
      background: #181224aa; padding: 8px 24px; border-radius: 50px; border: 1px solid #8f6b2a44;
      opacity: 0; transition: opacity 0.3s;
    }
    .readout.visible { opacity: 1; }

    /* Hide old history panel */
    .history { display:none; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
</head>
<body>
<div id="app"></div>
<div class="hud">
  <div class="brand">
    <div class="title">⚔️ D&D Roller</div>
  </div>
  <div class="controls">
    <select id="dieType"><option>d4</option><option selected>d6</option><option>d8</option><option>d10</option><option>d12</option><option>d20</option></select>
    <input id="count" type="number" min="1" max="10" value="1" style="width:40px">
    <button id="roll">ROLL</button>
    <button id="clear">CLEAR</button>
  </div>
</div>
<div id="result" class="readout"></div>
<!-- history removed as requested -->

<script>
(()=>{
const app=document.getElementById('app');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0f0c16);
const camera=new THREE.PerspectiveCamera(56,innerWidth/innerHeight,0.1,100);
camera.position.set(0,7.5,12.5);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio||1,2)); renderer.shadowMap.enabled=true; app.appendChild(renderer.domElement);
const controls=new THREE.OrbitControls(camera,renderer.domElement); controls.enableDamping=true; controls.target.set(0,1,0);

scene.add(new THREE.HemisphereLight(0x8872aa,0x121016,0.45));
const key=new THREE.DirectionalLight(0xfff3d5,1.1); key.position.set(7,12,4); key.castShadow=true; key.shadow.mapSize.set(2048,2048); scene.add(key);
const rim=new THREE.PointLight(0x7e4ec4,0.8,24); rim.position.set(-6,5,-6); scene.add(rim);
const floor=new THREE.Mesh(new THREE.PlaneGeometry(60,60), new THREE.MeshStandardMaterial({color:0x1a1324,roughness:.6,metalness:.2}));
floor.rotation.x=-Math.PI/2; floor.receiveShadow=true; scene.add(floor);
// Add rolling tray walls visually
const trayMat = new THREE.MeshStandardMaterial({color:0x2a1e3b,roughness:0.8});
const wallGeo = new THREE.BoxGeometry(16, 2, 1);
const w1=new THREE.Mesh(wallGeo, trayMat); w1.position.set(0,1,-8); scene.add(w1);
const w2=new THREE.Mesh(wallGeo, trayMat); w2.position.set(0,1,8); scene.add(w2);
const w3=new THREE.Mesh(wallGeo, trayMat); w3.position.set(-8,1,0); w3.rotation.y=Math.PI/2; scene.add(w3);
const w4=new THREE.Mesh(wallGeo, trayMat); w4.position.set(8,1,0); w4.rotation.y=Math.PI/2; scene.add(w4);

const world=new CANNON.World(); world.gravity.set(0,-30,0); world.broadphase=new CANNON.NaiveBroadphase(); world.solver.iterations=20;
const floorMat=new CANNON.Material('floor'), dieMat=new CANNON.Material('die');
const contact=new CANNON.ContactMaterial(floorMat,dieMat,{friction:0.3,restitution:0.3,contactEquationStiffness:1e8,contactEquationRelaxation:3});
world.addContactMaterial(contact); world.defaultContactMaterial=contact;
const floorBody=new CANNON.Body({mass:0,shape:new CANNON.Plane(),material:floorMat}); floorBody.quaternion.setFromEuler(-Math.PI/2,0,0); world.addBody(floorBody);
function wall(x,z,ry){const b=new CANNON.Body({mass:0,shape:new CANNON.Plane(),material:floorMat}); b.position.set(x,0,z); b.quaternion.setFromEuler(0,ry,0); world.addBody(b);} 
// Tighten walls for tray feel
wall(-7.5,0,Math.PI/2); wall(7.5,0,-Math.PI/2); wall(0,-7.5,0); wall(0,7.5,Math.PI);

function engraveTexture(n){
  const c=document.createElement('canvas'); c.width=256; c.height=256; const g=c.getContext('2d');
  // Stone/marble texture base
  g.fillStyle='#e3dac3'; g.fillRect(0,0,256,256);
  g.fillStyle='#000'; g.globalAlpha=0.08; 
  for(let i=0;i<1000;i++) g.fillRect(Math.random()*256, Math.random()*256, 2, 2);
  g.globalAlpha=1.0;
  
  // Gold inlay text
  g.fillStyle='#dcb86c'; 
  g.font='700 130px Georgia'; g.textAlign='center'; g.textBaseline='middle';
  
  // Inner shadow for depth
  g.shadowColor='rgba(0,0,0,0.8)'; g.shadowBlur=4; g.shadowOffsetX=2; g.shadowOffsetY=3;
  g.fillText(String(n),128,138);
  
  // Highlight edge
  g.shadowColor='rgba(255,255,255,0.4)'; g.shadowBlur=2; g.shadowOffsetX=-1; g.shadowOffsetY=-2;
  g.fillText(String(n),128,138);

  const color=new THREE.CanvasTexture(c); color.anisotropy=16;

  const a=document.createElement('canvas'); a.width=256; a.height=256; const ax=a.getContext('2d');
  ax.clearRect(0,0,256,256); ax.fillStyle='#00000000'; ax.fillRect(0,0,256,256);
  ax.fillStyle='#ffffffff'; ax.font='700 130px Georgia'; ax.textAlign='center'; ax.textBaseline='middle'; ax.fillText(String(n),128,138);
  const alpha=new THREE.CanvasTexture(a);
  return {color,alpha};
}

function baseGeom(type){
  if(type==='d4') return new THREE.TetrahedronGeometry(1.0,0);
  if(type==='d6') return new THREE.BoxGeometry(1.45,1.45,1.45); // plain cube as requested
  if(type==='d8') return new THREE.OctahedronGeometry(1.06,0);
  if(type==='d12') return new THREE.DodecahedronGeometry(1.0,0);
  if(type==='d20') return new THREE.IcosahedronGeometry(1.06,0);
  return d10Geom();
}

function d10Geom(){
  const top=new THREE.Vector3(0,1.1,0), bot=new THREE.Vector3(0,-1.1,0), ring=[];
  const r=0.9, y=0.2; 
  // Improved pentagonal trapezohedron
  for(let i=0;i<10;i++){
    const a=i*Math.PI*2/10; 
    // Alternate up/down zigzag
    ring.push(new THREE.Vector3(Math.cos(a)*r, i%2===0?y:-y, Math.sin(a)*r));
  }
  const pos=[];
  // Top cone faces
  for(let i=0;i<10;i+=2){
    pos.push(...top.toArray(),...ring[i].toArray(),...ring[(i+1)%10].toArray());
    pos.push(...top.toArray(),...ring[(i+1)%10].toArray(),...ring[(i+2)%10].toArray());
  }
  // Bottom cone faces (flipped winding)
  for(let i=0;i<10;i+=2){
    pos.push(...bot.toArray(),...ring[(i+1)%10].toArray(),...ring[i].toArray());
    pos.push(...bot.toArray(),...ring[(i+2)%10].toArray(),...ring[(i+1)%10].toArray());
  }
  const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3)); g.computeVertexNormals(); return g;
}

function convexFromGeom(geometry){
  const g=geometry.clone().toNonIndexed(), arr=g.attributes.position.array, map=new Map(), verts=[], faces=[];
  const key=(x,y,z)=>`${Math.round(x*1000)}_${Math.round(y*1000)}_${Math.round(z*1000)}`;
  function idx(x,y,z){const k=key(x,y,z); if(map.has(k)) return map.get(k); const i=verts.length; verts.push(new CANNON.Vec3(x,y,z)); map.set(k,i); return i;}
  for(let i=0;i<arr.length;i+=9){const a=idx(arr[i],arr[i+1],arr[i+2]),b=idx(arr[i+3],arr[i+4],arr[i+5]),c=idx(arr[i+6],arr[i+7],arr[i+8]); if(a!==b&&b!==c&&a!==c) faces.push([a,b,c]);}
  return new CANNON.ConvexPolyhedron(verts,faces);
}

function faceGroups(geometry,max){
  const g=geometry.clone().toNonIndexed(), p=g.attributes.position; const tris=[];
  for(let i=0;i<p.count;i+=3){const a=new THREE.Vector3().fromBufferAttribute(p,i),b=new THREE.Vector3().fromBufferAttribute(p,i+1),c=new THREE.Vector3().fromBufferAttribute(p,i+2); const n=b.clone().sub(a).cross(c.clone().sub(a)).normalize(); const center=a.clone().add(b).add(c).multiplyScalar(1/3); tris.push({n,center});}
  const groups=[]; for(const t of tris){let gr=groups.find(f=>f.n.dot(t.n)>.985); if(!gr){gr={n:t.n.clone(),c:new THREE.Vector3(),k:0};groups.push(gr);} gr.c.add(t.center); gr.k++;}
  groups.forEach(g=>g.c.multiplyScalar(1/g.k)); groups.sort((a,b)=>a.n.y-b.n.y);
  const values=Array.from({length:groups.length},(_,i)=>((i%max)+1)).sort((a,b)=>a-b);
  return groups.map((g,i)=>({normal:g.n,center:g.c,value:values[i]}));
}

const dice=[];
function clearDice(){
  while(dice.length){const d=dice.pop(); scene.remove(d.mesh); world.removeBody(d.body);} 
  document.getElementById('result').classList.remove('visible');
}

function createDie(type,i){
  const max=+type.slice(1), geom=baseGeom(type), meshMat=new THREE.MeshStandardMaterial({color:0xe7d9b4,roughness:.45,metalness:.12});
  let mesh;
  if(type==='d6'){
    const mats=[1,2,3,4,5,6].map(n=>{const t=engraveTexture(n); return new THREE.MeshStandardMaterial({map:t.color,roughness:.48,metalness:.08});});
    mesh=new THREE.Mesh(geom,mats);
  } else {
    mesh=new THREE.Mesh(geom,meshMat);
    const faces=faceGroups(geom,max);
    faces.forEach(f=>{
      const t=engraveTexture(f.value);
      const label=new THREE.Mesh(new THREE.PlaneGeometry(.34,.34), new THREE.MeshStandardMaterial({map:t.color,alphaMap:t.alpha,transparent:true,roughness:.6,metalness:0,polygonOffset:true,polygonOffsetFactor:-2}));
      const n=f.normal.clone().normalize();
      label.position.copy(f.center.clone().add(n.multiplyScalar(-0.01))); // slight inset for engraved feel
      label.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1), n);
      mesh.add(label);
    });
  }
  mesh.castShadow=true; mesh.receiveShadow=true; scene.add(mesh);
  const shape=convexFromGeom(geom);
  const body=new CANNON.Body({mass:1,shape,material:dieMat});
  body.position.set((Math.random()-.5)*1.8 + (i-.5)*.8,4.8+Math.random()*1.8,(Math.random()-.5)*1.8);
  body.velocity.set((Math.random()-.5)*2.4,0,(Math.random()-.5)*2.4);
  body.angularVelocity.set((Math.random()-.5)*16,(Math.random()-.5)*16,(Math.random()-.5)*16);
  body.linearDamping=.24; body.angularDamping=.24;
  world.addBody(body);
  dice.push({type,max,mesh,body,settle:0,done:false,value:1,faces:faceGroups(geom,max)});
}

function readValue(d){let best={y:-1e9,v:1}; for(const f of d.faces){const n=d.body.quaternion.vmult(new CANNON.Vec3(f.normal.x,f.normal.y,f.normal.z)); if(n.y>best.y) best={y:n.y,v:f.value};} return best.v;}

function finalize(){
  const vals=dice.map(d=>d.value),total=vals.reduce((a,b)=>a+b,0),type=dice[0]?.type||'d6'; 
  const el = document.getElementById('result');
  el.innerHTML = `<span style="font-size:16px;color:var(--muted)">${type.toUpperCase()}</span><br>${total}`;
  el.classList.add('visible');
  setTimeout(()=>el.classList.remove('visible'), 4000);
}

function roll(){
  document.getElementById('result').classList.remove('visible');
  clearDice(); 
  const type=document.getElementById('dieType').value; 
  const count=Math.max(1,Math.min(10,+document.getElementById('count').value||1)); 
  for(let i=0;i<count;i++) createDie(type,i);
} 

document.getElementById('roll').addEventListener('click',roll); document.getElementById('clear').addEventListener('click',clearDice);
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});

let last=performance.now(); function loop(now){requestAnimationFrame(loop); const dt=Math.min((now-last)/1000,1/20); last=now; world.step(1/60,dt,10); let allDone=dice.length>0; for(const d of dice){if(d.body.position.y<-1){d.body.position.y=1.2; d.body.velocity.set(0,0,0);} d.mesh.position.copy(d.body.position); d.mesh.quaternion.copy(d.body.quaternion); const m=d.body.velocity.norm()+d.body.angularVelocity.norm(); if(m<.16)d.settle++; else d.settle=0; if(!d.done && d.settle>24){d.done=true; d.value=readValue(d);} if(!d.done) allDone=false;} if(allDone) finalize(); controls.update(); renderer.render(scene,camera);} roll(); loop(performance.now());
})();
</script>
</body>
</html>
