<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Junior Multimodal Demos</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --error: #f85149;
            --success: #2ea043;
            --warning: #d29922;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1, h2 { color: var(--accent); }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input[type="text"], input[type="password"], select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .response-area {
            background: #000;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
            margin-top: 15px;
            border: 1px solid var(--border);
        }
        .meta {
            font-size: 0.85em;
            color: #8b949e;
            margin-top: 10px;
            margin-bottom: 10px;
        }
        .status-success { color: var(--success); }
        .status-error { color: var(--error); }
        .troubleshooting {
            margin-top: 10px;
            padding: 10px;
            background: rgba(248, 81, 73, 0.1);
            border-left: 4px solid var(--error);
            font-size: 0.9em;
            display: none;
        }
        .media-container {
            margin-top: 15px;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            text-align: center;
        }
        img { max-width: 100%; height: auto; border-radius: 4px; }
        audio { width: 100%; margin-top: 10px; }
        .probe-label {
            display: inline-block;
            background: var(--warning);
            color: #000;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7em;
            vertical-align: middle;
            margin-left: 10px;
            font-weight: bold;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Junior Multimodal Demos</h1>
        
        <div class="card">
            <label for="apiKey">Gemini API Key</label>
            <input type="password" id="apiKey" placeholder="Enter API Key">
            <button onclick="saveKey()">Save Key</button>
            <button onclick="listModelsForKey()" style="margin-left:8px;background:#2ea043;color:#fff;">List models for this key</button>
        </div>

        <!-- IMAGE SECTION -->
        <div class="card" id="section-image">
            <h2>🖼️ Image Generation</h2>
            <label>Model ID</label>
            <select id="model-image">
                <option value="gemini-3.1-flash-image-preview">gemini-3.1-flash-image-preview (Recommended)</option>
                <option value="gemini-2.5-flash-image">gemini-2.5-flash-image</option>
                <option value="gemini-3-pro-image-preview">gemini-3-pro-image-preview</option>
                <option value="imagen-3.0-generate-002">imagen-3.0-generate-002 (Legacy/if enabled)</option>
            </select>
            <label>Prompt</label>
            <textarea id="prompt-image" rows="3">A futuristic city at sunset with flying cars</textarea>
            <button onclick="runDemo('image')">Run Demo</button>
            <div id="result-image" style="display: none;">
                <div class="meta" id="meta-image"></div>
                <div id="troubleshoot-image" class="troubleshooting"></div>
                <div id="media-image"></div>
                <div class="response-area" id="response-image"></div>
            </div>
        </div>

        <!-- VOICE SECTION -->
        <div class="card" id="section-voice">
            <h2>🗣️ Voice Generation (TTS)</h2>
            <label>Model ID</label>
            <select id="model-voice">
                <option value="gemini-2.5-flash-preview-tts">gemini-2.5-flash-preview-tts (Recommended)</option>
                <option value="gemini-2.5-pro-preview-tts">gemini-2.5-pro-preview-tts</option>
                <option value="gemini-2.5-flash-native-audio-preview-12-2025">gemini-2.5-flash-native-audio-preview-12-2025</option>
            </select>
            <label>Prompt</label>
            <textarea id="prompt-voice" rows="3">Hello from Junior! This is a test of the voice model capabilities.</textarea>
            <button onclick="runDemo('voice')">Run Demo</button>
            <div id="result-voice" style="display: none;">
                <div class="meta" id="meta-voice"></div>
                <div id="troubleshoot-voice" class="troubleshooting"></div>
                <div id="media-voice"></div>
                <div class="response-area" id="response-voice"></div>
            </div>
        </div>

        <!-- MUSIC SECTION -->
        <div class="card" id="section-music">
            <h2>🎵 Music Generation <span class="probe-label">PROBE ONLY</span></h2>
            <p style="font-size: 0.9em; color: #8b949e; margin-top: -10px;">This endpoint is an exploratory probe. It may fail if the model or endpoint is unavailable.</p>
            <label>Model ID</label>
            <select id="model-music">
                <option value="lyria-3-preview">lyria-3-preview</option>
                <option value="lyria-002">lyria-002</option>
                <option value="lyria-realtime-preview">lyria-realtime-preview</option>
            </select>
            <label>Prompt</label>
            <textarea id="prompt-music" rows="3">An upbeat electronic track with a heavy bassline</textarea>
            <button onclick="runDemo('music')">Run Probe</button>
            <div id="result-music" style="display: none;">
                <div class="meta" id="meta-music"></div>
                <div id="troubleshoot-music" class="troubleshooting"></div>
                <div id="media-music"></div>
                <div class="response-area" id="response-music"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
        });

        function saveKey() {
            const key = document.getElementById('apiKey').value;
            localStorage.setItem('gemini_api_key', key);
            alert('Key saved locally!');
        }

        async function listModelsForKey() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) { alert('Please enter API key first.'); return; }
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await res.json();
                if (!res.ok) {
                    alert(`List models failed: ${res.status} ${data?.error?.message || ''}`);
                    return;
                }
                const models = (data.models || []).map(m => ({
                    id: (m.name || '').replace('models/', ''),
                    methods: m.supportedGenerationMethods || []
                }));

                const setOptions = (selectId, predicate) => {
                    const sel = document.getElementById(selectId);
                    const current = sel.value;
                    const candidates = models.filter(predicate).map(m => m.id).sort();
                    if (!candidates.length) return;
                    sel.innerHTML = candidates.map(id => `<option value="${id}">${id}</option>`).join('');
                    if (candidates.includes(current)) sel.value = current;
                };

                setOptions('model-image', m => /image|imagen|banana/i.test(m.id));
                setOptions('model-voice', m => /tts|audio|native-audio/i.test(m.id));
                setOptions('model-music', m => /lyria|music|audio/i.test(m.id));
                alert(`Loaded ${models.length} models for this key.`);
            } catch (e) {
                alert(`List models error: ${e.message}`);
            }
        }

        function getTroubleshootingHint(status) {
            switch(status) {
                case 400: return "400 Bad Request: Check your prompt format, or the model does not support this configuration.";
                case 401: return "401 Unauthorized: Your API key is missing or invalid. Check the key and try again.";
                case 403: return "403 Forbidden: Your API key lacks permissions for this model, or the model is restricted.";
                case 404: return "404 Not Found: The specified model ID does not exist or the endpoint URL is incorrect.";
                case 429: return "429 Too Many Requests: You have exceeded your quota or rate limit. Try again later.";
                default:
                    if (status >= 500) return `${status} Server Error: Google's API is experiencing issues.`;
                    return null;
            }
        }
        
        // Convert raw PCM to WAV for browser playback
        function createWavBlob(pcmData, sampleRate = 24000) {
            try {
                // Decode base64 to Int16Array
                const binaryStr = atob(pcmData);
                const len = binaryStr.length;
                const pcm16 = new Int16Array(len / 2);
                for (let i = 0; i < len / 2; i++) {
                    // Assuming little-endian PCM
                    const low = binaryStr.charCodeAt(i * 2);
                    const high = binaryStr.charCodeAt(i * 2 + 1);
                    pcm16[i] = (high << 8) | low;
                }

                const numChannels = 1;
                const byteRate = sampleRate * numChannels * 2;
                const blockAlign = numChannels * 2;
                const buffer = new ArrayBuffer(44 + pcm16.length * 2);
                const view = new DataView(buffer);

                // RIFF chunk descriptor
                writeString(view, 0, 'RIFF');
                view.setUint32(4, 36 + pcm16.length * 2, true);
                writeString(view, 8, 'WAVE');
                // fmt sub-chunk
                writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true); // Subchunk1Size
                view.setUint16(20, 1, true); // AudioFormat (PCM)
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, byteRate, true);
                view.setUint16(32, blockAlign, true);
                view.setUint16(34, 16, true); // BitsPerSample
                // data sub-chunk
                writeString(view, 36, 'data');
                view.setUint32(40, pcm16.length * 2, true);

                // Write PCM data
                const offset = 44;
                for (let i = 0; i < pcm16.length; i++) {
                    view.setInt16(offset + i * 2, pcm16[i], true);
                }

                return new Blob([view], { type: 'audio/wav' });
            } catch (e) {
                console.error("WAV conversion error", e);
                return null;
            }
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        async function runDemo(type) {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey) {
                alert("Please enter an API Key");
                return;
            }

            const model = document.getElementById(`model-${type}`).value;
            const prompt = document.getElementById(`prompt-${type}`).value;
            const resultDiv = document.getElementById(`result-${type}`);
            const metaDiv = document.getElementById(`meta-${type}`);
            const troubleshootDiv = document.getElementById(`troubleshoot-${type}`);
            const responseDiv = document.getElementById(`response-${type}`);
            const mediaDiv = document.getElementById(`media-${type}`);

            resultDiv.style.display = 'block';
            metaDiv.innerHTML = 'Executing request...';
            responseDiv.textContent = '';
            troubleshootDiv.style.display = 'none';
            mediaDiv.innerHTML = '';

            const startTime = Date.now();
            let url = '';
            let payload = {};

            // Determine API shape based on task type and model
            if (type === 'image') {
                if (model.includes('imagen')) {
                    url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:predict?key=${apiKey}`;
                    payload = {
                        instances: [{ prompt: prompt }],
                        parameters: { sampleCount: 1, outputOptions: { mimeType: 'image/jpeg' } }
                    };
                } else {
                    url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                    payload = {
                        contents: [{ role: "user", parts: [{ text: prompt }] }],
                        generationConfig: { responseModalities: ["IMAGE", "TEXT"] }
                    };
                }
            } else if (type === 'voice') {
                url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                payload = {
                    contents: [{ role: "user", parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: 'Kore' } } }
                    }
                };
            } else {
                // Music or other probes
                url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                payload = {
                    contents: [{ role: "user", parts: [{ text: prompt }] }]
                };
            }

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const latency = Date.now() - startTime;
                const timestamp = new Date().toISOString();
                const data = await response.json();
                
                const statusClass = response.ok ? 'status-success' : 'status-error';

                metaDiv.innerHTML = `
                    <span class="${statusClass}">Status: ${response.status} ${response.statusText}</span> | 
                    Latency: ${latency}ms | 
                    Time: ${timestamp} | 
                    Model: ${model}
                `;

                // Render troubleshooting if error
                if (!response.ok) {
                    const hint = getTroubleshootingHint(response.status);
                    if (hint) {
                        troubleshootDiv.textContent = hint;
                        troubleshootDiv.style.display = 'block';
                    }
                } else {
                    // Try to render media
                    if (type === 'image') {
                        // Imagen format
                        if (data.predictions && data.predictions[0] && (data.predictions[0].bytesBase64Encoded || data.predictions[0].bytesBase64)) {
                            const b64img = data.predictions[0].bytesBase64Encoded || data.predictions[0].bytesBase64;
                            mediaDiv.innerHTML = `<div class="media-container"><img src="data:image/jpeg;base64,${b64img}" alt="Generated Image" /></div>`;
                        } 
                        // Standard format (if standard generateContent returns images via inlineData)
                        else if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
                            const part = data.candidates[0].content.parts.find(p => p.inlineData && p.inlineData.mimeType.startsWith('image/'));
                            if (part) {
                                mediaDiv.innerHTML = `<div class="media-container"><img src="data:${part.inlineData.mimeType};base64,${part.inlineData.data}" alt="Generated Image" /></div>`;
                            }
                        }
                    } else if (type === 'voice') {
                        if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
                            const part = data.candidates[0].content.parts.find(p => p.inlineData && p.inlineData.mimeType.startsWith('audio/'));
                            if (part) {
                                const mime = part.inlineData.mimeType;
                                const b64 = part.inlineData.data;
                                let audioSrc = `data:${mime};base64,${b64}`;
                                
                                // Fix for raw PCM playback in browser
                                const lowMime = (mime || '').toLowerCase();
                                if (lowMime.includes('audio/pcm') || lowMime.includes('audio/l16')) {
                                    const wavBlob = createWavBlob(b64);
                                    if (wavBlob) {
                                        audioSrc = URL.createObjectURL(wavBlob);
                                    }
                                }
                                
                                mediaDiv.innerHTML = `<div class="media-container"><audio controls src="${audioSrc}"></audio></div>`;
                            }
                        }
                    }
                }

                // Truncate giant base64 strings in the response viewer for readability
                const displayData = JSON.parse(JSON.stringify(data));
                if (displayData.predictions && displayData.predictions[0]) {
                    if (displayData.predictions[0].bytesBase64Encoded) displayData.predictions[0].bytesBase64Encoded = "(base64 data truncated for viewing)";
                    if (displayData.predictions[0].bytesBase64) displayData.predictions[0].bytesBase64 = "(base64 data truncated for viewing)";
                }
                if (displayData.candidates) {
                    displayData.candidates.forEach(c => {
                        if (c.content && c.content.parts) {
                            c.content.parts.forEach(p => {
                                if (p.inlineData && p.inlineData.data) {
                                    p.inlineData.data = "(base64 data truncated for viewing)";
                                }
                            });
                        }
                    });
                }

                responseDiv.textContent = JSON.stringify(displayData, null, 2);

            } catch (error) {
                const latency = Date.now() - startTime;
                const timestamp = new Date().toISOString();
                
                metaDiv.innerHTML = `
                    <span class="status-error">Fetch Error</span> | 
                    Latency: ${latency}ms | 
                    Time: ${timestamp} | 
                    Model: ${model}
                `;
                responseDiv.textContent = error.toString();
                troubleshootDiv.textContent = "Network error or CORS issue. Check developer console.";
                troubleshootDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
