<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visually Stunning Greeting</title>
  <style>
    :root {
      --text: #ecf5ff;
      --glow: #9fd0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      overflow: hidden;
      background-color: #070c16;
      background-image:
        linear-gradient(135deg, rgba(8, 12, 22, 0.38), rgba(9, 18, 34, 0.56)),
        url("https://image.pollinations.ai/prompt/Cinematic%20dreamlike%20sunrise%20over%20a%20futuristic%20city%20with%20ethereal%20mist%2C%20ultra-detailed%20digital%20art%2C%20no%20text%2C%204k?width=1600&height=900&seed=2626&nologo=true");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(40vw 35vh at 10% 20%, rgba(131, 196, 255, 0.30), transparent 72%),
        radial-gradient(45vw 40vh at 88% 80%, rgba(177, 124, 255, 0.24), transparent 76%),
        linear-gradient(to bottom, rgba(6, 9, 16, 0.15), rgba(5, 7, 12, 0.55));
      z-index: 0;
      animation: shimmer 8s ease-in-out infinite alternate;
    }
    @keyframes shimmer {
      from { filter: saturate(1) brightness(1); }
      to { filter: saturate(1.15) brightness(1.08); }
    }

    .particle-field {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.85), rgba(170,220,255,.18));
      left: var(--x);
      bottom: -8vh;
      animation: rise var(--dur) linear infinite;
      animation-delay: var(--delay);
      filter: blur(.2px);
      opacity: .7;
    }
    @keyframes rise {
      0% { transform: translate3d(0, 0, 0) scale(0.6); opacity: 0; }
      10% { opacity: .7; }
      80% { opacity: .35; }
      100% { transform: translate3d(var(--drift), -120vh, 0) scale(1.25); opacity: 0; }
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 24px;
    }

    .headline {
      font-size: clamp(2rem, 8vw, 5.2rem);
      margin: 0;
      letter-spacing: 0.01em;
      text-shadow: 0 0 10px rgba(180, 227, 255, 0.45),
                   0 0 30px rgba(83, 159, 255, 0.45),
                   0 14px 45px rgba(0,0,0,0.6);
      animation: breathe 4.6s ease-in-out infinite;
    }
    .sub {
      margin-top: 14px;
      font-size: clamp(1rem, 2.6vw, 1.5rem);
      opacity: 0.95;
      text-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }
    @keyframes breathe {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--glow)); }
      50% { transform: scale(1.03); filter: drop-shadow(0 0 14px var(--glow)); }
    }

    .home {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 3;
      border: 1px solid rgba(180, 224, 255, 0.45);
      background: rgba(8, 16, 30, 0.62);
      color: #d7e9ff;
      padding: 8px 12px;
      border-radius: 999px;
      text-decoration: none;
      backdrop-filter: blur(6px);
      font-size: .9rem;
    }

    @media (prefers-reduced-motion: reduce) {
      .headline, .overlay, .particle { animation: none !important; }
    }
  </style>
</head>
<body>
  <a class="home" href="index.html">← Remote Viewer</a>
  <div class="overlay" aria-hidden="true"></div>

  <div class="particle-field" aria-hidden="true" id="particles"></div>

  <main class="content">
    <div>
      <h1 class="headline">Welcome Back, Christopher ✨</h1>
      <p class="sub">Saber is online. Let’s build something real today.</p>
    </div>
  </main>

  <script>
    const field = document.getElementById('particles');
    for (let i = 0; i < 34; i++) {
      const p = document.createElement('span');
      p.className = 'particle';
      p.style.setProperty('--size', `${Math.random() * 8 + 2}px`);
      p.style.setProperty('--x', `${Math.random() * 100}vw`);
      p.style.setProperty('--drift', `${(Math.random() * 24 - 12).toFixed(1)}vw`);
      p.style.setProperty('--dur', `${Math.random() * 10 + 8}s`);
      p.style.setProperty('--delay', `${(Math.random() * -18).toFixed(2)}s`);
      field.appendChild(p);
    }
  </script>
</body>
</html>
