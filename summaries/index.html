<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>EOD Summaries</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#0d1117;color:#c9d1d9;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:max(12px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(16px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left))}
    .wrap{max-width:1100px;margin:0 auto}
    h1{color:#58a6ff;margin:6px 0 12px;font-size:clamp(1.2rem,4.5vw,1.8rem)}
    .layout{display:grid;grid-template-columns:300px 1fr;gap:12px}
    .panel{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:12px}
    .item{display:block;width:100%;text-align:left;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:10px;padding:11px;margin-bottom:8px;cursor:pointer;font-size:.95rem;touch-action:manipulation}
    .item:hover,.item:active{background:#21262d}
    #viewer{line-height:1.6;overflow-wrap:anywhere}
    #viewer h1,#viewer h2,#viewer h3{border-bottom:1px solid #30363d;padding-bottom:.2em}
    #viewer code,#viewer pre{background:#0b0f14;max-width:100%;overflow:auto}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px;flex-wrap:wrap}
    a{color:#58a6ff;text-decoration:none}
    @media (max-width:900px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>📚 End-of-Day Summaries</h1>
      <a href="../index.html">← Back to Remote Viewer</a>
    </div>
    <div class="layout">
      <div class="panel" id="list"></div>
      <div class="panel"><div id="viewer">Select a summary from the list.</div></div>
    </div>
  </div>
  <script>
    const files = [
      "2026-02-28-eod-summary.md",
      "2026-02-27-eod-summary.md",
      "2026-02-25-eod-summary.md",
      "2026-02-23-end-of-day-summary.md",
      "2026-02-22-evening-summary.md",
      "2026-02-22-afternoon-summary.md"
    ];

    const list = document.getElementById('list');
    const viewer = document.getElementById('viewer');

    async function loadSummary(file){
      const res = await fetch(file);
      const text = await res.text();
      viewer.innerHTML = marked.parse(text);
      history.replaceState(null,'','#'+encodeURIComponent(file));
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    files.forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'item';
      btn.textContent = f.replace('.md','');
      btn.onclick = () => loadSummary(f);
      list.appendChild(btn);
    });

    const hash = decodeURIComponent((location.hash || '').replace('#',''));
    if (hash && files.includes(hash)) loadSummary(hash);
  </script>
</body>
</html>
