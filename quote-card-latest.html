<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Quote Card</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #1a2236, #0c0f18 65%);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: #e6edf3;
      padding: 20px;
    }
    .card {
      width: min(920px, 96vw);
      background: rgba(13, 17, 23, 0.86);
      border: 1px solid #30363d;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }
    .hero {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid #30363d;
    }
    .hero.fallback {
      background: linear-gradient(140deg, #1f2937, #0b1020 60%, #2b1f46);
    }
    .content { padding: 26px 24px 24px; }
    .kicker {
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: #7d8590;
      margin-bottom: 12px;
    }
    .quote {
      font-size: clamp(22px, 2.3vw, 34px);
      line-height: 1.35;
      font-weight: 600;
      margin: 0 0 16px;
    }
    .meta {
      font-size: 13px;
      color: #8b949e;
    }
  </style>
</head>
<body>
  <article class="card">
    <img class="hero" src="quote-card-latest.jpg" alt="Daily AI generated artwork">
    <section class="content">
      <div class="kicker">Daily Reflection</div>
      <p class="quote">“The impediment to action advances action. What stands in the way becomes the way. — Marcus Aurelius”</p>
      <div class="meta">Generated on 2026-02-25 at 164842</div>
    </section>
  </article>
</body>
</html>
