<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Stoic Quote</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Georgia', serif;
            display: flex;
            justify_content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #252525;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            text-align: center;
            border: 1px solid #333;
        }
        .art {
            margin-bottom: 30px;
        }
        /* Minimalist geometric art using CSS */
        .circle {
            width: 80px;
            height: 80px;
            border: 2px solid #555;
            border-radius: 50%;
            display: inline-block;
            margin: 0 10px;
        }
        .quote {
            font-size: 1.5em;
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .author {
            font-size: 1em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="art">
            <div class="circle"></div>
            <div class="circle" style="border-color: #777;"></div>
            <div class="circle"></div>
        </div>
        <div class="quote">
            "No man is free who is not master of himself." — Epictetus
        </div>
    </div>
</body>
</html>
