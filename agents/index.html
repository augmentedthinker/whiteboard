<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Remote Viewer | Agent Workstation Bay</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&display=swap');

    :root{
      --text:#e7f2ff;
      --muted:#aec2da;
      --line:rgba(147,202,255,.32);
      --panel:rgba(10,18,30,.78);
      --bg:linear-gradient(180deg, rgba(6,10,18,.68), rgba(6,10,18,.92)), url('../assets/agents/2026-03-03/workshop-bg.png') center/cover fixed;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      color:var(--text);
      background:var(--bg);
      min-height:100vh;
      padding:max(10px,env(safe-area-inset-top)) 10px max(12px,env(safe-area-inset-bottom));
    }

    .container{max-width:1200px;margin:0 auto}

    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:12px 13px;margin-bottom:10px}
    h1{margin:0;font-family:Orbitron,Inter,sans-serif;font-size:clamp(1.02rem,3.7vw,1.5rem);letter-spacing:.05em}
    .sub{margin:2px 0 0;color:var(--muted);font-size:.83rem}
    .back{color:#cfe7ff;text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:rgba(12,20,33,.6);font-size:.8rem;white-space:nowrap}

    .carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:10px;padding-bottom:4px;-ms-overflow-style:none;scrollbar-width:none;height:calc(100vh - 104px)}
    .carousel::-webkit-scrollbar{display:none}

    .card{
      scroll-snap-align:start;
      flex:0 0 100%;
      height:100%;
      border:1px solid color-mix(in oklab,var(--accent) 35%, #8bcaff);
      border-radius:16px;
      background:linear-gradient(160deg, rgba(14,22,36,.88), rgba(8,14,24,.82));
      box-shadow:0 14px 30px rgba(0,0,0,.38);
      overflow:hidden;
      display:grid;
      grid-template-rows:auto auto 1fr auto;
      gap:10px;
      padding:10px;
    }

    .agent-header{
      border:1px solid color-mix(in oklab,var(--accent) 34%, #8bcaff);
      border-radius:12px;
      background:rgba(8,14,24,.76);
      padding:10px;
    }
    .name{font-family:Orbitron,Inter,sans-serif;font-size:clamp(1.05rem,2.6vw,1.35rem);letter-spacing:.08em;margin:0;color:color-mix(in oklab,var(--accent) 82%, white)}
    .role{margin:4px 0 0;color:var(--muted);font-size:.82rem}

    .stage{position:relative;border:1px solid color-mix(in oklab,var(--accent) 36%, #9ad6ff);border-radius:14px;min-height:280px;background:linear-gradient(180deg, rgba(11,19,32,.45), rgba(8,14,24,.55));overflow:hidden}
    .halo{position:absolute;left:50%;top:48%;transform:translate(-50%,-50%);width:66%;aspect-ratio:1/1;border-radius:999px;background:radial-gradient(circle,color-mix(in oklab,var(--accent) 44%, transparent) 0%,color-mix(in oklab,var(--accent) 20%, transparent) 40%,transparent 72%)}
    .robot{position:absolute;inset:2% 2% 1%;background-size:contain;background-position:center;background-repeat:no-repeat;z-index:2;filter:drop-shadow(0 10px 24px rgba(0,0,0,.55))}

    .controls{
      border:1px solid color-mix(in oklab,var(--accent) 30%, #8bcaff);
      border-radius:12px;
      background:rgba(10,17,28,.76);
      padding:10px;
    }
    .controls h3{margin:0 0 8px;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:color-mix(in oklab,var(--accent) 70%, white)}

    .toggle-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
    .mode-btn,.doc-btn{
      border:1px solid color-mix(in oklab,var(--accent) 34%, #95d6ff);
      background:rgba(12,20,33,.62);
      color:#d8ecff;
      border-radius:999px;
      padding:6px 10px;
      font-size:.76rem;
      cursor:pointer;
    }
    .mode-btn.active{background:color-mix(in oklab,var(--accent) 28%, rgba(12,20,33,.62));box-shadow:inset 0 0 0 1px color-mix(in oklab,var(--accent) 65%, white)}

    .docs{display:flex;flex-wrap:wrap;gap:6px}

    #viewer{margin-top:10px;border:1px solid rgba(148,202,255,.28);border-radius:12px;background:rgba(8,14,24,.72);padding:10px;max-height:36vh;overflow:auto;display:none}
    #viewer h1,#viewer h2,#viewer h3{margin-top:0;color:#d9eeff}
    #viewer p,#viewer li{color:#c9def5;font-size:.84rem;line-height:1.45}

    .dots{display:flex;justify-content:center;gap:8px;margin-top:8px}
    .dot{width:8px;height:8px;border-radius:999px;background:rgba(167,196,225,.35);border:1px solid rgba(175,219,255,.3)}
    .dot.active{background:#9ed8ff}

    @media (max-width:959px){
      .carousel{height:auto}
      .card{height:auto;display:flex;flex-direction:column}
      .stage{min-height:300px}
      .robot{inset:1% 0 1%}
      #viewer{max-height:42vh}
    }
    @media (max-width:760px){
      .top{align-items:flex-start}
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="top">
      <div>
        <h1>Agent Workstation Bay</h1>
        <p class="sub">Image + real markdown access only (Baseline vs Current Build)</p>
      </div>
      <a class="back" href="../index.html">← Back to Remote Viewer</a>
    </header>

    <section class="carousel" id="carousel"></section>
    <div class="dots" id="dots"></div>

    <div id="viewer"></div>
  </div>

  <script>
    const personaFiles=['AGENTS.md','BOOTSTRAP.md','SOUL.md','IDENTITY.md','USER.md','TOOLS.md','HEARTBEAT.md'];

    const units=[
      {
        key:'saber',
        name:'SABER UNIT',
        role:'Operator / Orchestrator Core',
        accent:'#2f7dff',
        image:'../assets/agents/2026-03-03/saber-station-blue.png',
        baselineBase:'files/baseline/',
        currentBase:'files/saber-live/'
      },
      {
        key:'imagebot',
        name:'IMAGEBOT UNIT',
        role:'Visual Synthesis Specialist',
        accent:'#32e27a',
        image:'../assets/agents/2026-03-03/imagebot-station-cyan.png',
        baselineBase:'files/imagebot-originals/',
        currentBase:'files/imagebot-live/'
      },
      {
        key:'stylebot',
        name:'STYLEBOT UNIT',
        role:'Interface Polish Specialist',
        accent:'#b26cff',
        image:'../assets/agents/2026-03-03/stylebot-station-violet.png',
        baselineBase:'files/stylebot-originals/',
        currentBase:'files/stylebot-live/'
      }
    ];

    const carousel=document.getElementById('carousel');
    const dots=document.getElementById('dots');
    const viewer=document.getElementById('viewer');

    function renderDocs(unit, mode, card){
      const docsWrap=card.querySelector('.docs');
      const base=mode==='baseline' ? unit.baselineBase : unit.currentBase;
      docsWrap.innerHTML = personaFiles.map(f=>`<button class='doc-btn' style='--accent:${unit.accent}' data-doc='${base}${f}' data-unit='${unit.key}' data-mode='${mode}'>${f.replace('.md','')}</button>`).join('');
      card.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b.dataset.mode===mode));
    }

    units.forEach((u,i)=>{
      const card=document.createElement('article');
      card.className='card';
      card.style.setProperty('--accent',u.accent);
      card.innerHTML=`
        <section class='agent-header'>
          <p class='name'>${u.name}</p>
          <p class='role'>${u.role}</p>
        </section>

        <section class='stage'>
          <div class='halo' style='--accent:${u.accent}'></div>
          <div class='robot' style="background-image:url('${u.image}')"></div>
        </section>

        <section class='controls'>
          <h3>Mode</h3>
          <div class='toggle-row'>
            <button class='mode-btn active' style='--accent:${u.accent}' data-mode='baseline'>Baseline / Original</button>
            <button class='mode-btn' style='--accent:${u.accent}' data-mode='current'>Current Build</button>
          </div>

          <h3>Markdown Files</h3>
          <div class='docs'></div>
        </section>
      `;

      card.addEventListener('click', (e)=>{
        const mb=e.target.closest('.mode-btn');
        if(!mb) return;
        renderDocs(u, mb.dataset.mode, card);
      });

      renderDocs(u,'baseline',card);
      carousel.appendChild(card);

      const d=document.createElement('span');
      d.className='dot'+(i===0?' active':'');
      dots.appendChild(d);
    });

    carousel.addEventListener('scroll',()=>{
      const idx=Math.round(carousel.scrollLeft / carousel.clientWidth);
      [...dots.children].forEach((d,i)=>d.classList.toggle('active', i===idx));
    });

    async function loadDoc(path){
      try{
        const res=await fetch(path);
        if(!res.ok) throw new Error(`Failed to load ${path}`);
        const md=await res.text();
        viewer.style.display='block';
        viewer.innerHTML=marked.parse(md);
      }catch(err){
        viewer.style.display='block';
        viewer.innerHTML=`<h3>File unavailable</h3><p>${path}</p><p>${err.message}</p>`;
      }
      viewer.scrollIntoView({behavior:'smooth',block:'nearest'});
    }

    document.addEventListener('click', (e)=>{
      const btn=e.target.closest('.doc-btn');
      if(!btn) return;
      loadDoc(btn.dataset.doc);
    });
  </script>
</body>
</html>
