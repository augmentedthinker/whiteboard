<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Remote Viewer | Agents Workstation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&display=swap');
    :root{--text:#eaf5ff;--muted:#b8cae2;--line:rgba(140,204,255,.38);--panel:rgba(7,14,24,.8)}
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text)}
    body{background:radial-gradient(110% 90% at 50% 0%, rgba(75,130,216,.22), transparent 60%),linear-gradient(180deg, rgba(7,12,22,.58), rgba(4,9,18,.86)),url('../assets/agents/2026-03-03/workshop-bg.png') center/cover no-repeat fixed}

    .shell{height:100%;display:grid;grid-template-rows:auto 1fr auto}
    .top{padding:max(8px,env(safe-area-inset-top)) 10px 8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .title{margin:0;font-family:Orbitron,Inter,sans-serif;font-size:clamp(1rem,4.4vw,1.45rem);letter-spacing:.03em}
    .sub{margin:2px 0 0;color:var(--muted);font-size:clamp(.72rem,2.8vw,.88rem)}
    .back{color:#d8ecff;text-decoration:none;border:1px solid var(--line);padding:7px 10px;border-radius:999px;background:rgba(10,18,30,.56);font-size:.78rem;white-space:nowrap}

    .wrap{position:relative;overflow:hidden}
    .carousel{height:100%;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none;padding:4px 0 8px}
    .carousel::-webkit-scrollbar{display:none}
    .slide{flex:0 0 100%;scroll-snap-align:start;display:grid;place-items:center;padding:0 8px}

    .frame{width:min(97vw,1100px);height:min(84vh,880px);border-radius:18px;overflow:hidden;border:1px solid color-mix(in oklab, var(--accent) 35%, white 10%);background:linear-gradient(160deg, rgba(14,22,36,.86), rgba(7,13,23,.82));box-shadow:0 20px 48px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);display:grid;grid-template-rows:auto 1fr}

    .meters{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;border-bottom:1px solid color-mix(in oklab, var(--accent) 30%, transparent)}
    .meter{border:1px solid color-mix(in oklab, var(--accent) 32%, #8ac6ff);background:rgba(12,20,33,.55);border-radius:10px;padding:7px}
    .meter .label{display:flex;justify-content:space-between;font-size:.66rem;color:color-mix(in oklab, var(--accent) 65%, white);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
    .bar{height:6px;border-radius:999px;background:rgba(95,124,159,.34);overflow:hidden}
    .fill{height:100%;border-radius:999px;background:linear-gradient(90deg, color-mix(in oklab, var(--accent) 75%, #8fcfff), #e8f7ff)}

    .grid{display:grid;grid-template-columns:1fr;gap:8px;padding:10px;height:100%}
    .panel{position:relative;border:1px solid color-mix(in oklab, var(--accent) 30%, #8bcaff);border-radius:12px;background:linear-gradient(165deg, rgba(9,16,28,.9), rgba(8,14,25,.82));padding:10px 10px 12px;overflow:hidden}
    .panel::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 80% at 90% 10%, color-mix(in oklab, var(--accent) 16%, transparent), transparent 50%),linear-gradient(transparent 97%, rgba(126,190,245,.08) 98%),linear-gradient(90deg, transparent 97%, rgba(126,190,245,.06) 98%);background-size:auto, 100% 18px, 18px 100%;pointer-events:none}
    .panel h3{position:relative;z-index:1;margin:0 0 7px;font-size:.74rem;color:color-mix(in oklab, var(--accent) 72%, white);text-transform:uppercase;letter-spacing:.05em}
    .panel ul{position:relative;z-index:1;margin:0;padding-left:16px;font-size:.84rem;line-height:1.55;color:#d7e7f8}

    .stage{position:relative;border:1px solid color-mix(in oklab, var(--accent) 35%, #9ad6ff);border-radius:14px;min-height:250px;background:linear-gradient(180deg, rgba(11,19,32,.45), rgba(8,14,24,.5));overflow:hidden}
    .stage:before,.stage:after{content:"";position:absolute;z-index:3;width:22px;height:22px;border:2px solid color-mix(in oklab, var(--accent) 65%, #b4e7ff)}
    .stage:before{left:8px;top:8px;border-right:none;border-bottom:none}
    .stage:after{right:8px;bottom:8px;border-left:none;border-top:none}

    .halo{position:absolute;left:50%;top:47%;transform:translate(-50%,-50%);width:64%;aspect-ratio:1/1;border-radius:999px;background:radial-gradient(circle, color-mix(in oklab, var(--accent) 45%, transparent) 0%, color-mix(in oklab, var(--accent) 22%, transparent) 38%, rgba(0,0,0,0) 70%);filter:blur(1px)}
    .robot{position:absolute;inset:2% 2% 1%;background-size:contain;background-position:center;background-repeat:no-repeat;z-index:2;filter:drop-shadow(0 10px 24px rgba(0,0,0,.55))}
    .nameplate{position:absolute;left:10px;right:10px;bottom:8px;z-index:4;border:1px solid color-mix(in oklab, var(--accent) 32%, #8bcaff);background:rgba(7,14,24,.75);border-radius:10px;padding:7px 9px}
    .name{font-family:Orbitron,Inter,sans-serif;font-size:clamp(1.18rem,2.8vw,1.9rem);font-weight:700;letter-spacing:.08em;margin:0;color:color-mix(in oklab, var(--accent) 86%, white);text-shadow:0 0 18px color-mix(in oklab, var(--accent) 48%, transparent), 0 0 34px color-mix(in oklab, var(--accent) 24%, transparent)}
    .role{margin:4px 0 0;color:var(--muted);font-size:.83rem;letter-spacing:.02em}

    .nav{position:absolute;top:47%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:rgba(10,18,30,.72);color:#d9ecff;display:grid;place-items:center;cursor:pointer;font-size:1.2rem;z-index:10}
    .prev{left:3px}.next{right:3px}

    .dots{display:flex;justify-content:center;gap:8px;padding:8px 0 max(10px,env(safe-area-inset-bottom))}
    .dot{width:8px;height:8px;border-radius:999px;background:rgba(167,196,225,.35);border:1px solid rgba(175,219,255,.3)}
    .dot.active{background:#9ed8ff}

    @media (min-width:900px){
      .frame{width:min(95vw,1280px)}
      .grid{grid-template-columns:.92fr 1.2fr .92fr}
      .stage{min-height:0;height:100%}
      .robot{inset:2% 2% 1%}
      .panel ul{font-size:.82rem}
    }
  </style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div>
      <h1 class="title">AGENT WORKSTATION BAY</h1>
      <p class="sub">Color-coded unit identities: Saber (Cobalt), ImageBot (Cyan), StyleBot (Violet)</p>
    </div>
    <a class="back" href="../index.html">← Back</a>
  </header>

  <main class="wrap">
    <button class="nav prev" id="prev">‹</button>
    <button class="nav next" id="next">›</button>
    <section class="carousel" id="carousel"></section>
  </main>

  <footer class="dots" id="dots"></footer>
</div>

<script>
const units=[
 {name:'SABER UNIT',role:'Operator / Orchestrator Core',accent:'#2f7dff',image:'../assets/agents/2026-03-03/saber-station-blue.png',modules:['Command-chain orchestration across tools and sessions','Rapid implementation via shell/file/browser control','Memory-lane continuity and state protection','Recovery-first troubleshooting under pressure'],skills:['Scope containment that prevents feature drift','High-signal handoffs to specialist agents','Artifact-first execution with tight shipping loops'],powers:['Loop Breaker','Trajectory Lock','Recovery Protocol'],stats:{Power:95,Reliability:92,Speed:84,Precision:90}},
 {name:'IMAGEBOT UNIT',role:'Visual Synthesis Specialist',accent:'#32e27a',image:'../assets/agents/2026-03-03/imagebot-station-cyan.png',modules:['Prompt-to-render image pipeline management','Variant generation for fast visual exploration','Output naming + path discipline for production','Fallback model routing when generations fail'],skills:['Cinematic composition and framing instincts','Mood-led iteration without style drift','Production-ready output formatting and handoff'],powers:['Vision Forge','Variant Burst','Asset Discipline'],stats:{Power:90,Reliability:86,Speed:92,Precision:91}},
 {name:'STYLEBOT UNIT',role:'Interface Polish Specialist',accent:'#b26cff',image:'../assets/agents/2026-03-03/stylebot-station-violet.png',modules:['CSS polish gate for readability and hierarchy','Typography presets + contrast tuning workflow','Reusable hero/snippet styling templates','Responsive interface QA across mobile/desktop'],skills:['Premium clarity without overdesign','Mobile-first hierarchy and spacing rhythm','High-impact finish passes that stay practical'],powers:['Clarity Field','Hierarchy Engine','Finish Pass'],stats:{Power:88,Reliability:90,Speed:82,Precision:95}}
];

const carousel=document.getElementById('carousel');
const dots=document.getElementById('dots');
const baseCount = units.length;
const renderUnits = [...units, ...units, ...units];
let virtualIndex = baseCount; // start in middle band for seamless looping

function panel(title,items){return `<section class='panel'><h3>${title}</h3><ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul></section>`}
function meters(stats){return `<div class='meters'>${Object.entries(stats).map(([k,v])=>`<div class='meter'><div class='label'><span>${k}</span><span>${v}</span></div><div class='bar'><div class='fill' style='width:${v}%'></div></div></div>`).join('')}</div>`}

renderUnits.forEach((u,i)=>{
  const s=document.createElement('article'); s.className='slide';
  s.innerHTML=`<section class='frame' style='--accent:${u.accent}'>${meters(u.stats)}<section class='grid'>${panel('Tool Modules',u.modules)}<section class='stage'><div class='halo'></div><div class='robot' style="background-image:url('${u.image}')"></div><div class='nameplate'><p class='name'>${u.name}</p><p class='role'>${u.role}</p></div></section>${panel('Skills + Powers', [...u.skills,...u.powers])}</section></section>`;
  carousel.appendChild(s);
});

units.forEach((_,i)=>{
  const d=document.createElement('span'); d.className='dot'+(i===0?' active':''); dots.appendChild(d);
});

function activeBaseIndex(){
  return ((virtualIndex % baseCount) + baseCount) % baseCount;
}

function updateDots(){
  const active = activeBaseIndex();
  [...dots.children].forEach((d,i)=>d.classList.toggle('active', i===active));
}

function jumpToVirtual(idx, smooth=true){
  virtualIndex = Math.max(0, Math.min(renderUnits.length - 1, idx));
  carousel.scrollTo({left:virtualIndex*carousel.clientWidth, behavior:smooth?'smooth':'auto'});
  updateDots();
}

function step(dir){
  // Loop by snapping to an equivalent slide first, then continue same direction.
  if (dir > 0 && virtualIndex >= renderUnits.length - 1) {
    virtualIndex = baseCount * 2 - 1; // equivalent unit in middle band (less jump)
    carousel.scrollTo({left:virtualIndex*carousel.clientWidth, behavior:'auto'});
    requestAnimationFrame(()=>jumpToVirtual(virtualIndex + 1, true));
    return;
  }
  if (dir < 0 && virtualIndex <= 0) {
    virtualIndex = baseCount; // equivalent unit in middle band
    carousel.scrollTo({left:virtualIndex*carousel.clientWidth, behavior:'auto'});
    requestAnimationFrame(()=>jumpToVirtual(virtualIndex - 1, true));
    return;
  }
  jumpToVirtual(virtualIndex + dir, true);
}

document.getElementById('prev').onclick=()=>step(-1);
document.getElementById('next').onclick=()=>step(1);

carousel.addEventListener('scroll',()=>{
  const i=Math.round(carousel.scrollLeft/carousel.clientWidth);
  if(i!==virtualIndex){
    virtualIndex=i;
    updateDots();
  }
});

let sx=0;
carousel.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
carousel.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)>40) step(dx<0?1:-1);
},{passive:true});

window.addEventListener('resize',()=>jumpToVirtual(virtualIndex,false));
requestAnimationFrame(()=>jumpToVirtual(baseCount,false));
</script>
</body>
</html>
