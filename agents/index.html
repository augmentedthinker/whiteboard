<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Remote Viewer | Agents Workstation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap');
    :root{--text:#eaf4ff;--muted:#b8cce6;--line:rgba(153,214,255,.42);--panel:rgba(7,14,24,.74);}
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text)}
    body{
      background:
        radial-gradient(100% 80% at 50% 0%, rgba(74,126,207,.26), transparent 62%),
        linear-gradient(180deg, rgba(7,12,22,.64), rgba(4,9,18,.85)),
        url('../assets/agents/2026-03-03/workshop-bg.png') center/cover no-repeat fixed;
    }
    .shell{height:100%;display:grid;grid-template-rows:auto 1fr auto}
    .top{padding:max(10px,env(safe-area-inset-top)) 14px 8px;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .title{margin:0;font-family:'Space Grotesk',Inter,sans-serif;font-size:clamp(1.1rem,3.6vw,1.7rem);letter-spacing:.02em}
    .sub{margin:2px 0 0;color:var(--muted);font-size:clamp(.74rem,2vw,.9rem)}
    .back{color:#d7ecff;text-decoration:none;border:1px solid var(--line);padding:8px 12px;border-radius:999px;background:rgba(11,20,32,.55);white-space:nowrap;font-size:.85rem}

    .carousel-wrap{position:relative;height:100%;padding:8px 0 12px}
    .carousel{
      display:grid;grid-auto-flow:column;grid-auto-columns:100vw;height:100%;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;
      -ms-overflow-style:none;scrollbar-width:none;
    }
    .carousel::-webkit-scrollbar{display:none}

    .slide{scroll-snap-align:center;display:grid;place-items:center;padding:10px 12px 18px}
    .card{
      width:min(96vw,1250px);height:min(82vh,860px);position:relative;overflow:hidden;
      border:1px solid var(--line);border-radius:20px;
      background:linear-gradient(155deg, rgba(14,24,39,.74), rgba(8,15,25,.62));
      box-shadow:0 24px 56px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter:blur(4px);
    }
    .robot{position:absolute;inset:0;background-size:contain;background-position:center;background-repeat:no-repeat;filter:drop-shadow(0 12px 28px rgba(0,0,0,.5))}
    .overlay{position:absolute;inset:0;background:radial-gradient(95% 70% at 50% 45%, transparent 35%, rgba(5,10,18,.48) 100%)}

    .badge{position:absolute;left:18px;top:16px;padding:7px 10px;border-radius:999px;border:1px solid rgba(163,220,255,.55);background:rgba(12,20,32,.62);font-size:.75rem;color:#d3edff;letter-spacing:.04em;text-transform:uppercase}
    .name{position:absolute;left:18px;bottom:124px;margin:0;font-family:'Space Grotesk',Inter,sans-serif;font-size:clamp(1.1rem,3.5vw,2rem)}
    .role{position:absolute;left:18px;bottom:97px;margin:0;color:#b7cbe5;font-size:clamp(.82rem,1.8vw,1rem)}

    .hud{position:absolute;left:16px;right:16px;bottom:14px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .pane{border:1px solid rgba(149,203,255,.3);background:var(--panel);border-radius:12px;padding:10px}
    .pane h3{margin:0 0 7px;font-size:.8rem;color:#bfe4ff;letter-spacing:.04em;text-transform:uppercase}
    .pane ul{margin:0;padding-left:16px;font-size:.8rem;color:#d1e0f3;line-height:1.45}

    /* anime callout lines */
    .callout{position:absolute;border:1px solid rgba(120,204,255,.55);background:rgba(7,15,26,.74);color:#d2ebff;padding:6px 9px;border-radius:10px;font-size:.74rem;max-width:210px}
    .callout:before{content:"";position:absolute;width:48px;height:1px;background:rgba(120,204,255,.7)}

    .c1{left:14px;top:74px}.c1:before{left:100%;top:12px}
    .c2{right:14px;top:88px}.c2:before{right:100%;top:12px}
    .c3{left:16px;top:42%}.c3:before{left:100%;top:13px;width:62px}
    .c4{right:16px;top:42%}.c4:before{right:100%;top:13px;width:62px}

    .nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:rgba(10,18,30,.62);color:#d9ecff;display:grid;place-items:center;cursor:pointer;font-size:1.3rem;z-index:5}
    .prev{left:10px}.next{right:10px}

    .dots{display:flex;justify-content:center;gap:8px;padding:8px 0 max(10px,env(safe-area-inset-bottom))}
    .dot{width:9px;height:9px;border-radius:999px;background:rgba(167,196,225,.35);border:1px solid rgba(175,219,255,.3)}
    .dot.active{background:#9ed8ff}

    @media (max-width:980px){
      .hud{grid-template-columns:1fr}
      .name{bottom:252px}.role{bottom:228px}
      .card{height:min(86vh,920px)}
      .callout{font-size:.68rem;max-width:170px}
    }
  </style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div>
      <h1 class="title">🤖 Agent Workstation Bay</h1>
      <p class="sub">Swipe left/right to bring each unit to the front. Same workshop, swapped robots, tactical UI overlays.</p>
    </div>
    <a class="back" href="../index.html">← Back to Remote Viewer</a>
  </header>

  <main class="carousel-wrap">
    <button class="nav prev" id="prev">‹</button>
    <button class="nav next" id="next">›</button>
    <section class="carousel" id="carousel"></section>
  </main>

  <footer class="dots" id="dots"></footer>
</div>

<script>
const units = [
  {
    name:'⚔️ Saber Unit', role:'Operator / Orchestrator Core', badge:'PRIMARY COMMAND',
    image:'../assets/agents/2026-03-03/saber-station.png',
    callouts:['Trajectory Lock Core','Cross-Agent Relay Bus','Build Execution Arms','System Recovery Shield'],
    modules:['File + shell ops','Browser control','Memory lane continuity','Session orchestration'],
    skills:['Scope containment','High-signal handoffs','Artifact-first shipping'],
    powers:['Loop Breaker','Trajectory Lock','Recovery Protocol']
  },
  {
    name:'🖼️ ImageBot Unit', role:'Visual Synthesis Specialist', badge:'VISUAL FORGE',
    image:'../assets/agents/2026-03-03/imagebot-station.png',
    callouts:['Optic Capture Cluster','Render Engine Pack','Variant Burst Array','Asset Routing Port'],
    modules:['Gemini image pipeline','Variant generation','Naming/output contract','Render fallback lane'],
    skills:['Cinematic composition','Mood iteration','Production-ready asset prep'],
    powers:['Vision Forge','Variant Burst','Asset Discipline']
  },
  {
    name:'🎨 StyleBot Unit', role:'Interface Polish Specialist', badge:'POLISH ENGINE',
    image:'../assets/agents/2026-03-03/stylebot-station.png',
    callouts:['Typography Visor','Hierarchy Mapping Lens','Readability Calibration Arm','Finish-Pass Injector'],
    modules:['CSS polish gate','Font-pair presets','Hero snippet templates','Responsive tuning tools'],
    skills:['Premium clarity','Mobile-first hierarchy','High-impact minimal passes'],
    powers:['Clarity Field','Hierarchy Engine','Finish Pass']
  }
];

const carousel = document.getElementById('carousel');
const dots = document.getElementById('dots');
let index = 0;

function pane(title, items){
  return `<div class='pane'><h3>${title}</h3><ul>${items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
}

units.forEach((u,i)=>{
  const slide = document.createElement('article');
  slide.className='slide';
  slide.innerHTML = `
    <section class='card'>
      <div class='robot' style="background-image:url('${u.image}')"></div>
      <div class='overlay'></div>
      <div class='badge'>${u.badge}</div>
      <h2 class='name'>${u.name}</h2>
      <p class='role'>${u.role}</p>

      <div class='callout c1'>${u.callouts[0]}</div>
      <div class='callout c2'>${u.callouts[1]}</div>
      <div class='callout c3'>${u.callouts[2]}</div>
      <div class='callout c4'>${u.callouts[3]}</div>

      <div class='hud'>
        ${pane('Tool Modules',u.modules)}
        ${pane('Skill Package',u.skills)}
        ${pane('Powers / Mission Strength',u.powers)}
      </div>
    </section>`;
  carousel.appendChild(slide);

  const d = document.createElement('span');
  d.className='dot'+(i===0?' active':'');
  dots.appendChild(d);
});

function updateDots(){
  [...dots.children].forEach((d,i)=>d.classList.toggle('active', i===index));
}

function go(i){
  index = (i+units.length)%units.length;
  carousel.scrollTo({left:index*window.innerWidth, behavior:'smooth'});
  updateDots();
}

document.getElementById('prev').onclick=()=>go(index-1);
document.getElementById('next').onclick=()=>go(index+1);

carousel.addEventListener('scroll',()=>{
  const i = Math.round(carousel.scrollLeft / window.innerWidth);
  if(i!==index){index=i;updateDots();}
});

let startX=0;
carousel.addEventListener('touchstart',e=>startX=e.touches[0].clientX,{passive:true});
carousel.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-startX;
  if(Math.abs(dx)>45) go(index + (dx<0?1:-1));
},{passive:true});
</script>
</body>
</html>
