<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- full-bleed rounded app tile -->
  <rect x="16" y="16" width="480" height="480" rx="110" fill="url(#bg)"/>

  <!-- remote body -->
  <rect x="146" y="86" width="220" height="340" rx="78" fill="#0d1117"/>

  <!-- d-pad -->
  <rect x="190" y="180" width="52" height="18" rx="9" fill="#c9d1d9"/>
  <rect x="207" y="163" width="18" height="52" rx="9" fill="#c9d1d9"/>

  <!-- action buttons -->
  <circle cx="292" cy="180" r="13" fill="#ff7b72"/>
  <circle cx="322" cy="204" r="13" fill="#3fb950"/>

  <!-- lower buttons -->
  <circle cx="214" cy="270" r="10" fill="#8b949e"/>
  <circle cx="246" cy="270" r="10" fill="#8b949e"/>
  <rect x="274" y="262" width="62" height="16" rx="8" fill="#8b949e"/>

  <!-- accent line -->
  <rect x="182" y="334" width="148" height="14" rx="7" fill="#58a6ff"/>
</svg>
