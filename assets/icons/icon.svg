<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- full tile fill (no transparent margins) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- remote body (larger so icon reads bigger on launchers) -->
  <rect x="122" y="54" width="268" height="404" rx="96" fill="#0d1117"/>

  <!-- d-pad -->
  <rect x="175" y="172" width="66" height="22" rx="11" fill="#c9d1d9"/>
  <rect x="197" y="150" width="22" height="66" rx="11" fill="#c9d1d9"/>

  <!-- action buttons -->
  <circle cx="308" cy="176" r="17" fill="#ff7b72"/>
  <circle cx="344" cy="206" r="17" fill="#3fb950"/>

  <!-- lower controls -->
  <circle cx="206" cy="286" r="13" fill="#8b949e"/>
  <circle cx="246" cy="286" r="13" fill="#8b949e"/>
  <rect x="278" y="276" width="74" height="20" rx="10" fill="#8b949e"/>

  <!-- accent -->
  <rect x="170" y="360" width="172" height="18" rx="9" fill="#58a6ff"/>
</svg>
