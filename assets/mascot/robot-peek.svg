<svg width="900" height="1400" viewBox="0 0 900 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="face" x1="180" y1="260" x2="760" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F76B5"/>
      <stop offset="1" stop-color="#223A66"/>
    </linearGradient>
    <linearGradient id="glow" x1="360" y1="640" x2="680" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9BE7FF" stop-opacity="0"/>
