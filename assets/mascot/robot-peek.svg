    <rect x="360" y="360" width="220" height="120" rx="60" fill="#0F1A2E" stroke="#95DCFF" stroke-opacity="0.55" stroke-width="4"/>
    <circle cx="430" cy="420" r="26" fill="#9BE7FF"/>
    <circle cx="510" cy="420" r="26" fill="#9BE7FF"/>
    <circle cx="430" cy="420" r="10" fill="#E9FDFF"/>
    <circle cx="510" cy="420" r="10" fill="#E9FDFF"/>

    <rect x="395" y="560" width="150" height="28" rx="14" fill="#8FD5FF"/>
    <rect x="395" y="560" width="150" height="28" rx="14" fill="url(#glow)"/>

    <circle cx="470" cy="680" r="14" fill="#B2CAFF"/>
    <circle cx="470" cy="680" r="6" fill="#E6F1FF"/>

