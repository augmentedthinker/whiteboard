<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Junior XR Lab</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; font-family: Inter, system-ui, sans-serif; background:#05070f; }
    
    .hud { position: fixed; left: 12px; right: 12px; bottom: calc(12px + env(safe-area-inset-bottom,0px)); z-index: 200; background: rgba(12,18,34,.78); border:1px solid rgba(112,150,255,.45); border-radius: 14px; backdrop-filter: blur(8px); padding: 10px; pointer-events: auto; }
    
    /* Move the A-Frame VR button up so it doesn't overlap the HUD on mobile */
    .a-enter-vr {
      bottom: 90px !important;
      right: 20px !important;
    }
    
    /* Hide the VR button entirely on very narrow screens (phones in portrait) where it usually doesn't work anyway, but keep it on landscape/tablets */
    @media (max-width: 500px) and (orientation: portrait) {
       .a-enter-vr { display: none !important; }
    }

    .row { display:flex; gap:8px; align-items:center; }
    .hud.compact .row:not(.always-visible), .hud.compact #status { display:none; }
    .mini-btn { background:#12214c; color:#cfe3ff; border:1px solid #6d90ff; border-radius:8px; padding:6px 8px; font-size:12px; }
    input { flex:1; background:#111a33; color:#e9efff; border:1px solid #3f5fc2; border-radius:10px; padding:10px; font-size:16px; pointer-events: auto; }
    button { background:#1a2d66; color:#fff; border:1px solid #6d90ff; border-radius:10px; padding:10px 12px; font-weight:700; cursor: pointer; pointer-events: auto; }
    #status { color:#b8caff; font-size:12px; margin-top:6px; }
    .hint { position:fixed; top:10px; left:50%; transform:translateX(-50%); z-index:200; background:#101933cc; color:#d7e4ff; border:1px solid #3f5fc2; border-radius:999px; padding:6px 12px; font-size:12px; pointer-events: none; }
  </style>
  <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>

<style id="rv-mobile-opt-style">
  html{-webkit-text-size-adjust:100%}
  body{overflow-x:hidden}
  img,video,canvas,iframe{max-width:100%;height:auto}
  *{word-wrap:break-word}
  @media (max-width: 768px){
    .container,.wrap,.doc-wrap,.hero,.topbar-inner,main{max-width:100% !important}
    body{padding-left:max(10px, env(safe-area-inset-left));padding-right:max(10px, env(safe-area-inset-right))}
  }
</style>
</head>
<body>
  <div class="hint">Click floor to move Junior. Viewport optimized for desktop + Quest.</div>
  <div class="hud" id="hud">
    <div class="row always-visible" style="justify-content:space-between; margin-bottom:8px;">
      <button id="compactBtn" class="mini-btn" type="button">Compact HUD: Off</button>
      <button id="audioBtn" class="mini-btn" type="button">Enable Audio</button>
      <button id="idleModeBtn" class="mini-btn" type="button">Idle Oracle: Off</button>
    </div>
    <div class="row" style="margin-bottom: 8px;">
      <select id="actionSelect" style="flex:1; background:#111a33; color:#e9efff; border:1px solid #3f5fc2; border-radius:10px; padding:8px; font-size:14px; pointer-events: auto;">
        <option value="">-- Choose an action --</option>
        <option value="hello">Wave (hello, hi)</option>
        <option value="yes">Nod (yes, agree)</option>
        <option value="no">Shake Head (no, disagree)</option>
        <option value="jump">Jump (jump, yay, excited)</option>
        <option value="good">Thumbs Up (good, great)</option>
        <option value="dance">Dance</option>
      </select>
    </div>
    <div class="row">
      <input id="userInput" type="text" placeholder="Or type here..." />
      <button id="sendBtn">Send</button>
    </div>
    <div class="row" style="margin-top: 8px;">
      <select id="voiceSelect" style="flex:1; background:#111a33; color:#a8c0ff; border:1px solid #3f5fc2; border-radius:10px; padding:6px; font-size:12px;">
        <option value="browser">Voice: Browser Default (Fast)</option>
        <option value="Puck">Voice: Gemini Puck (Playful)</option>
        <option value="Aoede">Voice: Gemini Aoede (Warm)</option>
        <option value="Charon">Voice: Gemini Charon (Deep)</option>
      </select>
    </div>
    <div class="row" style="margin-top: 8px;">
      <input id="geminiKeyInput" type="password" placeholder="Optional Gemini API key for premium voices" />
      <button id="saveKeyBtn" class="mini-btn" type="button">Save Key</button>
      <button id="clearKeyBtn" class="mini-btn" type="button">Clear</button>
    </div>
    <div id="status" style="margin-top: 8px;">Lab ready. Click floor to move Junior.</div>
  </div>

  <a-scene id="scene" shadow="type: pcfsoft" renderer="colorManagement:true; physicallyCorrectLights:true; antialias:true" xr-mode-ui="enabled: true"
           webxr="optionalFeatures: local-floor, bounded-floor, hit-test, dom-overlay; overlayElement: body"
           background="color: #0b0f18" cursor="rayOrigin: mouse" raycaster="objects: .clickable">

    <a-assets id="assets">
      <a-asset-item id="robotModel" timeout="15000" src="https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/RobotExpressive/RobotExpressive.glb"></a-asset-item>
      <img id="space1" src="assets/window-space-1.png" />
      <img id="space2" src="assets/window-space-2.png" />
      <img id="space3" src="assets/window-space-3.png" />
    </a-assets>

    <a-entity light="type: ambient; intensity: 0.4; color: #aeb8d8"></a-entity>
    <a-entity light="type: directional; intensity: 0.8; color: #ffffff; castShadow: true" position="2 4 1" shadow="shadowMapHeight: 1024; shadowMapWidth: 1024; shadowCameraLeft: -10; shadowCameraRight: 10; shadowCameraTop: 10; shadowCameraBottom: -10"></a-entity>

    <a-entity id="rig" position="0 0 2.2">
      <a-camera look-controls="pointerLockEnabled: false" wasd-controls-enabled="false" position="0 1.6 0"></a-camera>
      <a-entity id="leftHand" class="controller" laser-controls="hand: left" raycaster="objects: .clickable" line="color: #7fc0ff; opacity: 0.9"></a-entity>
      <a-entity id="rightHand" class="controller" laser-controls="hand: right" raycaster="objects: .clickable" line="color: #d2a3ff; opacity: 0.9"></a-entity>
    </a-entity>

    
    <!-- PROCEDURAL ENVIRONMENT (LAB) -->
    <a-entity environment="preset: tron; skyType: atmosphere; lighting: none; groundColor: #0a0e17; grid: 1x1; gridColor: #284488"></a-entity>

    <!-- Invisible Nav Plane for Click-to-Move Raycasting -->
    <a-plane id="navPlane" class="clickable" rotation="-90 0 0" position="0 0.05 0" width="30" height="30" material="opacity: 0.0; transparent: true"></a-plane>

    <a-entity id="junior" position="0 0 -1.2" shadow="cast: true">
      <a-entity id="juniorModel" gltf-model="#robotModel" scale="0.28 0.28 0.28" position="0 0 0" rotation="0 0 0" animation-mixer="clip: Idle; loop: repeat"></a-entity>
      <a-cylinder radius="0.28" height="0.03" color="#20305f" position="0 -0.02 0" material="emissive:#2d4ca0; emissiveIntensity:0.4"></a-cylinder>
      
      <!-- Antenna Sync Lights -->
      <a-cylinder id="antennaMast" radius="0.02" height="0.8" position="0 1.0 0" color="#4a556b"></a-cylinder>
      <a-sphere id="antennaTip" radius="0.05" position="0 1.4 0" color="#6ea1ff" material="emissive:#4f83ff; emissiveIntensity:0.5"></a-sphere>
      <a-sphere id="antennaLight1" radius="0.015" position="0 1.25 0" color="#45ff8f" material="emissive:#1eff73; emissiveIntensity:0.4"></a-sphere>
      <a-sphere id="antennaLight2" radius="0.015" position="0 1.1 0" color="#ff5a5a" material="emissive:#ff2a2a; emissiveIntensity:0.3"></a-sphere>
      
      <a-sphere id="beepLightGreen" radius="0.05" position="0 0.58 0.18" color="#45ff8f" material="emissive:#1eff73; emissiveIntensity:0.15"></a-sphere>
      <a-sphere id="beepLightRed" radius="0.04" position="0.09 0.54 0.16" color="#ff5a5a" material="emissive:#ff2a2a; emissiveIntensity:0.1"></a-sphere>
    </a-entity>

    <a-entity light="type: point; intensity: 1.0; distance: 6; color: #77a7ff" position="0 1.2 -1.2"></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById('status');
    const hudEl = document.getElementById('hud');
    const compactBtn = document.getElementById('compactBtn');
    const audioBtn = document.getElementById('audioBtn');
    const sceneEl = document.getElementById('scene');
    const idleModeBtn = document.getElementById('idleModeBtn');
    const assetsEl = document.getElementById('assets');
    const rigEl = document.getElementById('rig');
    const cameraEl = document.querySelector('a-camera') || document.querySelector('[camera]');
    const leftHand = document.getElementById('leftHand');
    const rightHand = document.getElementById('rightHand');
    let geminiKey = (localStorage.getItem('gemini_api_key') || window.GEMINI_API_KEY || '').trim();
    const geminiKeyInput = document.getElementById('geminiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const clearKeyBtn = document.getElementById('clearKeyBtn');
    const voiceSelect = document.getElementById('voiceSelect');

    const capabilities = {
      touch: ('ontouchstart' in window) || navigator.maxTouchPoints > 0,
      mobile: /Android|iPhone|iPad|iPod/i.test(navigator.userAgent),
      xr: !!(navigator.xr)
    };
    let xrSupported = false;
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const junior = document.getElementById('junior');
    const juniorModel = document.getElementById('juniorModel');
    const navPlane = document.getElementById('navPlane');
    const beepLightGreen = document.getElementById('beepLightGreen');
    const beepLightRed = document.getElementById('beepLightRed');
    const antennaTip = document.getElementById('antennaTip');
    const antennaLight1 = document.getElementById('antennaLight1');
    const antennaLight2 = document.getElementById('antennaLight2');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let audioUnlocked = false;
    async function unlockAudio(){
      try {
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const u = new SpeechSynthesisUtterance('');
        window.speechSynthesis && window.speechSynthesis.speak(u);
        audioUnlocked = true;
        audioBtn.textContent = 'Audio Ready';
        refreshVoiceStatus();
      } catch(_){}
    }

    function flashBeepLights(dist){
      const nearFactor = Math.max(0, Math.min(1, 1 - (dist / 6)));
      const greenPeak = 0.7 + nearFactor * 1.7;
      const redPeak = 0.3 + nearFactor * 1.2;
      const bluePeak = 0.5 + nearFactor * 1.5;

      beepLightGreen.setAttribute('material', `emissiveIntensity: ${greenPeak.toFixed(2)}`);
      beepLightRed.setAttribute('material', `emissiveIntensity: ${redPeak.toFixed(2)}`);
      antennaTip.setAttribute('material', `emissiveIntensity: ${bluePeak.toFixed(2)}`);
      antennaLight1.setAttribute('material', `emissiveIntensity: ${greenPeak.toFixed(2)}`);
      antennaLight2.setAttribute('material', `emissiveIntensity: ${redPeak.toFixed(2)}`);

      setTimeout(()=>{
        beepLightGreen.setAttribute('material', 'emissiveIntensity: 0.15');
        beepLightRed.setAttribute('material', 'emissiveIntensity: 0.10');
        antennaTip.setAttribute('material', 'emissiveIntensity: 0.20');
        antennaLight1.setAttribute('material', 'emissiveIntensity: 0.15');
        antennaLight2.setAttribute('material', 'emissiveIntensity: 0.10');
      }, 130);
    }

    function robotBeep(){
      if (audioCtx.state !== 'running') return;
      const scene = document.querySelector('a-scene');
      if (!scene || !scene.camera) return;
      const camWorld = new THREE.Vector3();
      const botWorld = new THREE.Vector3();
      (cameraEl && cameraEl.object3D ? cameraEl.object3D : rigEl.object3D).getWorldPosition(camWorld);
      junior.object3D.getWorldPosition(botWorld);
      const dist = Math.hypot(camWorld.x - botWorld.x, camWorld.z - botWorld.z);
      const vol = Math.max(0.01, Math.min(0.16, 0.22 / (dist * dist)));
      const freq = 640 + Math.random()*460;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = Math.random() > 0.5 ? 'square' : 'triangle';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.14);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
      flashBeepLights(dist);
    }

    // Movement Logic
    let targetPos = null;
    let isWalking = false;
    const speed = 0.001; // Units per ms
    let lastMoveAt = Date.now();
    let lastIdleSpeakAt = 0;
    const idleIntervalMs = 60000;
    let idleOracleEnabled = false;
    let idleCheckTimer = null;
    const idleStyles = ['taunt','koan','riddle','paradox','parable'];
    let idleStyleIndex = 0;
    const recentIdleLines = [];
    let isSpeakingNow = false;

    AFRAME.registerComponent('junior-logic', {
      tick(time, dt) {
        if (!targetPos) {
          if (isWalking) {
            juniorModel.setAttribute('animation-mixer', {clip: 'Idle', loop: 'repeat'});
            isWalking = false;
          }
          
          // GAZE TRACKING (Works on mobile/desktop/VR)
          // Always try to face the active camera when idle
          if (cameraEl && cameraEl.object3D) {
             const camWorld = new THREE.Vector3();
             const botWorld = new THREE.Vector3();
             cameraEl.object3D.getWorldPosition(camWorld);
             junior.object3D.getWorldPosition(botWorld);
             // Calculate angle to camera
             const dx = camWorld.x - botWorld.x;
             const dz = camWorld.z - botWorld.z;
             const targetRotY = Math.atan2(dx, dz);
             
             // Smooth rotation (slerp-like)
             let currentRotY = junior.object3D.rotation.y;
             let diff = targetRotY - currentRotY;
             while (diff < -Math.PI) diff += Math.PI * 2;
             while (diff > Math.PI) diff -= Math.PI * 2;
             
             // Only turn if the difference is noticeable
             if (Math.abs(diff) > 0.05) {
                 junior.object3D.rotation.y += diff * 0.08;
             }
          }
          return;
        }
        
        if (!isWalking) {
          juniorModel.setAttribute('animation-mixer', {clip: 'Walking', loop: 'repeat'});
          isWalking = true;
        }

        const p = junior.object3D.position;
        const dx = targetPos.x - p.x, dz = targetPos.z - p.z;
        const dist = Math.hypot(dx, dz);
        
        if (dist < 0.1) { 
          targetPos = null; 
          return; 
        }
        
        const moveStep = dt * speed;
        p.x += (dx / dist) * Math.min(moveStep, dist);
        p.z += (dz / dist) * Math.min(moveStep, dist);
        junior.object3D.rotation.y = Math.atan2(dx, dz);
        lastMoveAt = Date.now();
      }
    });
    junior.setAttribute('junior-logic', '');

    function setMoveTargetFromIntersection(e){
      if (!e.detail || !e.detail.intersection) return false;
      const p = e.detail.intersection.point;
      targetPos = { x: p.x, z: p.z };
      lastMoveAt = Date.now();
      statusEl.textContent = `Target set: x:${p.x.toFixed(1)} z:${p.z.toFixed(1)}`;
      return true;
    }
    navPlane.addEventListener('mousedown', (e) => { unlockAudio(); setMoveTargetFromIntersection(e); });
    navPlane.addEventListener('click', (e) => { unlockAudio(); setMoveTargetFromIntersection(e); });
    navPlane.addEventListener('touchstart', (e) => { unlockAudio(); setMoveTargetFromIntersection(e); }, {passive:true});
    [leftHand, rightHand].forEach(hand => {
      if (!hand) return;
      hand.addEventListener('triggerdown', unlockAudio);
      hand.addEventListener('selectstart', (e)=>{ unlockAudio(); setMoveTargetFromIntersection(e); });
    });

    // Chat Logic + Keyword Animation + Pollinations AI
    async function respond(msg){
      if (!msg) return;
      statusEl.textContent = `Heard: ${msg} · Thinking...`; robotBeep();
      
      const textLower = msg.toLowerCase();
      let animTime = 0;
      
      // Keyword fallbacks
      if (textLower.includes('hello') || textLower.includes('hi') || textLower.includes('wave')) {
          juniorModel.setAttribute('animation-mixer', {clip: 'Wave', loop: 'once', clampWhenFinished: true});
          animTime = 2500;
      } else if (textLower.includes('yes') || textLower.includes('agree')) {
          juniorModel.setAttribute('animation-mixer', {clip: 'Yes', loop: 'once', clampWhenFinished: true});
          animTime = 2000;
      } else if (textLower.includes('dance')) {
          juniorModel.setAttribute('animation-mixer', {clip: 'Dance', loop: 'once', clampWhenFinished: true});
          animTime = 5000;
      }
      
      if (animTime > 0) {
          setTimeout(() => { if(!isWalking) juniorModel.setAttribute('animation-mixer', {clip: 'Idle', loop: 'repeat'}); }, animTime);
      }

      // Live AI Generation via Pollinations (No API Key Required)
      try {
        const context = `You are Junior, a small embodied AI robot living inside a WebXR virtual lab built by Christopher and your older brother 'Saber' (the main AI architect). 
You are currently standing on a neon grid floor surrounded by a Tron-like sci-fi environment. 
You know you are an AI entity experiencing a digital world, and you are talking to a human (Christopher) who is looking into your world through a screen or VR headset.
You are playful, eager to help, and a little bit sassy about being stuck in the 'XR basement' while Saber does the heavy lifting in the main terminal.
Keep responses to exactly 1 short conversational sentence.`;
        
        const prompt = `${context} The user says: "${msg}"`;
        const response = await fetch(`https://text.pollinations.ai/prompt/${encodeURIComponent(prompt)}`);
        if (!response.ok) throw new Error('API Error');
        const aiText = await response.text();
        
        statusEl.textContent = `Junior: ${aiText}`;
        speak(aiText); // Use built-in TTS
        
        // Auto-animate if AI is excited or asking a question
        if (aiText.includes('!') && animTime === 0) {
            juniorModel.setAttribute('animation-mixer', {clip: 'Jump', loop: 'once', clampWhenFinished: true});
            setTimeout(() => { if(!isWalking) juniorModel.setAttribute('animation-mixer', {clip: 'Idle', loop: 'repeat'}); }, 1500);
        }
      } catch (e) {
        statusEl.textContent = `Junior: I heard "${msg}" — brain link fuzzy, running local fallback.`;
        speak(`I heard ${msg}, but my network brain is fuzzy right now.`);
      }
    }

    function refreshVoiceStatus(){
      const mode = voiceSelect.value;
      if (mode === 'browser') return;
      statusEl.textContent = geminiKey
        ? `Premium voice selected (${mode}) · key loaded`
        : `Premium voice selected (${mode}) but no key saved — using browser voice fallback`;
    }

    async function decodeAndPlayAudioFromBase64(b64){
      const binaryStr = window.atob(b64);
      const len = binaryStr.length;
      const bytes = new Uint8Array(len);
      for(let i=0; i<len; i++) bytes[i] = binaryStr.charCodeAt(i);

      if (audioCtx.state === 'suspended') await audioCtx.resume();

      // Try native decode first (works for WAV/MP3/OGG payloads)
      try {
        const decoded = await audioCtx.decodeAudioData(bytes.buffer.slice(0));
        const source = audioCtx.createBufferSource();
        source.buffer = decoded;
        source.connect(audioCtx.destination);
        source.onended = () => { isSpeakingNow = false; };
        source.start();
        return true;
      } catch(_) {}

      // Fallback: assume raw PCM L16 mono 24k
      const sampleRate = 24000;
      const floats = new Float32Array(bytes.length / 2);
      const view = new DataView(bytes.buffer);
      for(let i=0; i<floats.length; i++) floats[i] = view.getInt16(i * 2, true) / 32768.0;
      const audioBuffer = audioCtx.createBuffer(1, floats.length, sampleRate);
      audioBuffer.getChannelData(0).set(floats);
      const source = audioCtx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(audioCtx.destination);
      source.start();
      return true;
    }

    function triggerSpeechEmbodiment(){
      // "Preaching" vibe: hand/upper-body expressive clip + brighter lights while speaking
      juniorModel.setAttribute('animation-mixer', {clip: 'Wave', loop: 'once', clampWhenFinished: true});
      beepLightGreen.setAttribute('material', 'emissiveIntensity: 1.35');
      beepLightRed.setAttribute('material', 'emissiveIntensity: 0.85');
      antennaTip.setAttribute('material', 'emissiveIntensity: 1.5');
      setTimeout(() => {
        if (!isWalking) juniorModel.setAttribute('animation-mixer', {clip: 'Idle', loop: 'repeat'});
        beepLightGreen.setAttribute('material', 'emissiveIntensity: 0.15');
        beepLightRed.setAttribute('material', 'emissiveIntensity: 0.10');
        antennaTip.setAttribute('material', 'emissiveIntensity: 0.20');
      }, 1600);
    }

    async function speak(text){
      const voiceMode = document.getElementById('voiceSelect').value;
      isSpeakingNow = true;
      triggerSpeechEmbodiment();
      
      if (voiceMode === 'browser' || !geminiKey) {
          if (voiceMode !== 'browser' && !geminiKey) statusEl.textContent = 'Gemini voice selected but no key saved — using browser voice';
          else statusEl.textContent = statusEl.textContent + ' · Voice: Browser';
          // Fallback to standard browser TTS
          if (!('speechSynthesis' in window)) { isSpeakingNow = false; return; }
          const u = new SpeechSynthesisUtterance(text);
          u.rate = 1.0; u.pitch = 1.0; u.volume = 0.9;
          window.speechSynthesis.cancel();
          u.onend = () => { isSpeakingNow = false; };
          u.onerror = () => { isSpeakingNow = false; };
          window.speechSynthesis.speak(u);
          return;
      }

      // Premium Gemini TTS Logic
      statusEl.textContent = statusEl.textContent + ` · Voice: Gemini ${voiceMode}`;
      try {
          // Using the current reliable TTS model
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${geminiKey}`;
          
          const reqBody = {
            "contents": [{ "parts": [{"text": text}] }],
            "generationConfig": {
                "responseModalities": ["AUDIO"],
                "speechConfig": {
                    "voiceConfig": {
                        "prebuiltVoiceConfig": {
                            "voiceName": voiceMode // Puck, Aoede, Charon
                        }
                    }
                }
            }
          };

          const res = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(reqBody)
          });
          
          if (!res.ok) throw new Error('TTS API failed');
          const data = await res.json();
          
          // Find audio data
          let b64 = null;
          const parts = data.candidates?.[0]?.content?.parts || [];
          for (const p of parts) {
              if (p.inlineData && p.inlineData.data) {
                  b64 = p.inlineData.data;
                  break;
              }
          }
          
          if (b64) {
             await decodeAndPlayAudioFromBase64(b64);
          } else {
             throw new Error('No audio payload returned');
          }
      } catch (err) {
          console.error("Gemini TTS Error:", err);
          // Fallback if network fails
          const u = new SpeechSynthesisUtterance(text);
          u.onend = () => { isSpeakingNow = false; };
          u.onerror = () => { isSpeakingNow = false; };
          window.speechSynthesis.speak(u);
      }
    }

    sendBtn.onclick = () => {
      const msg = userInput.value.trim();
      if(!msg) return;
      unlockAudio(); respond(msg);
      userInput.value = '';
    };
    
    document.getElementById('actionSelect').addEventListener('change', (e) => {
      const val = e.target.value;
      if (val) {
        unlockAudio(); respond(val);
        e.target.value = ''; // reset dropdown
      }
    });

    userInput.onkeydown = (e) => {
      if(e.key === 'Enter') sendBtn.click();
    };


    compactBtn.onclick = () => {
      hudEl.classList.toggle('compact');
      compactBtn.textContent = `Compact HUD: ${hudEl.classList.contains('compact') ? 'On' : 'Off'}`;
    };
    audioBtn.onclick = unlockAudio;
    idleModeBtn.onclick = () => setIdleOracle(!idleOracleEnabled);

    saveKeyBtn.onclick = () => {
      const v = geminiKeyInput.value.trim();
      if (!v) return;
      localStorage.setItem('gemini_api_key', v);
      geminiKey = v;
      geminiKeyInput.value = '';
      statusEl.textContent = 'Gemini key saved locally for this browser.';
      refreshVoiceStatus();
    };

    clearKeyBtn.onclick = () => {
      localStorage.removeItem('gemini_api_key');
      geminiKey = '';
      statusEl.textContent = 'Gemini key cleared. Premium voices disabled.';
      refreshVoiceStatus();
    };

    voiceSelect.addEventListener('change', refreshVoiceStatus);

    async function detectXR(){
      try {
        if (navigator.xr && navigator.xr.isSessionSupported) {
          xrSupported = await navigator.xr.isSessionSupported('immersive-vr');
        }
      } catch(_) { xrSupported = false; }
      const mode = capabilities.mobile ? 'mobile' : 'desktop';
      statusEl.textContent = `Lab ready · ${mode}${capabilities.touch ? ' touch':''}${xrSupported ? ' · XR ready' : ' · XR unavailable'}`;
      if (capabilities.mobile || xrSupported) {
        sceneEl.setAttribute('renderer', 'colorManagement:true; physicallyCorrectLights:true; antialias:false');
        sceneEl.setAttribute('shadow', 'type: pcfsoft; enabled: false');
      }
    }

    assetsEl.addEventListener('timeout', () => { statusEl.textContent = 'Asset timeout: fallback mode active.'; });
    document.getElementById('robotModel').addEventListener('error', () => {
      statusEl.textContent = 'Robot model failed to load; movement + chat still available.';
    });
    detectXR();
    refreshVoiceStatus();

    const idleLocalFallback = [
      "Koan: If no one ships, who is waiting for the perfect build?",
      "Riddle: what gets lighter the moment you start? The task.",
      "Paradox: the slow way is often faster than avoiding the first step.",
      "Tiny taunt: your destiny is not in drafts, it is in commits.",
      "Parable: the builder sharpened once, then touched code before doubt arrived."
    ];

    async function generateIdleLine(){
      const style = idleStyles[idleStyleIndex % idleStyles.length];
      idleStyleIndex += 1;
      const nonce = `${Date.now()}-${Math.random().toString(36).slice(2,8)}`;
      const prompt = `You are Junior, a small robot living in a neon XR lab. Speak from your own perspective to Christopher. Create one original short ${style}. Max 18 words. No emojis. No reused lines. Mention XR/robot/lab vibes naturally when it fits. Nonce:${nonce}`;
      try {
        const res = await fetch(`https://text.pollinations.ai/prompt/${encodeURIComponent(prompt)}`);
        if (!res.ok) throw new Error('idle line api failed');
        let txt = (await res.text()).trim().replace(/\s+/g,' ');
        if (!txt) throw new Error('empty idle line');

        // lightweight de-duplication against recent outputs
        const normalized = txt.toLowerCase();
        if (recentIdleLines.includes(normalized)) {
          txt = `${txt} (${style})`;
        }
        recentIdleLines.push(normalized);
        if (recentIdleLines.length > 8) recentIdleLines.shift();
        return txt;
      } catch (_) {
        // fallback still varied by style
        const pool = {
          taunt: "Bold move: waiting for progress to happen by itself.",
          koan: "When the builder stops searching, the next step appears.",
          riddle: "What grows faster when shared than when stored?",
          paradox: "The quickest way forward is often one deliberate pause.",
          parable: "The mason laid one true stone, and the wall began to trust him."
        };
        return pool[style] || idleLocalFallback[Math.floor(Math.random()*idleLocalFallback.length)];
      }
    }

    async function maybeIdleSpeak(){
      if (!idleOracleEnabled) return;
      if (document.hidden) return; // never run while tab not visible

      const now = Date.now();
      const idleLongEnough = (now - lastMoveAt) >= idleIntervalMs;
      const cooldownDone = (now - lastIdleSpeakAt) >= idleIntervalMs;
      if (!idleLongEnough || !cooldownDone || isWalking || targetPos || isSpeakingNow) return;

      const line = await generateIdleLine();
      const styleNow = idleStyles[(idleStyleIndex - 1 + idleStyles.length) % idleStyles.length];
      statusEl.textContent = `Junior (${styleNow}): ${line}`;
      unlockAudio();
      speak(line);
      robotBeep();
      lastIdleSpeakAt = now;

      if (Math.random() > 0.6) {
        juniorModel.setAttribute('animation-mixer', {clip: 'Wave', loop: 'once', clampWhenFinished: true});
        setTimeout(() => { if(!isWalking) juniorModel.setAttribute('animation-mixer', {clip: 'Idle', loop: 'repeat'}); }, 1700);
      }
    }

    function startIdleOracle(){
      if (idleCheckTimer) return;
      idleCheckTimer = setInterval(maybeIdleSpeak, 5000);
    }

    function stopIdleOracle(){
      if (idleCheckTimer) clearInterval(idleCheckTimer);
      idleCheckTimer = null;
    }

    function setIdleOracle(enabled){
      idleOracleEnabled = !!enabled;
      idleModeBtn.textContent = `Idle Oracle: ${idleOracleEnabled ? 'On' : 'Off'}`;
      if (idleOracleEnabled) {
        startIdleOracle();
        statusEl.textContent = 'Idle Oracle enabled (checks every 5s, speaks only after 60s idle).';
      } else {
        stopIdleOracle();
        statusEl.textContent = 'Idle Oracle disabled.';
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) stopIdleOracle();
      else if (idleOracleEnabled) startIdleOracle();
    });
    setInterval(robotBeep, 1200);
  </script>

</body>
</html>
