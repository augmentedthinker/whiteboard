<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Frontier Signal Desk</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --panelHover:#21262d; --border:#30363d; --text:#c9d1d9; --accent:#58a6ff; }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);padding:max(12px,env(safe-area-inset-top)) 12px max(16px,env(safe-area-inset-bottom));line-height:1.5}
    .wrap{max-width:920px;margin:0 auto}
    .hero,.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px}
    .hero{margin-bottom:10px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:10px}
    .btn,select{background:var(--panelHover);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px;text-decoration:none}
    select{min-width:260px}
    #report{margin-top:10px}
    #report h1,#report h2,#report h3{border-bottom:1px solid var(--border);padding-bottom:.25em}
    a{color:var(--accent)}

    #report img{
      width:100%;
      max-width:100%;
      height:auto;
      display:block;
      border-radius:12px;
      border:1px solid var(--border);
      margin:10px 0 14px;
      object-fit:cover;
    }
    #report p{overflow-wrap:anywhere}
    @media (max-width: 640px){
      body{padding:max(10px,env(safe-area-inset-top)) 10px max(14px,env(safe-area-inset-bottom));}
      .hero,.panel{padding:12px}
      .row{gap:8px}
      .btn,select{width:100%}
      select{min-width:0}
    }
  </style>

<style id="rv-home-fab-style">
  .rv-home-fab,.rv-fullscreen-fab{position:fixed;z-index:9999;width:46px;height:46px;border-radius:999px;border:1px solid rgba(126,186,255,.95);background:#2f8cff;color:#eaf5ff;display:grid;place-items:center;font-size:18px;font-weight:800;box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(8px);touch-action:none;user-select:none;text-decoration:none}
  .rv-home-fab{left:max(10px, env(safe-area-inset-left));top:max(10px, env(safe-area-inset-top));cursor:grab}
  .rv-fullscreen-fab{right:max(10px, env(safe-area-inset-right));top:max(10px, env(safe-area-inset-top));cursor:grab}
  .rv-home-fab.dragging,.rv-fullscreen-fab.dragging{cursor:grabbing}
  .rv-hidden-back-nav{display:none !important}
</style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1 style="margin:0;color:var(--accent)">🛰️ Frontier Signal Desk</h1>
    <p style="margin:.35rem 0 0">Most current report is loaded by default. Use the dropdown for older reports.</p>
    <div class="row">
      <a class="btn" href="../index.html">← Back to Remote Viewer</a>
      <label for="reportSelect">Older reports:</label>
      <select id="reportSelect"></select>
      <a id="openRaw" class="btn" target="_blank" rel="noopener">Open raw markdown</a>
    </div>
    <div class="row">
      <label for="sourceSelect">Current source feeds:</label>
      <select id="sourceSelect"></select>
      <a id="openSource" class="btn" target="_blank" rel="noopener">Open source URL</a>
    </div>
  </section>
  <section id="report" class="panel">Loading report…</section>
</div>
<script>
  const select = document.getElementById('reportSelect');
  const reportEl = document.getElementById('report');
  const rawLink = document.getElementById('openRaw');
  const sourceSelect = document.getElementById('sourceSelect');
  const openSource = document.getElementById('openSource');

  async function loadReport(file){
    const path = `./reports/${file}`;
    rawLink.href = path;
    const res = await fetch(path);
    let md = await res.text();
    // Reports are authored from /reports/*.md and use ../assets/... links.
    // When rendered inside index.html, normalize those links to local page context.
    md = md.replace(/\(\.\.\/assets\//g, '(./assets/');
    reportEl.innerHTML = marked.parse(md);
  }

  async function boot(){
    const meta = await (await fetch('./reports/reports.json?t=' + Date.now(), {cache: 'no-store'})).json();
    meta.reports.forEach(file=>{
      const opt=document.createElement('option');
      opt.value=file; opt.textContent=file.replace('frontier-signal-digest-','').replace('.md','');
      select.appendChild(opt);
    });
    select.value = meta.latest;
    await loadReport(meta.latest);
    select.addEventListener('change', ()=> loadReport(select.value));

    const sourceMeta = await (await fetch('./sources.json?t=' + Date.now(), {cache: 'no-store'})).json();
    sourceMeta.sources.forEach(src=>{
      const opt = document.createElement('option');
      opt.value = src.url;
      opt.textContent = `${src.name} (${src.type})`;
      sourceSelect.appendChild(opt);
    });
    if (sourceMeta.sources.length) {
      sourceSelect.value = sourceMeta.sources[0].url;
      openSource.href = sourceMeta.sources[0].url;
    }
    sourceSelect.addEventListener('change', ()=> {
      openSource.href = sourceSelect.value;
    });
  }
  boot();
</script>

<a id="rvHomeFab" class="rv-home-fab" href="#" aria-label="Back to menu page" title="Back to menu page">⌂</a>
<button id="rvFullscreenFab" class="rv-fullscreen-fab" type="button" aria-label="Toggle fullscreen" title="Toggle fullscreen">⛶</button>
<script id="rv-home-fab-script">
(function(){
  const fab=document.getElementById('rvHomeFab');
  const fsFab=document.getElementById('rvFullscreenFab');
  if(!fab || !fsFab) return;
  const path=location.pathname;
  const marker='/remote-viewer/';
  const idx=path.indexOf(marker);
  const href=idx>=0 ? path.slice(0, idx + marker.length) : '/';
  fab.setAttribute('href', href);

  const clamp = (v,min,max)=>Math.max(min, Math.min(max, v));
  const placeFromStorage = (el,key,side='left') => {
    try {
      const raw = localStorage.getItem(key);
      if(!raw) return;
      const pos = JSON.parse(raw);
      const maxLeft = window.innerWidth - el.offsetWidth - 6;
      const maxTop = window.innerHeight - el.offsetHeight - 6;
      const left = clamp(pos.left ?? (side==='left'?10:maxLeft), 6, maxLeft);
      const top = clamp(pos.top ?? 10, 6, maxTop);
      el.style.left = left + 'px';
      el.style.top = top + 'px';
      el.style.right = 'auto';
    } catch(_) {}
  };
  const savePos = (el,key) => {
    try { localStorage.setItem(key, JSON.stringify({left: el.offsetLeft, top: el.offsetTop})); } catch(_) {}
  };

  function wireDraggable(el, key, onClick){
    let drag=null, moved=false;
    el.addEventListener('pointerdown', (e)=>{ drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:el.offsetLeft,top:el.offsetTop}; moved=false; el.classList.add('dragging'); el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener('pointermove', (e)=>{ if(!drag||e.pointerId!==drag.id) return; const dx=e.clientX-drag.startX, dy=e.clientY-drag.startY; if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true; const maxLeft=window.innerWidth-el.offsetWidth-6, maxTop=window.innerHeight-el.offsetHeight-6; const nextLeft=clamp(drag.left+dx, 6, maxLeft); const nextTop=clamp(drag.top+dy, 6, maxTop); el.style.left=nextLeft+'px'; el.style.top=nextTop+'px'; el.style.right='auto'; });
    el.addEventListener('pointerup', async (e)=>{ if(!drag||e.pointerId!==drag.id) return; el.classList.remove('dragging'); try{el.releasePointerCapture(e.pointerId);}catch(_){} const wasMoved=moved; drag=null; savePos(el,key); if(!wasMoved && onClick) await onClick(e); });
    el.addEventListener('pointercancel', ()=>{ el.classList.remove('dragging'); drag=null; savePos(el,key); });
    el.addEventListener('click', (e)=>{ if(moved){ e.preventDefault(); moved=false; } });
  }

  const isFullscreen = () => !!(document.fullscreenElement || document.webkitFullscreenElement);
  const syncFsIcon = () => { fsFab.textContent = isFullscreen() ? '🡼' : '⛶'; };
  const toggleFullscreen = async () => {
    try {
      const target = document.documentElement;
      if (!isFullscreen()) {
        if (target.requestFullscreen) await target.requestFullscreen();
        else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
        try { localStorage.setItem('rvFullscreenPreferred', '1'); } catch(_) {}
      } else {
        if (document.exitFullscreen) await document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        try { localStorage.setItem('rvFullscreenPreferred', '0'); } catch(_) {}
      }
    } catch(_) {}
    syncFsIcon();
  };
  const tryApplyFullscreenPreference = async () => {
    let preferred = false;
    try { preferred = localStorage.getItem('rvFullscreenPreferred') === '1'; } catch(_) {}
    if (!preferred || isFullscreen()) return;
    try {
      const target = document.documentElement;
      if (target.requestFullscreen) await target.requestFullscreen();
      else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
    } catch(_) {}
    syncFsIcon();
  };
  const armFullscreenCarry = () => {
    let preferred = false;
    try { preferred = localStorage.getItem('rvFullscreenPreferred') === '1'; } catch(_) {}
    if (!preferred) return;
    const handler = () => {
      tryApplyFullscreenPreference();
      window.removeEventListener('pointerdown', handler, true);
      window.removeEventListener('keydown', handler, true);
      window.removeEventListener('touchstart', handler, true);
    };
    window.addEventListener('pointerdown', handler, true);
    window.addEventListener('keydown', handler, true);
    window.addEventListener('touchstart', handler, true);
  };

  placeFromStorage(fab, 'rvHomeFabPos', 'left');
  placeFromStorage(fsFab, 'rvFullscreenFabPos', 'right');
  wireDraggable(fab, 'rvHomeFabPos');
  wireDraggable(fsFab, 'rvFullscreenFabPos', toggleFullscreen);
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);
  syncFsIcon();

  const hideBackNav = () => {
    const selectors = 'a,button,.btn,.link,.back';
    document.querySelectorAll(selectors).forEach(el => {
      if (el.id === 'rvHomeFab' || el.id === 'rvFullscreenFab' || el.id === 'fsBtn') return;
      const text = (el.textContent || '').replace(/\s+/g,' ').trim().toLowerCase();
      const hrefAttr = (el.getAttribute && (el.getAttribute('href') || '') || '').toLowerCase();
      const title = (el.getAttribute && (el.getAttribute('title') || '') || '').toLowerCase();
      const looksBack = text.startsWith('←') || text.startsWith('back to') || text === 'back' || text === 'today’s artifacts' || text === "today's artifacts" || title.includes('back to');
      const navHref = hrefAttr.includes('../index.html') || hrefAttr.endsWith('/index.html') || hrefAttr === 'index.html';
      if (looksBack || (navHref && text.includes('back'))) el.classList.add('rv-hidden-back-nav');
    });
  };

  const init = () => { hideBackNav(); armFullscreenCarry(); };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, {once:true});
  else init();
  window.addEventListener('resize', ()=>{ placeFromStorage(fab, 'rvHomeFabPos', 'left'); placeFromStorage(fsFab, 'rvFullscreenFabPos', 'right'); });
})();
</script>
</body>
</html>
