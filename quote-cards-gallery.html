<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Quote Card Gallery</title>
  <style>
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#0d1117;color:#c9d1d9;margin:0;padding:max(12px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) max(16px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left))}
    h2{margin:0 0 10px;color:#58a6ff;font-size:clamp(1.2rem,4.5vw,1.6rem)}
    .top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    select,button,a.btn{background:#161b22;color:#c9d1d9;border:1px solid #30363d;border-radius:10px;padding:10px 12px;font-size:0.95rem;text-decoration:none;touch-action:manipulation}
    select{flex:1;min-width:180px}
    iframe{width:100%;height:76vh;border:1px solid #30363d;border-radius:12px;margin-top:12px;background:#fff}
    .hint{font-size:.86rem;color:#9da7b1;margin-top:8px}
    @media (max-width:640px){iframe{height:72vh}}
  </style>
</head>
<body>
  <h2>🗂️ Quote Card Gallery</h2>
  <div class='top'>
    <a class="btn" href="index.html">← Home</a>
    <button onclick='prev()'>Prev</button>
    <button onclick='next()'>Next</button>
    <select id='sel' onchange='go(this.value)'><option value='quotes/quote-card-164901.html'>quote-card-164901.html</option>
<option value='quotes/quote-card-164850.html'>quote-card-164850.html</option>
<option value='quotes/quote-card-164842.html'>quote-card-164842.html</option>
<option value='quotes/quote-card-164833.html'>quote-card-164833.html</option>
<option value='quotes/quote-card-164824.html'>quote-card-164824.html</option>
<option value='quotes/quote-card-164706.html'>quote-card-164706.html</option>
<option value='quotes/quote-card-164657.html'>quote-card-164657.html</option>
<option value='quotes/quote-card-164646.html'>quote-card-164646.html</option>
<option value='quotes/quote-card-164637.html'>quote-card-164637.html</option>
<option value='quotes/quote-card-164628.html'>quote-card-164628.html</option></select>
  </div>
  <div class="hint">Tip: swipe inside the card; use Prev/Next for fast browsing.</div>
  <iframe id='frame' src='quotes/quote-card-164901.html' loading="lazy"></iframe>
<script>
const sel=document.getElementById('sel');const frame=document.getElementById('frame');
function go(v){frame.src=v;sel.value=v;}
function idx(){return sel.selectedIndex;}
function prev(){let i=idx(); if(i<sel.options.length-1) i++; sel.selectedIndex=i; go(sel.value);}
function next(){let i=idx(); if(i>0) i--; sel.selectedIndex=i; go(sel.value);}
</script>
</body>
</html>
