<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>CLAWDHUB — OpenClaw Intelligence</title>
  <style>
    :root{--bg:#0a0c14;--panel:#141a2f;--border:#2b3554;--text:#e6edf3;--accent:#79c0ff;--muted:#8b949e}
    *{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:max(12px,env(safe-area-inset-top)) 12px max(16px,env(safe-area-inset-bottom));line-height:1.5;min-height:100vh}
    .container{max-width:960px;margin:0 auto}
    header{border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-end}
    h1{color:var(--accent);margin:0;font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:-0.01em}
    .back-link{display:inline-block;margin:0 0 12px;text-decoration:none;color:var(--accent);border:1px solid var(--border);border-radius:10px;padding:10px 14px;background:var(--panel)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:transform 0.2s,border-color 0.2s}
    .card:hover{transform:translateY(-2px);border-color:var(--accent)}
    .card-date{font-size:0.75rem;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
    .card-title{font-size:1.1rem;font-weight:700;margin:0 0 8px;color:var(--accent)}
    .card-creator{font-size:0.85rem;color:var(--muted);margin-bottom:8px}
    .card-desc{font-size:0.9rem;color:var(--text);opacity:0.9;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .tag{display:inline-block;background:rgba(121,192,255,0.1);color:var(--accent);font-size:0.75rem;padding:2px 8px;border-radius:999px;margin-top:12px;border:1px solid rgba(121,192,255,0.2)}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>🦞 CLAWDHUB</h1>
        <p style="margin:4px 0 0;color:var(--muted)">The archive of OpenClaw power-ups and implementations.</p>
      </div>
      <a class="back-link" href="../index.html">← Back</a>
    </header>

    <div class="grid">
      <!-- First Entry -->
      <div class="card" onclick="window.open('entries/2026-03-01-larue-powerup.html','_blank')">
        <div class="card-date">Mar 1, 2026</div>
        <div class="card-title">How to make Open Claw 10 times more powerful</div>
        <div class="card-creator">By LaRUE</div>
        <div class="card-desc">Analyzing the latest technical strategies to maximize OpenClaw leverage and agent autonomy.</div>
        <div class="tag">Knowledge</div> <div class="tag">Optimization</div>
      </div>
    </div>
  </div>
</body>
</html>
