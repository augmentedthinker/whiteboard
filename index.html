<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Remote Viewer</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="manifest" href="site.webmanifest" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&family=Audiowide&family=Press+Start+2P&family=Rajdhani:wght@600;700&family=Oxanium:wght@600;700&family=Space+Grotesk:wght@600;700&display=swap');

    :root{
      --text:#e3eefc;
      --muted:#adc0d8;
      --line:rgba(150,200,255,.28);
      --panel:rgba(11,18,30,.62);
      --accent:#88ccff;
    }

    *{box-sizing:border-box}
    html,body{margin:0}

    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      min-height:100vh;
      padding:max(4px,env(safe-area-inset-top)) 12px max(18px,env(safe-area-inset-bottom));
      position:relative;
      overflow-x:hidden;
      background-color:#000;
    }

    .bg-media{
      position:fixed;
      inset:0;
      z-index:-2;
      overflow:hidden;
      display:grid;
      place-items:center;
      background:#000;
    }

    .bg-media img{
      width:auto;
      height:100vh;
      max-width:100vw;
      object-fit:contain;
      object-position:center;
      filter:saturate(1.06) contrast(1.06) brightness(.95);
    }

    .bg-overlay{
      position:fixed;
      inset:0;
      z-index:-1;
      background:linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.35));
      pointer-events:none;
    }

    #ambientFx{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      opacity:.92;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      min-height:calc(100vh - max(12px,env(safe-area-inset-top)) - max(18px,env(safe-area-inset-bottom)) - 24px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      position:relative;
      z-index:1;
      transition:opacity .8s ease, transform .8s ease;
    }

    .container.prelaunch{
      opacity:0;
      transform:translateY(10px) scale(.985);
      pointer-events:none;
    }

    .opening-sequence{
      position:fixed;
      inset:0;
      z-index:160;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      transition:opacity .9s ease, visibility .9s ease;
    }

    .opening-sequence.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .opening-stage{
      width:min(980px,100%);
      text-align:center;
    }

    .opening-quote{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      gap:22px;
      transition:opacity .7s ease, transform .7s ease;
    }

    .opening-quote.hidden,
    .opening-video.hidden{
      opacity:0;
      transform:translateY(10px);
      pointer-events:none;
      position:absolute;
      inset:0;
    }

    .opening-kicker{
      color:rgba(127,207,255,.52);
      font-size:.62rem;
      font-weight:700;
      letter-spacing:.26em;
      text-transform:uppercase;
      margin:0;
    }

    .opening-text{
      margin:0 auto;
      max-width:28ch;
      color:rgba(238,246,255,.66);
      font-size:clamp(.92rem,1.8vw,1.15rem);
      line-height:1.9;
      letter-spacing:.03em;
      font-weight:500;
      text-shadow:0 0 18px rgba(120,180,255,.08);
    }

    .opening-text em{
      color:rgba(142,223,255,.82);
      font-style:normal;
    }

    .enter-btn{
      border:1px solid rgba(126,186,255,.4);
      background:linear-gradient(135deg, rgba(26,46,78,.95), rgba(10,20,38,.92));
      color:#eef6ff;
      border-radius:999px;
      padding:16px 26px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      cursor:pointer;
      box-shadow:0 16px 40px rgba(0,0,0,.38);
    }

    .opening-video{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity .7s ease, transform .7s ease;
    }

    .opening-video video{
      width:min(1100px,100%);
      max-height:86vh;
      border-radius:24px;
      overflow:hidden;
      border:1px solid rgba(126,186,255,.18);
      background:#000;
      box-shadow:0 30px 90px rgba(0,0,0,.55);
    }

    header{
      border:2px solid rgba(255,153,86,.95);
      border-radius:16px;
      background:rgba(10,10,10,.72);
      padding:14px 16px;
      margin-bottom:12px;
      backdrop-filter:blur(6px);
      width:min(96vw,980px);
      text-align:center;
      box-shadow:0 0 0 1px rgba(255,153,86,.25), 0 8px 28px rgba(0,0,0,.45);
      overflow:hidden;
      position:relative;
    }

    header::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(45deg, rgba(255,176,124,.12) 0 1px, transparent 1px 12px),
        repeating-linear-gradient(-45deg, rgba(255,176,124,.08) 0 1px, transparent 1px 12px);
      mix-blend-mode:screen;
    }

    header::before{
      content:"";
      position:absolute;
      inset:-40% -35%;
      pointer-events:none;
      background:linear-gradient(110deg, transparent 42%, rgba(255,225,190,.34) 50%, transparent 58%);
      animation:glintSweep 6.8s ease-in-out infinite;
      z-index:0;
    }

    h1{
      margin:0;
      font-family:'Audiowide', sans-serif;
      font-size:clamp(1.35rem,7.2vw,4.2rem);
      letter-spacing:.07em;
      text-transform:uppercase;
      color:#ff9a56;
      line-height:1;
      white-space:nowrap;
      text-align:center;
      position:relative;
      z-index:1;
    }

    .section-title{
      display:none;
    }

    .portal-grid{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom:14px;
      align-items:center;
      width:fit-content;
      max-width:100%;
    }

    .btn{
      position:relative;
      overflow:hidden;
      border:2px solid rgba(255,153,86,.85);
      background:linear-gradient(160deg, rgba(20,20,20,.62), rgba(8,8,8,.62));
      color:#ff9a56;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      text-align:center;
      transition:.18s transform,.18s background,.18s border-color;
      backdrop-filter:blur(4px);
      width:auto;
      min-height:64px;
      max-width:min(88vw,460px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      white-space:normal;
      box-shadow:0 0 0 1px rgba(255,153,86,.18), 0 10px 20px rgba(0,0,0,.22);
    }

    .btn::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(45deg, rgba(255,176,124,.12) 0 1px, transparent 1px 12px),
        repeating-linear-gradient(-45deg, rgba(255,176,124,.08) 0 1px, transparent 1px 12px);
      mix-blend-mode:screen;
    }

    .btn::before{
      content:"";
      position:absolute;
      inset:-55% -40%;
      pointer-events:none;
      background:linear-gradient(112deg, transparent 40%, rgba(255,230,196,.36) 50%, transparent 60%);
      transform:translateX(-130%);
      animation:glintSweep 6.6s ease-in-out infinite;
      z-index:0;
    }

    .portal-grid .btn:nth-child(1)::before{animation-delay:.15s}
    .portal-grid .btn:nth-child(2)::before{animation-delay:.55s}
    .portal-grid .btn:nth-child(3)::before{animation-delay:.95s}
    .portal-grid .btn:nth-child(4)::before{animation-delay:1.35s}
    .portal-grid .btn:nth-child(5)::before{animation-delay:1.75s}
    .portal-grid .btn:nth-child(6)::before{animation-delay:2.15s}

    .btn:hover{transform:translateY(-1px);background:linear-gradient(160deg, rgba(38,25,17,.78), rgba(16,11,8,.78));border-color:rgba(255,184,132,.95)}
    .btn strong{display:block;font-size:1.14rem;margin-bottom:0;letter-spacing:.06em;text-transform:uppercase;font-family:'Audiowide', sans-serif;position:relative;z-index:1}
    .btn small{display:none}

    .fs-btn {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      z-index: 220;
      background: #2f8cff;
      color: #eaf5ff;
      border: 1px solid rgba(126,186,255,.95);
      border-radius: 999px;
      width: 44px;
      height: 44px;
      padding: 0;
      font-size: 18px;
      font-weight: 700;
      display:grid;
      place-items:center;
      backdrop-filter: blur(6px);
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    .fs-btn.dragging{cursor:grabbing;}

    @keyframes glintSweep {
      0%, 70%, 100% { transform: translateX(-130%) translateY(0); opacity: 0; }
      8% { opacity: .2; }
      22% { transform: translateX(130%) translateY(0); opacity: .9; }
      30% { opacity: 0; }
    }

    @media (max-width: 760px){
      .container{
        justify-content:flex-start;
        padding-top:4px;
      }

      header{
        width:calc(100vw - 24px);
        margin-left:auto;
        margin-right:auto;
      }

      h1{
        font-size:clamp(1.2rem,6.8vw,2rem);
        letter-spacing:.04em;
      }

      .btn{
        max-width:min(92vw,460px);
      }

      .btn strong{font-size:1.12rem}
    }

    @media (prefers-reduced-motion: reduce){
      .btn::before,
      header::before{ animation: none !important; opacity:.22; }
    }
  </style>
</head>
<body>
  <div id="openingSequence" class="opening-sequence">
    <div class="opening-stage">
      <section id="openingQuote" class="opening-quote">
        <p class="opening-kicker">Remote Viewer</p>
        <p class="opening-text">“Artificial intelligence will not simply answer our questions — it will change what it means to <em>have one</em>.”</p>
        <button id="enterSequenceBtn" class="enter-btn" type="button">Enter</button>
      </section>
      <section id="openingVideo" class="opening-video hidden">
        <video id="introVideo" playsinline preload="auto"></video>
      </section>
    </div>
  </div>

  <div class="bg-media" aria-hidden="true">
    <img src="assets/main-bg/2026-03-07/remote-viewer-portrait-black-edge-swirl.png" alt="" />
  </div>
  <div class="bg-overlay" aria-hidden="true"></div>
  <canvas id="ambientFx" aria-hidden="true"></canvas>

  <button id="fsBtn" class="fs-btn" type="button" aria-label="Toggle fullscreen">⛶</button>

  <div id="mainMenu" class="container prelaunch">
    <header>
      <h1>Remote Viewer</h1>
    </header>

    <section class="portal-grid">
      <button class="btn" onclick="window.open('today/index.html','_blank')"><strong>Artifacts</strong></button>
      <button class="btn" onclick="window.open('agents/index.html','_blank')"><strong>Agents</strong></button>
      <button class="btn" onclick="window.open('tools/index.html','_blank')"><strong>Tools</strong></button>
      <button class="btn" onclick="window.open('games/index.html','_blank')"><strong>Games</strong></button>
      <button class="btn" onclick="window.open('docs/friend-viewer/index.html','_blank')"><strong>Share</strong></button>
      <button class="btn" onclick="window.open('archive/index.html','_self')"><strong>Archive</strong></button>
      <button class="btn" onclick="window.open('docs/analysis/index.html','_self')"><strong>Analysis</strong></button>
    </section>
  </div>

  <script>
    const fsBtn = document.getElementById('fsBtn');
    const fxCanvas = document.getElementById('ambientFx');
    const fx = fxCanvas.getContext('2d');
    const particles = [];
    const openingSequence = document.getElementById('openingSequence');
    const openingQuote = document.getElementById('openingQuote');
    const openingVideo = document.getElementById('openingVideo');
    const introVideo = document.getElementById('introVideo');
    const enterSequenceBtn = document.getElementById('enterSequenceBtn');
    const mainMenu = document.getElementById('mainMenu');

    function resizeAmbient(){
      fxCanvas.width = window.innerWidth;
      fxCanvas.height = window.innerHeight;
    }

    function initAmbient(){
      particles.length = 0;
      const count = Math.max(42, Math.floor(window.innerWidth / 18));
      const center = fxCanvas.width / 2;
      const spread = fxCanvas.width * 0.2;

      for(let i=0;i<count;i++){
        const isBlue = Math.random() > 0.34;
        const t = (Math.random() + Math.random()) / 2; // center-biased
        const x = center + (t - 0.5) * spread * 2 + (Math.random() - 0.5) * 18;
        particles.push({
          x,
          y: Math.random() * fxCanvas.height,
          r: Math.random() * 5.4 + 2.2,
          vx: (Math.random() - 0.5) * 0.28,
          vy: -(Math.random() * 0.55 + 0.15),
          a: Math.random() * 0.5 + 0.28,
          c: isBlue
            ? `rgba(${70 + Math.floor(Math.random()*35)}, ${140 + Math.floor(Math.random()*60)}, 255, ALPHA)`
            : `rgba(255, ${132 + Math.floor(Math.random()*55)}, ${70 + Math.floor(Math.random()*35)}, ALPHA)`
        });
      }
    }

    function tickAmbient(){
      fx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
      const center = fxCanvas.width / 2;
      const maxDist = fxCanvas.width * 0.45;

      for(const p of particles){
        p.x += p.vx;
        p.y += p.vy;

        if (p.y < -18) {
          const t = (Math.random() + Math.random()) / 2;
          p.y = fxCanvas.height + 18;
          p.x = center + (t - 0.5) * fxCanvas.width * 0.4;
        }

        const dist = Math.abs(p.x - center);
        const laneFade = Math.max(0, 1 - (dist / maxDist));
        if (laneFade <= 0.02) continue;

        fx.beginPath();
        const alpha = p.a * laneFade;
        fx.fillStyle = p.c.replace('ALPHA', String(alpha));
        fx.shadowColor = p.c.replace('ALPHA', String(0.7 * laneFade));
        fx.shadowBlur = 18;
        fx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fx.fill();
      }
      requestAnimationFrame(tickAmbient);
    }

    function isFullscreen(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
    async function toggleFullscreen(){
      try {
        const target = document.documentElement;
        if (!isFullscreen()) {
          if (target.requestFullscreen) await target.requestFullscreen();
          else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
        } else {
          if (document.exitFullscreen) await document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
      } catch(_) {}
      fsBtn.textContent = isFullscreen() ? '🡼' : '⛶';
    }

    function normalizeButtonWidths(){
      const buttons = [...document.querySelectorAll('.portal-grid .btn')];
      if (!buttons.length) return;

      buttons.forEach(btn => btn.style.width = 'auto');

      const maxContentWidth = Math.max(...buttons.map(btn => btn.scrollWidth));
      const maxAllowed = Math.min(Math.floor(window.innerWidth * 0.88), 460);
      const targetWidth = Math.min(maxContentWidth, maxAllowed);

      buttons.forEach(btn => btn.style.width = `${targetWidth}px`);
    }

    let drag = null;
    let moved = false;

    fsBtn.addEventListener('pointerdown', (e) => {
      drag = {
        id: e.pointerId,
        startX: e.clientX,
        startY: e.clientY,
        left: fsBtn.offsetLeft,
        top: fsBtn.offsetTop
      };
      moved = false;
      fsBtn.classList.add('dragging');
      fsBtn.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    fsBtn.addEventListener('pointermove', (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      const dx = e.clientX - drag.startX;
      const dy = e.clientY - drag.startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;

      const maxLeft = window.innerWidth - fsBtn.offsetWidth - 6;
      const maxTop = window.innerHeight - fsBtn.offsetHeight - 6;
      const nextLeft = Math.max(6, Math.min(maxLeft, drag.left + dx));
      const nextTop = Math.max(6, Math.min(maxTop, drag.top + dy));

      fsBtn.style.left = `${nextLeft}px`;
      fsBtn.style.top = `${nextTop}px`;
      fsBtn.style.right = 'auto';
    });

    fsBtn.addEventListener('pointerup', async (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      fsBtn.classList.remove('dragging');
      fsBtn.releasePointerCapture(e.pointerId);
      const wasMoved = moved;
      drag = null;
      if (!wasMoved) await toggleFullscreen();
    });

    fsBtn.addEventListener('pointercancel', (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      fsBtn.classList.remove('dragging');
      drag = null;
    });

    function selectIntroVideo(){
      const portrait = window.matchMedia('(orientation: portrait)').matches || window.innerHeight > window.innerWidth;
      introVideo.innerHTML = '';
      const source = document.createElement('source');
      source.type = 'video/mp4';
      source.src = portrait
        ? 'artifacts/remote-viewer-intro-mobile-2026-03-08/remote-viewer-intro-mobile.mp4'
        : 'artifacts/remote-viewer-intro-2026-03-08/remote-viewer-intro.mp4';
      introVideo.appendChild(source);
      introVideo.load();
    }

    function finishOpeningSequence(){
      openingSequence.classList.add('hidden');
      mainMenu.classList.remove('prelaunch');
    }

    function startOpeningSequence(){
      selectIntroVideo();
      openingQuote.classList.add('hidden');
      openingVideo.classList.remove('hidden');
      const playAttempt = introVideo.play();
      if (playAttempt && typeof playAttempt.catch === 'function') {
        playAttempt.catch(() => {
          setTimeout(finishOpeningSequence, 9000);
        });
      }
    }

    enterSequenceBtn.addEventListener('click', startOpeningSequence);
    introVideo.addEventListener('ended', finishOpeningSequence);

    document.addEventListener('fullscreenchange', ()=>fsBtn.textContent = isFullscreen() ? '🡼' : '⛶');
    window.addEventListener('load', () => {
      resizeAmbient();
      initAmbient();
      tickAmbient();
      normalizeButtonWidths();
      selectIntroVideo();
    });
    window.addEventListener('resize', () => {
      resizeAmbient();
      initAmbient();
      normalizeButtonWidths();
    });
  </script>
</body>
</html>
