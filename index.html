<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Remote Viewer</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="manifest" href="site.webmanifest" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&display=swap');

    :root{
      --text:#e3eefc;
      --muted:#adc0d8;
      --line:rgba(150,200,255,.28);
      --panel:rgba(11,18,30,.62);
      --accent:#88ccff;
    }

    *{box-sizing:border-box}
    html,body{margin:0}

    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      min-height:100vh;
      padding:max(12px,env(safe-area-inset-top)) 12px max(18px,env(safe-area-inset-bottom));
      position:relative;
      overflow-x:hidden;
      background-color:#060b14;
    }

    .bg-media{
      position:fixed;
      inset:0;
      z-index:-2;
      overflow:hidden;
    }

    .bg-media img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      filter:saturate(1.08) contrast(1.04) brightness(.92);
    }

    .bg-overlay{
      position:fixed;
      inset:0;
      z-index:-1;
      background:
        radial-gradient(circle at 20% 15%, rgba(120,180,255,.18), transparent 38%),
        linear-gradient(180deg, rgba(5,10,18,.42), rgba(5,10,18,.62));
      pointer-events:none;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      min-height:calc(100vh - max(12px,env(safe-area-inset-top)) - max(18px,env(safe-area-inset-bottom)) - 24px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    header{
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--panel);
      padding:14px 16px;
      margin-bottom:10px;
      backdrop-filter:blur(6px);
      width:min(92vw,360px);
      text-align:center;
    }

    h1{
      margin:0;
      font-family:Orbitron,Inter,sans-serif;
      font-size:clamp(1.2rem,4vw,1.8rem);
      letter-spacing:.06em;
      color:#e9f5ff;
    }

    .section-title{
      margin:12px 2px 8px;
      font-size:.76rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:#9ec3e7;
      text-align:center;
    }

    .portal-grid{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom:14px;
      align-items:center;
      width:fit-content;
      max-width:100%;
    }

    .btn{
      position:relative;
      overflow:hidden;
      border:1px solid rgba(178,221,255,.46);
      background:linear-gradient(160deg, rgba(116,178,242,.14), rgba(82,137,198,.1));
      color:var(--text);
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      text-align:left;
      transition:.18s transform,.18s background,.18s border-color;
      backdrop-filter:blur(4px);
      width:auto;
      min-height:64px;
      max-width:min(88vw,460px);
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      justify-content:center;
      white-space:normal;
    }

    .btn::after{
      content:"";
      position:absolute;inset:0;
      background:
        linear-gradient(transparent 96%, rgba(170,215,255,.08) 98%),
        linear-gradient(90deg, transparent 96%, rgba(170,215,255,.06) 98%);
      background-size:100% 16px, 16px 100%;
      pointer-events:none;
    }

    .btn:hover{transform:translateY(-1px);background:linear-gradient(160deg, rgba(130,192,252,.3), rgba(93,150,214,.24));border-color:rgba(204,235,255,.65)}
    .btn strong{display:block;font-size:.92rem;margin-bottom:2px}
    .btn small{color:var(--muted);font-size:.8rem}

    .fs-btn {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      z-index: 220;
      background: rgba(15, 25, 48, 0.82);
      color: #cfe6ff;
      border: 1px solid rgba(120,170,255,.55);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(6px);
    }

    @media (max-width: 760px){
      .container{
        justify-content:flex-start;
        padding-top:56px;
      }

      .btn{
        max-width:min(92vw,460px);
        text-align:left;
      }

      .btn strong{font-size:.95rem}
      .btn small{font-size:.79rem}
    }
  </style>
</head>
<body>
  <div class="bg-media" aria-hidden="true">
    <img src="assets/main-bg/2026-03-06/remote-viewer-philosopher-control-panel-portrait.png" alt="" />
  </div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <button id="fsBtn" class="fs-btn" type="button">⛶ Fullscreen</button>

  <div class="container">
    <header>
      <h1>Remote Viewer</h1>
    </header>

    <div class="section-title">Navigation</div>
    <section class="portal-grid">
      <button class="btn" onclick="window.open('today/index.html','_blank')"><strong>Today’s Artifacts</strong><small>Latest outputs</small></button>
      <button class="btn" onclick="window.open('agents/index.html','_blank')"><strong>Agents Workstation Bay</strong><small>Specialist units + capabilities</small></button>
      <button class="btn" onclick="window.open('tools/index.html','_blank')"><strong>Tools</strong><small>Manual utilities</small></button>
      <button class="btn" onclick="window.open('games/index.html','_blank')"><strong>Games</strong><small>Curated portal</small></button>
      <button class="btn" onclick="window.open('docs/friend-viewer/index.html','_blank')"><strong>Friend Viewer</strong><small>Share-ready portal</small></button>
      <button class="btn" onclick="window.open('archive/index.html','_self')"><strong>Archive</strong><small>Needs work / stored</small></button>
    </section>
  </div>

  <script>
    const fsBtn = document.getElementById('fsBtn');

    function isFullscreen(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
    async function toggleFullscreen(){
      try {
        const target = document.documentElement;
        if (!isFullscreen()) {
          if (target.requestFullscreen) await target.requestFullscreen();
          else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
        } else {
          if (document.exitFullscreen) await document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
      } catch(_) {}
      fsBtn.textContent = isFullscreen() ? '🡼 Exit Fullscreen' : '⛶ Fullscreen';
    }

    function normalizeButtonWidths(){
      const buttons = [...document.querySelectorAll('.portal-grid .btn')];
      if (!buttons.length) return;

      buttons.forEach(btn => btn.style.width = 'auto');

      const maxContentWidth = Math.max(...buttons.map(btn => btn.scrollWidth));
      const maxAllowed = Math.min(Math.floor(window.innerWidth * 0.88), 460);
      const targetWidth = Math.min(maxContentWidth, maxAllowed);

      buttons.forEach(btn => btn.style.width = `${targetWidth}px`);
    }

    fsBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', ()=>fsBtn.textContent = isFullscreen() ? '🡼 Exit Fullscreen' : '⛶ Fullscreen');
    window.addEventListener('load', normalizeButtonWidths);
    window.addEventListener('resize', normalizeButtonWidths);
  </script>
</body>
</html>
