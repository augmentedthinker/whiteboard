<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Remote Viewer</title>
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <link rel="manifest" href="site.webmanifest" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;600;700&family=Audiowide&family=Press+Start+2P&family=Rajdhani:wght@600;700&family=Oxanium:wght@600;700&family=Space+Grotesk:wght@600;700&display=swap');

    :root{
      --text:#e3eefc;
      --muted:#adc0d8;
      --line:rgba(150,200,255,.28);
      --panel:rgba(11,18,30,.62);
      --accent:#88ccff;
    }

    *{box-sizing:border-box}
    html,body{margin:0}

    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      min-height:100vh;
      padding:max(4px,env(safe-area-inset-top)) 12px max(18px,env(safe-area-inset-bottom));
      position:relative;
      overflow-x:hidden;
      background-color:#000;
    }

    .bg-media{
      position:fixed;
      inset:0;
      z-index:-2;
      overflow:hidden;
      display:grid;
      place-items:center;
      background:#000;
    }

    .bg-media img{
      width:auto;
      height:100vh;
      max-width:100vw;
      object-fit:contain;
      object-position:center;
      filter:saturate(1.06) contrast(1.06) brightness(.95);
    }

    .bg-overlay{
      position:fixed;
      inset:0;
      z-index:-1;
      background:linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.35));
      pointer-events:none;
    }

    #ambientFx{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      opacity:.92;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      min-height:calc(100vh - max(12px,env(safe-area-inset-top)) - max(18px,env(safe-area-inset-bottom)) - 24px);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      position:relative;
      z-index:1;
      transition:opacity .8s ease, transform .8s ease;
    }


    header{
      border:2px solid rgba(255,153,86,.95);
      border-radius:16px;
      background:rgba(10,10,10,.72);
      padding:14px 16px;
      margin-bottom:12px;
      backdrop-filter:blur(6px);
      width:min(96vw,980px);
      text-align:center;
      box-shadow:0 0 0 1px rgba(255,153,86,.25), 0 8px 28px rgba(0,0,0,.45);
      overflow:hidden;
      position:relative;
    }

    header::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(45deg, rgba(255,176,124,.12) 0 1px, transparent 1px 12px),
        repeating-linear-gradient(-45deg, rgba(255,176,124,.08) 0 1px, transparent 1px 12px);
      mix-blend-mode:screen;
    }

    header::before{
      content:"";
      position:absolute;
      inset:-40% -35%;
      pointer-events:none;
      background:linear-gradient(110deg, transparent 42%, rgba(255,225,190,.34) 50%, transparent 58%);
      animation:glintSweep 6.8s ease-in-out infinite;
      z-index:0;
    }

    h1{
      margin:0;
      font-family:'Audiowide', sans-serif;
      font-size:clamp(1.35rem,7.2vw,4.2rem);
      letter-spacing:.07em;
      text-transform:uppercase;
      color:#ff9a56;
      line-height:1;
      white-space:nowrap;
      text-align:center;
      position:relative;
      z-index:1;
    }

    .section-title{
      display:none;
    }

    .portal-grid{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom:14px;
      align-items:center;
      width:fit-content;
      max-width:100%;
    }

    .portal-grid .btn.priority-btn{
      border-color:rgba(255,112,112,.96);
      color:#ffdede;
      background:linear-gradient(160deg, rgba(72,18,24,.86), rgba(26,8,12,.82));
      box-shadow:0 0 0 1px rgba(255,112,112,.18), 0 10px 20px rgba(0,0,0,.22);
    }
    .portal-grid .btn.priority-btn::after{
      background:
        repeating-linear-gradient(45deg, rgba(255,148,148,.12) 0 1px, transparent 1px 12px),
        repeating-linear-gradient(-45deg, rgba(255,148,148,.08) 0 1px, transparent 1px 12px);
    }
    .portal-grid .btn.priority-btn:hover{
      background:linear-gradient(160deg, rgba(96,24,31,.92), rgba(37,10,15,.88));
      border-color:rgba(255,160,160,.98);
    }

    .btn{
      position:relative;
      overflow:hidden;
      border:2px solid rgba(255,153,86,.85);
      background:linear-gradient(160deg, rgba(20,20,20,.62), rgba(8,8,8,.62));
      color:#ff9a56;
      border-radius:12px;
      padding:10px 14px;
      cursor:pointer;
      text-align:center;
      transition:.18s transform,.18s background,.18s border-color;
      backdrop-filter:blur(4px);
      width:min(320px, calc(100vw - 72px));
      min-height:64px;
      max-width:320px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      white-space:normal;
      box-shadow:0 0 0 1px rgba(255,153,86,.18), 0 10px 20px rgba(0,0,0,.22);
      flex:0 0 auto;
    }

    .btn::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(45deg, rgba(255,176,124,.12) 0 1px, transparent 1px 12px),
        repeating-linear-gradient(-45deg, rgba(255,176,124,.08) 0 1px, transparent 1px 12px);
      mix-blend-mode:screen;
    }

    .btn::before{
      content:"";
      position:absolute;
      inset:-55% -40%;
      pointer-events:none;
      background:linear-gradient(112deg, transparent 40%, rgba(255,230,196,.36) 50%, transparent 60%);
      transform:translateX(-130%);
      animation:glintSweep 6.6s ease-in-out infinite;
      z-index:0;
    }

    .portal-grid .btn:nth-child(1)::before{animation-delay:.15s}
    .portal-grid .btn:nth-child(2)::before{animation-delay:.55s}
    .portal-grid .btn:nth-child(3)::before{animation-delay:.95s}
    .portal-grid .btn:nth-child(4)::before{animation-delay:1.35s}
    .portal-grid .btn:nth-child(5)::before{animation-delay:1.75s}
    .portal-grid .btn:nth-child(6)::before{animation-delay:2.15s}

    .btn:hover{transform:translateY(-1px);background:linear-gradient(160deg, rgba(38,25,17,.78), rgba(16,11,8,.78));border-color:rgba(255,184,132,.95)}
    .btn strong{display:block;font-size:1.14rem;margin-bottom:0;letter-spacing:.06em;text-transform:uppercase;font-family:'Audiowide', sans-serif;position:relative;z-index:1}
    .btn small{display:none}

    .fs-btn {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      z-index: 220;
      background: #2f8cff;
      color: #eaf5ff;
      border: 1px solid rgba(126,186,255,.95);
      border-radius: 999px;
      width: 44px;
      height: 44px;
      padding: 0;
      font-size: 18px;
      font-weight: 700;
      display:grid;
      place-items:center;
      backdrop-filter: blur(6px);
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
    .fs-btn.dragging{cursor:grabbing;}


    @keyframes glintSweep {
      0%, 70%, 100% { transform: translateX(-130%) translateY(0); opacity: 0; }
      8% { opacity: .2; }
      22% { transform: translateX(130%) translateY(0); opacity: .9; }
      30% { opacity: 0; }
    }

    @media (max-width: 760px){
      .container{
        justify-content:flex-start;
        padding-top:4px;
      }

      header{
        width:calc(100vw - 24px);
        margin-left:auto;
        margin-right:auto;
      }

      h1{
        font-size:clamp(1.2rem,6.8vw,2rem);
        letter-spacing:.04em;
      }

      .btn{
        max-width:min(92vw,460px);
      }

      .btn strong{font-size:1.12rem}
    }

    @media (prefers-reduced-motion: reduce){
      .btn::before,
      header::before{ animation: none !important; opacity:.22; }
    }
  </style>

<style id="rv-home-fab-style">
  .rv-home-fab,.rv-fullscreen-fab{position:fixed;z-index:9999;width:46px;height:46px;border-radius:999px;border:1px solid rgba(126,186,255,.95);background:#2f8cff;color:#eaf5ff;display:grid;place-items:center;font-size:18px;font-weight:800;box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(8px);touch-action:none;user-select:none;text-decoration:none}
  .rv-home-fab{left:max(10px, env(safe-area-inset-left));top:max(10px, env(safe-area-inset-top));cursor:grab}
  .rv-fullscreen-fab{right:max(10px, env(safe-area-inset-right));top:max(10px, env(safe-area-inset-top));cursor:grab}
  .rv-home-fab.dragging,.rv-fullscreen-fab.dragging{cursor:grabbing}
  .rv-hidden-back-nav{display:none !important}
</style>
</head>
<body>
  <div class="bg-media" aria-hidden="true">
    <img src="assets/main-bg/2026-03-07/remote-viewer-portrait-black-edge-swirl.png" alt="" />
  </div>
  <div class="bg-overlay" aria-hidden="true"></div>
  <canvas id="ambientFx" aria-hidden="true"></canvas>


  <div id="mainMenu" class="container">
    <header>
      <h1>Remote Viewer</h1>
    </header>

    <section class="portal-grid">
      <button class="btn priority-btn" onclick="window.open('artifacts/capability-map-2026-03-09/index.html','_self')"><strong>Priority</strong></button>
      <button class="btn" onclick="window.open('today/index.html','_blank')"><strong>Artifacts</strong></button>
      <button class="btn" onclick="window.open('agents/index.html','_blank')"><strong>Agents</strong></button>
      <button class="btn" onclick="window.open('tools/index.html','_blank')"><strong>Tools</strong></button>
      <button class="btn" onclick="window.open('games/index.html','_blank')"><strong>Games</strong></button>
      <button class="btn" onclick="window.open('docs/friend-viewer/index.html','_blank')"><strong>Share</strong></button>
      <button class="btn" onclick="window.open('archive/index.html','_self')"><strong>Archive</strong></button>
      <button class="btn" onclick="window.open('docs/analysis/index.html','_self')"><strong>Analysis</strong></button>
    </section>
  </div>

  <script>
    const fxCanvas = document.getElementById('ambientFx');
    const fx = fxCanvas.getContext('2d');
    const particles = [];
    const mainMenu = document.getElementById('mainMenu');

    function resizeAmbient(){
      fxCanvas.width = window.innerWidth;
      fxCanvas.height = window.innerHeight;
    }

    function initAmbient(){
      particles.length = 0;
      const count = Math.max(42, Math.floor(window.innerWidth / 18));
      const center = fxCanvas.width / 2;
      const spread = fxCanvas.width * 0.2;

      for(let i=0;i<count;i++){
        const isBlue = Math.random() > 0.34;
        const t = (Math.random() + Math.random()) / 2; // center-biased
        const x = center + (t - 0.5) * spread * 2 + (Math.random() - 0.5) * 18;
        particles.push({
          x,
          y: Math.random() * fxCanvas.height,
          r: Math.random() * 5.4 + 2.2,
          vx: (Math.random() - 0.5) * 0.28,
          vy: -(Math.random() * 0.55 + 0.15),
          a: Math.random() * 0.5 + 0.28,
          c: isBlue
            ? `rgba(${70 + Math.floor(Math.random()*35)}, ${140 + Math.floor(Math.random()*60)}, 255, ALPHA)`
            : `rgba(255, ${132 + Math.floor(Math.random()*55)}, ${70 + Math.floor(Math.random()*35)}, ALPHA)`
        });
      }
    }

    function tickAmbient(){
      fx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
      const center = fxCanvas.width / 2;
      const maxDist = fxCanvas.width * 0.45;

      for(const p of particles){
        p.x += p.vx;
        p.y += p.vy;

        if (p.y < -18) {
          const t = (Math.random() + Math.random()) / 2;
          p.y = fxCanvas.height + 18;
          p.x = center + (t - 0.5) * fxCanvas.width * 0.4;
        }

        const dist = Math.abs(p.x - center);
        const laneFade = Math.max(0, 1 - (dist / maxDist));
        if (laneFade <= 0.02) continue;

        fx.beginPath();
        const alpha = p.a * laneFade;
        fx.fillStyle = p.c.replace('ALPHA', String(alpha));
        fx.shadowColor = p.c.replace('ALPHA', String(0.7 * laneFade));
        fx.shadowBlur = 18;
        fx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fx.fill();
      }
      requestAnimationFrame(tickAmbient);
    }

    function normalizeButtonWidths(){}

    window.addEventListener('load', () => {
      resizeAmbient();
      initAmbient();
      tickAmbient();
      normalizeButtonWidths();
    });
    window.addEventListener('resize', () => {
      resizeAmbient();
      initAmbient();
      normalizeButtonWidths();
    });
  </script>

<a id="rvHomeFab" class="rv-home-fab" href="#" aria-label="Back to menu page" title="Back to menu page">⌂</a>
<button id="rvFullscreenFab" class="rv-fullscreen-fab" type="button" aria-label="Toggle fullscreen" title="Toggle fullscreen">⛶</button>
<script id="rv-home-fab-script">
(function(){
  const fab=document.getElementById('rvHomeFab');
  const fsFab=document.getElementById('rvFullscreenFab');
  if(!fab || !fsFab) return;
  const path=location.pathname;
  const marker='/remote-viewer/';
  const idx=path.indexOf(marker);
  const href=idx>=0 ? path.slice(0, idx + marker.length) : '/';
  fab.setAttribute('href', href);

  const clamp = (v,min,max)=>Math.max(min, Math.min(max, v));
  const placeFromStorage = (el,key,side='left') => {
    try {
      const raw = localStorage.getItem(key);
      if(!raw) return;
      const pos = JSON.parse(raw);
      const maxLeft = window.innerWidth - el.offsetWidth - 6;
      const maxTop = window.innerHeight - el.offsetHeight - 6;
      const left = clamp(pos.left ?? (side==='left'?10:maxLeft), 6, maxLeft);
      const top = clamp(pos.top ?? 10, 6, maxTop);
      el.style.left = left + 'px';
      el.style.top = top + 'px';
      el.style.right = 'auto';
    } catch(_) {}
  };
  const savePos = (el,key) => {
    try { localStorage.setItem(key, JSON.stringify({left: el.offsetLeft, top: el.offsetTop})); } catch(_) {}
  };

  function wireDraggable(el, key, onClick){
    let drag=null, moved=false;
    el.addEventListener('pointerdown', (e)=>{ drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:el.offsetLeft,top:el.offsetTop}; moved=false; el.classList.add('dragging'); el.setPointerCapture(e.pointerId); e.preventDefault(); });
    el.addEventListener('pointermove', (e)=>{ if(!drag||e.pointerId!==drag.id) return; const dx=e.clientX-drag.startX, dy=e.clientY-drag.startY; if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true; const maxLeft=window.innerWidth-el.offsetWidth-6, maxTop=window.innerHeight-el.offsetHeight-6; const nextLeft=clamp(drag.left+dx, 6, maxLeft); const nextTop=clamp(drag.top+dy, 6, maxTop); el.style.left=nextLeft+'px'; el.style.top=nextTop+'px'; el.style.right='auto'; });
    el.addEventListener('pointerup', async (e)=>{ if(!drag||e.pointerId!==drag.id) return; el.classList.remove('dragging'); try{el.releasePointerCapture(e.pointerId);}catch(_){} const wasMoved=moved; drag=null; savePos(el,key); if(!wasMoved && onClick) await onClick(e); });
    el.addEventListener('pointercancel', ()=>{ el.classList.remove('dragging'); drag=null; savePos(el,key); });
    el.addEventListener('click', (e)=>{ if(moved){ e.preventDefault(); moved=false; } });
  }

  const isFullscreen = () => !!(document.fullscreenElement || document.webkitFullscreenElement);
  const syncFsIcon = () => { fsFab.textContent = isFullscreen() ? '🡼' : '⛶'; };
  const toggleFullscreen = async () => {
    try {
      const target = document.documentElement;
      if (!isFullscreen()) {
        if (target.requestFullscreen) await target.requestFullscreen();
        else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
        try { localStorage.setItem('rvFullscreenPreferred', '1'); } catch(_) {}
      } else {
        if (document.exitFullscreen) await document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        try { localStorage.setItem('rvFullscreenPreferred', '0'); } catch(_) {}
      }
    } catch(_) {}
    syncFsIcon();
  };
  const tryApplyFullscreenPreference = async () => {
    let preferred = false;
    try { preferred = localStorage.getItem('rvFullscreenPreferred') === '1'; } catch(_) {}
    if (!preferred || isFullscreen()) return;
    try {
      const target = document.documentElement;
      if (target.requestFullscreen) await target.requestFullscreen();
      else if (target.webkitRequestFullscreen) target.webkitRequestFullscreen();
    } catch(_) {}
    syncFsIcon();
  };
  const armFullscreenCarry = () => {
    let preferred = false;
    try { preferred = localStorage.getItem('rvFullscreenPreferred') === '1'; } catch(_) {}
    if (!preferred) return;
    const handler = () => {
      tryApplyFullscreenPreference();
      window.removeEventListener('pointerdown', handler, true);
      window.removeEventListener('keydown', handler, true);
      window.removeEventListener('touchstart', handler, true);
    };
    window.addEventListener('pointerdown', handler, true);
    window.addEventListener('keydown', handler, true);
    window.addEventListener('touchstart', handler, true);
  };

  placeFromStorage(fab, 'rvHomeFabPos', 'left');
  placeFromStorage(fsFab, 'rvFullscreenFabPos', 'right');
  wireDraggable(fab, 'rvHomeFabPos');
  wireDraggable(fsFab, 'rvFullscreenFabPos', toggleFullscreen);
  document.addEventListener('fullscreenchange', syncFsIcon);
  document.addEventListener('webkitfullscreenchange', syncFsIcon);
  syncFsIcon();

  const hideBackNav = () => {
    const selectors = 'a,button,.btn,.link,.back';
    document.querySelectorAll(selectors).forEach(el => {
      if (el.id === 'rvHomeFab' || el.id === 'rvFullscreenFab' || el.id === 'fsBtn') return;
      const text = (el.textContent || '').replace(/\s+/g,' ').trim().toLowerCase();
      const hrefAttr = (el.getAttribute && (el.getAttribute('href') || '') || '').toLowerCase();
      const title = (el.getAttribute && (el.getAttribute('title') || '') || '').toLowerCase();
      const looksBack = text.startsWith('←') || text.startsWith('back to') || text === 'back' || text === 'today’s artifacts' || text === "today's artifacts" || title.includes('back to');
      const navHref = hrefAttr.includes('../index.html') || hrefAttr.endsWith('/index.html') || hrefAttr === 'index.html';
      if (looksBack || (navHref && text.includes('back'))) el.classList.add('rv-hidden-back-nav');
    });
  };

  const init = () => { hideBackNav(); armFullscreenCarry(); };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, {once:true});
  else init();
  window.addEventListener('resize', ()=>{ placeFromStorage(fab, 'rvHomeFabPos', 'left'); placeFromStorage(fsFab, 'rvFullscreenFabPos', 'right'); });
})();
</script>
</body>
</html>
