<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Satellite Scan Demo — 2026-02-27</title>
  <style>
    :root{--text:#e7f3ff;--panel:rgba(8,18,34,.58);--border:rgba(128,194,255,.38);--accent:#80ccff}
    *{box-sizing:border-box}
    body{margin:0;min-height:100svh;display:grid;place-items:center;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:url('assets/today-artifacts/2026-02-27/satellite-scan-bg.png') center/cover no-repeat fixed;overflow:hidden}
    body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 72% 22%, rgba(130,190,255,.23), transparent 45%),radial-gradient(circle at 20% 88%, rgba(74,129,210,.20), transparent 38%),linear-gradient(to bottom, rgba(0,7,19,.3), rgba(0,7,19,.72));pointer-events:none}
    .scan-line{position:fixed;inset:-20% -10%;background:linear-gradient(115deg, transparent 45%, rgba(128,206,255,.18) 50%, transparent 55%);animation:sweep 9s linear infinite;mix-blend-mode:screen;pointer-events:none}
    .orbit{position:fixed;width:min(88vw,620px);aspect-ratio:1;border:1px solid rgba(130,200,255,.2);border-radius:50%;animation:spin 24s linear infinite;pointer-events:none;filter:drop-shadow(0 0 18px rgba(110,190,255,.18))}
    .satellite{position:absolute;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle, #d8f1ff 0%, #7ecaff 60%, #61b6f6 100%);box-shadow:0 0 18px rgba(142,212,255,.95),0 0 36px rgba(100,180,255,.55);top:50%;left:50%;transform:translate(-50%,-50%) translateY(calc(-1 * min(44vw,310px)))}
    .panel{position:relative;z-index:2;width:min(92vw,720px);padding:20px 18px;border-radius:16px;border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(6px);box-shadow:0 10px 30px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;font-size:clamp(1.4rem,4.7vw,2.1rem);letter-spacing:.2px}
    p{margin:0;color:#c8deef;line-height:1.5;font-size:clamp(.95rem,3.3vw,1.08rem)}
    .meta{margin-top:12px;font-size:.86rem;color:#9ec7e8;opacity:.95}
    a{color:var(--accent)}
    @keyframes sweep{0%{transform:translateX(-34%) translateY(-10%) rotate(-9deg)}100%{transform:translateX(34%) translateY(10%) rotate(-9deg)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:760px){body{background-attachment:scroll}.panel{padding:16px 14px}}
  </style>
</head>
<body>
  <div class="scan-line" aria-hidden="true"></div>
  <div class="orbit" aria-hidden="true"><div class="satellite"></div></div>
  <main class="panel">
    <h1>🛰️ Satellite Scan Demo</h1>
    <p>Simulated orbital sweep over Earth with a subtle scan pass and rotating satellite marker. Built for lightweight mobile rendering and daily artifact proof.</p>
    <p class="meta">Artifact date: 2026-02-27 · <a href="todays-artifacts.html">Back to Today’s Artifacts</a></p>
  </main>
</body>
</html>
