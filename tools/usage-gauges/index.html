<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Usage Gauges | Remote Viewer</title>
  <style>
    :root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--txt:#c9d1d9;--muted:#9da7b1;--accent:#58a6ff;--ok:#3fb950;--warn:#d29922;--bad:#f85149}
    *{box-sizing:border-box} body{margin:0;min-height:100svh;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:max(12px,env(safe-area-inset-top)) 12px max(16px,env(safe-area-inset-bottom))}
    .wrap{max-width:900px;margin:0 auto}
    .back{display:inline-block;text-decoration:none;color:var(--accent);border:1px solid var(--line);padding:10px 12px;border-radius:10px;background:#1b2230;margin-bottom:10px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
    h1{margin:0 0 6px;color:var(--accent);font-size:clamp(1.2rem,4vw,1.8rem)}
    .muted{color:var(--muted)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:760px){.row{grid-template-columns:1fr}}
    .gauge-card{background:#0f1520;border:1px solid #293247;border-radius:12px;padding:12px}
    .gtitle{font-weight:700;margin:0 0 6px}
    .meter{position:relative;height:140px}
    svg{width:100%;height:140px}
    .value{position:absolute;left:0;right:0;bottom:10px;text-align:center;font-size:1.2rem;font-weight:800}
    .status{font-size:.9rem;text-align:center;color:var(--muted)}
    textarea{width:100%;min-height:110px;background:#0f1520;color:#dbe6ff;border:1px solid #293247;border-radius:10px;padding:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{border:1px solid #3a4a6a;background:#1d2a45;color:#e8f2ff;padding:9px 12px;border-radius:10px;font-weight:700;cursor:pointer}
    .small{font-size:.86rem;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../../index.html">← Back to Remote Viewer</a>
    <div class="card">
      <h1>📊 Usage Gauges</h1>
      <p class="muted">Manual refresh only (no auto loops). Paste a <code>session_status</code> snapshot and click refresh.</p>
      <p class="small">Expected pattern example: <code>Usage: 5h 86% left ... Day 50% left</code></p>
      <textarea id="raw" placeholder="Paste session_status text here..."></textarea>
      <div class="btns">
        <button id="refresh">Refresh Gauges</button>
        <button id="sample">Load Sample</button>
      </div>
      <p id="msg" class="small"></p>
    </div>

    <div class="row">
      <div class="gauge-card">
        <p class="gtitle">5-Hour Window</p>
        <div class="meter" id="g5"></div>
      </div>
      <div class="gauge-card">
        <p class="gtitle">Day Window</p>
        <div class="meter" id="gday"></div>
      </div>
    </div>
  </div>
<script>
function zoneColor(p){ if(p>=60) return '#3fb950'; if(p>=30) return '#d29922'; return '#f85149'; }
function arcPath(cx,cy,r,start,end){ const x1=cx+r*Math.cos(start), y1=cy+r*Math.sin(start); const x2=cx+r*Math.cos(end), y2=cy+r*Math.sin(end); const large = end-start>Math.PI?1:0; return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`; }
function renderGauge(el, percent){
  const p=Math.max(0,Math.min(100,percent));
  const color=zoneColor(p);
  const start=Math.PI, end=2*Math.PI;
  const prog=start+(end-start)*(p/100);
  el.innerHTML=`<svg viewBox='0 0 220 140' aria-label='gauge'>
    <path d='${arcPath(110,120,85,start,end)}' stroke='#2a3346' stroke-width='14' fill='none'/>
    <path d='${arcPath(110,120,85,start,prog)}' stroke='${color}' stroke-width='14' fill='none' stroke-linecap='round'/>
    <text x='20' y='130' fill='#7c8ba8' font-size='10'>0%</text>
    <text x='98' y='34' fill='#7c8ba8' font-size='10'>50%</text>
    <text x='186' y='130' fill='#7c8ba8' font-size='10'>100%</text>
  </svg>
  <div class='value' style='color:${color}'>${p}%</div>
  <div class='status'>${p>=60?'Healthy':p>=30?'Caution':'Low'}</div>`;
}
function parseUsage(text){
  const m5 = text.match(/5h\s+(\d+)%\s+left/i);
  const md = text.match(/Day\s+(\d+)%\s+left/i);
  return {five: m5?parseInt(m5[1],10):null, day: md?parseInt(md[1],10):null};
}
const raw=document.getElementById('raw');
const msg=document.getElementById('msg');
document.getElementById('refresh').onclick=()=>{
  const v=parseUsage(raw.value||'');
  if(v.five==null||v.day==null){ msg.textContent='Could not parse values. Paste full session_status output with “5h XX% left” and “Day YY% left”.'; return; }
  renderGauge(document.getElementById('g5'), v.five);
  renderGauge(document.getElementById('gday'), v.day);
  msg.textContent='Gauges refreshed.';
};
document.getElementById('sample').onclick=()=>{
  raw.value='📊 Usage: 5h 86% left ⏱1h 47m · Day 50% left ⏱2d 17h';
  document.getElementById('refresh').click();
};
renderGauge(document.getElementById('g5'), 0);
renderGauge(document.getElementById('gday'), 0);
</script>
</body>
</html>
