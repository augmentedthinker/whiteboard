<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Remote Viewer | Archived</title>
  <style>
    :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#c9d1d9; --accent:#58a6ff; }
    *{box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:max(12px,env(safe-area-inset-top)) 12px max(16px,env(safe-area-inset-bottom));line-height:1.5;min-height:100vh}
    .container{max-width:820px;margin:0 auto}
    header{border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:16px}
    h1{color:var(--accent);margin:0;font-size:clamp(1.4rem,3.8vw,2rem)}
    .back-link{display:inline-block;margin:0 0 12px;text-decoration:none;color:var(--accent);border:1px solid var(--border);border-radius:10px;padding:10px 14px;background:var(--panel)}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
    .muted{color:#9da7b1}
  </style>

<style id="rv-home-fab-style">
  .rv-home-fab{position:fixed;left:max(10px, env(safe-area-inset-left));top:max(10px, env(safe-area-inset-top));z-index:9999;width:46px;height:46px;border-radius:999px;border:1px solid rgba(126,186,255,.95);background:#2f8cff;color:#eaf5ff;display:grid;place-items:center;font-size:18px;font-weight:800;box-shadow:0 12px 28px rgba(0,0,0,.28);backdrop-filter:blur(8px);cursor:grab;touch-action:none;user-select:none;text-decoration:none}
  .rv-home-fab.dragging{cursor:grabbing}
  .rv-hidden-back-nav{display:none !important}
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Archived Artifacts</h1>
      <p class="muted">Archive lane reset completed on 2026-03-01.</p>
    </header>
    <a class="back-link" href="../index.html">← Back to Remote Viewer</a>
    <div class="card">
      <strong>Archived on 2026-03-03: Frontier Signal Desk</strong>
      <p class="muted">Moved out of live navigation due to scope drift from the original intent. Stored for possible revisit before permanent deletion.</p>
      <p><a href="../_archive-2026-03-03/frontier-signal/index.html">Open archived Frontier Signal</a></p>
    </div>
  </div>

<a id="rvHomeFab" class="rv-home-fab" href="#" aria-label="Back to menu page" title="Back to menu page">⌂</a>
<script id="rv-home-fab-script">
(function(){
  const fab=document.getElementById('rvHomeFab');
  if(!fab) return;
  const path=location.pathname;
  const marker='/remote-viewer/';
  const idx=path.indexOf(marker);
  const href=idx>=0 ? path.slice(0, idx + marker.length) : '/';
  fab.setAttribute('href', href);
  let drag=null, moved=false;
  fab.addEventListener('pointerdown', (e)=>{ drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:fab.offsetLeft,top:fab.offsetTop}; moved=false; fab.classList.add('dragging'); fab.setPointerCapture(e.pointerId); e.preventDefault(); });
  fab.addEventListener('pointermove', (e)=>{ if(!drag||e.pointerId!==drag.id) return; const dx=e.clientX-drag.startX, dy=e.clientY-drag.startY; if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true; const maxLeft=window.innerWidth-fab.offsetWidth-6, maxTop=window.innerHeight-fab.offsetHeight-6; const nextLeft=Math.max(6, Math.min(maxLeft, drag.left+dx)); const nextTop=Math.max(6, Math.min(maxTop, drag.top+dy)); fab.style.left=nextLeft+'px'; fab.style.top=nextTop+'px'; fab.style.right='auto'; });
  fab.addEventListener('pointerup', (e)=>{ if(!drag||e.pointerId!==drag.id) return; fab.classList.remove('dragging'); try{fab.releasePointerCapture(e.pointerId);}catch(_){} const wasMoved=moved; drag=null; if(wasMoved) e.preventDefault(); });
  fab.addEventListener('pointercancel', ()=>{ fab.classList.remove('dragging'); drag=null; });
  fab.addEventListener('click', (e)=>{ if(moved){ e.preventDefault(); moved=false; } });

  const hideBackNav = () => {
    const selectors = 'a,button,.btn,.link,.back';
    document.querySelectorAll(selectors).forEach(el => {
      if (el.id === 'rvHomeFab' || el.id === 'fsBtn') return;
      const text = (el.textContent || '').replace(/\s+/g,' ').trim().toLowerCase();
      const hrefAttr = (el.getAttribute && (el.getAttribute('href') || '') || '').toLowerCase();
      const title = (el.getAttribute && (el.getAttribute('title') || '') || '').toLowerCase();
      const looksBack = text.startsWith('←') || text.startsWith('back to') || text === 'back' || text === 'today’s artifacts' || text === "today's artifacts" || title.includes('back to');
      const navHref = hrefAttr.includes('../index.html') || hrefAttr.endsWith('/index.html') || hrefAttr === 'index.html';
      if (looksBack || (navHref && text.includes('back'))) {
        el.classList.add('rv-hidden-back-nav');
      }
    });
  };
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', hideBackNav, {once:true});
  else hideBackNav();
})();
</script>
</body>
</html>
