<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Remote Viewer | Archive</title>
  <style>
    :root{--bg:#0d1117;--panel:#161b22;--panel2:#10161d;--border:#30363d;--text:#c9d1d9;--muted:#9da7b1;--accent:#58a6ff}
    *{box-sizing:border-box}
    body{font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(180deg,#0d1117,#090d13);color:var(--text);margin:0;padding:max(12px,env(safe-area-inset-top)) 12px max(16px,env(safe-area-inset-bottom));line-height:1.55;min-height:100vh}
    .container{max-width:960px;margin:0 auto}
    .back-link{display:inline-block;margin:0 0 12px;text-decoration:none;color:var(--accent);border:1px solid var(--border);border-radius:10px;padding:10px 14px;background:var(--panel)}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px}
    h1{color:var(--accent);margin:0 0 8px;font-size:clamp(1.4rem,3.8vw,2rem)}
    p{margin:10px 0;color:var(--text)}
    .muted{color:var(--muted)}
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="../index.html">← Back to Remote Viewer</a>
    <main class="card">
      <h1>Archive</h1>
      <p>This is where older artifacts are staged before permanent deletion.</p>
      <p class="muted">Policy: when artifacts are no longer front-stage, they can be moved here first for cooling-off review, then deleted in a later cleanup pass.</p>
    </main>
  </div>
</body>
</html>
